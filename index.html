<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - الحصن الشامل المطور (نسخة مصلحة بالكامل)</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
            --companions-color: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin: 30px 0;
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .azkar-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .azkar-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid rgba(0, 180, 216, 0.3);
            background: transparent;
            color: var(--text-color);
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        .azkar-box {
            background: rgba(10, 17, 40, 0.6);
            padding: 25px;
            border-radius: 16px;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        .zkr-text {
            font-size: 1.35rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #fff;
        }

        .zkr-reward {
            font-size: 1rem;
            color: var(--highlight);
            font-style: italic;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .azkar-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .counter-btn {
            flex: 1;
            max-width: 250px;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 245, 212, 0.3);
            text-align: center;
            direction: ltr; /* لضمان عرض العداد العربي بشكل صحيح 0 / 1 */
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        .counter-btn.done {
            background: var(--success-color);
            color: #fff;
            box-shadow: 0 5px 15px rgba(42, 157, 143, 0.3);
        }

        .search-container {
            width: 100%;
        }

        .search-section-title {
            font-size: 1.3rem;
            color: var(--text-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 18px 22px;
            border-radius: 16px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.15rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box .search-btn {
            padding: 0 35px;
            border-radius: 16px;
            border: none;
            background-color: var(--primary-color);
            color: #000;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box .search-btn:hover {
            background-color: var(--accent-color);
        }

        .companions-btn {
            background-color: var(--companions-color) !important;
            color: #fff !important;
        }
        .companions-btn:hover {
            opacity: 0.9;
        }

        .result-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border-right: 6px solid var(--primary-color);
            line-height: 2;
            font-size: 1.25rem;
            animation: fadeIn 0.4s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: justify;
            margin-bottom: 20px;
        }

        .companion-card {
            border-right-color: var(--companions-color);
        }

        .section-title {
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
            display: inline-block;
        }

        .companion-title {
            color: var(--highlight);
        }

        .quick-feelings {
            text-align: center;
            background: rgba(28, 37, 65, 0.4);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .feeling-btn {
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feeling-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        footer {
            margin-top: 40px;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>الموسوعة الروحية الشاملة: أذكار يومية، سير العظماء، ومحرك الطمأنينة النفسية</p>
    </header>

    <div class="main-container">
        
        <!-- قسم الأذكار -->
        <div class="azkar-section">
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">🌅 أذكار الصباح (15)</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">🌆 أذكار المساء (15)</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">🛏️ أذكار النوم (15)</button>
            </div>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">جاري إعداد حصنك اليومي...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>

            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق ➡️</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 0</button>
                <button class="nav-btn" onclick="nextZkr()">⬅️ التالي</button>
            </div>
        </div>

        <!-- قسم البحث عن الصحابة -->
        <div class="search-container">
            <h3 class="search-section-title">🕌 موسوعة سير الصحابة (أبرز 25 صحابياً):</h3>
            <div class="search-box">
                <input type="text" id="companionInput" placeholder="اكتب اسم الصحابي (مثال: أبو بكر، عمر، خالد بن الوليد، بلال...)" onkeypress="handleCompanionPress(event)">
                <button class="search-btn companions-btn" onclick="searchCompanion()">اقرأ قصته</button>
            </div>
            <div id="companionResult" class="search-result"></div>
        </div>

        <!-- قسم الفضفضة النفسية -->
        <div class="search-container">
            <h3 class="search-section-title">الأمان النفسي والشرعي:</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك أو الموقف بالتفصيل (مثال: حاسس بكسرة خاطر، خايف من بكرة، مديون ومخنوق)" onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchFeeling()">ابحث عن طمأنينة</button>
            </div>
            <div id="searchResult" class="search-result"></div>
        </div>

        <div class="quick-feelings">
            <h3 style="color: var(--text-muted); font-weight: 500;">اضغط سريعاً حسب ما تشعر به الآن:</h3>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('تنمر')">🗣️ التنمر</button>
                <button class="feeling-btn" onclick="quickSearch('حسد')">👁️ الحسد والعين</button>
                <button class="feeling-btn" onclick="quickSearch('كلام الناس')">💬 كلام الناس</button>
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 الضيق والخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('قلقان')">😨 الخوف والقلق</button>
                <button class="feeling-btn" onclick="quickSearch('ديون')">💵 قلة الرزق</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ الظلم والخذلان</button>
                <button class="feeling-btn" onclick="quickSearch('ذنب')">💔 التوبة والذنب</button>
                <button class="feeling-btn" onclick="quickSearch('مرض')">🩺 المرض والألم</button>
            </div>
        </div>

    </div>

    <footer>
        <p>طمئن قلبك © 2026 | أذكار تفاعلية وموسوعة نفسية وتاريخية متكاملة</p>
    </footer>

    <script>
    // قاعدة بيانات الأذكار
    const azkarData = {
        morning: [
            { text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} (سورة البقرة: 255)", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...} (3 مرات)", reward: "فضلها: تكفيك من كل شيء.", count: 3 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...} (3 مرات)", reward: "فضلها: تحميك من شرور النفاثات والحاسدين.", count: 3 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...} (3 مرات)", reward: "فضلها: وسيلة للوقاية من وساوس الصدر والأنفس.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ.", reward: "فضلها: تجلب توفيق اليوم وتدفع أقدار السوء الخفية.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.", reward: "فضلها: (سيد الاستغفار) من قالها موقناً بها ومات من يومه دخل الجنة.", count: 1 },
            { text: "اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ.", reward: "فضلها: من قالها 4 مرات أعتقه الله من النار في ذلك اليوم.", count: 4 },
            { text: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", reward: "فضلها: لم يضره أي شيء أو مصيبة فجائية طوال يومه.", count: 3 },
            { text: "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.", reward: "فضلها: من قالها 7 مرات كفاه الله ما أهمه من أمر الدنيا والآخرة.", count: 7 },
            { text: "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا.", reward: "فضلها: كان حقاً على الله سبحانه أن يرضيه يوم القيامة.", count: 3 },
            { text: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.", reward: "فضلها: تحميك من التشتت والقرارات الخاطئة وتسلم أمرك لله.", count: 1 },
            { text: "أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ.", reward: "فضلها: تجديد للعهد والتوحيد في أول الأنفاس بالصباح.", count: 1 },
            { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِتَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.", reward: "فضلها: تعدل ساعات طويلة جداً من التسبيح والذكر والأجر.", count: 3 },
            { text: "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ.", reward: "فضلها: تُكفى بها الهموم وتُغفر بها الذنوب وتنال شفاعة الحبيب.", count: 10 },
            { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", reward: "فضلها: كانت له حرزاً من الشيطان وكُتبت له مائة حسنة.", count: 100 }
        ],
        evening: [
            { text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} (سورة البقرة: 255)", reward: "فضلها: حارس سماوي يحميك من الشياطين حتى تصبح.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...} (3 مرات)", reward: "فضلها: أمان وحصن واقي طوال الليل.", count: 3 },

        { name: "مصعب بن عمير", title: "أول سفير في الإسلام", story: "شاب مكة المدلل وفتى الترف، ترك الثراء والحرير من أجل الإسلام. بعثه النبي ليثرب فأسلمت المدينة على يديه، واستشهد في أحد وهو يحمل الراية ولم يجدوا كفناً يغطي كامل جسده." },
        { name: "عمرو بن العاص", title: "داهية العرب، فاتح مصر", story: "تميز بذكائه السياسي والعسكري الفذ. قاد جيوش المسلمين لفتح الشام ثم توجه لفتح مصر وتأمين حدود الدولة الإسلامية الإفريقية وأصبح والياً عليها." },
        { name: "أبو أيوب الأنصاري", title: "مضيف الرسول", story: "خالد بن زيد، الذي تشرف بنزول النبي ﷺ ضيفاً في بيته عند وصوله للمدينة بالهجرة. ظل يجاهد طوال حياته حتى توفي شيخاً كبيراً تحت أسوار القسطنطينية ودفن هناك." ]
    ];

    // قاعدة البيانات النفسية والشرعية
    const database = {
        "social_harm": { title: "مواقف الأذى الاجتماعي (التنمر، السخرية، الاستهزاء)", ayah: "«يَا أَيُّهَا الَّذِينَ آمَنُوا لَا يَسْخَرْ قَوْمٌ مِّن قَوْمٍ عَسَىٰ أَن يَكُونُوا خَيْرًا مِّنْهُمْ...» [الحجرات: 11].", hadith: "«بِحَسْبِ امْرِئٍ مِنَ الشَّرِّ أَنْ يَحْقِرَ أَخَاهُ الْمُسْلِمَ...»", protection: "(اللهم اكفني شر خلقك بما شئت وكيف شئت، واصرف عني ألسنتهم وأذاهم).", comfort: "العالم مليء بالجهلاء، قيمتك الحقيقية عند الله وليست في ألسنتهم. ارفع رأسك." },
        "people_talk": { title: "مواقف كلام الناس والاشاعات والغيبة والنميمة", ayah: "«وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ بِمَا يَقُولُونَ ۝ فَسَبِّحْ بِحَمْدِ رَبِّكَ وَكُن مِّنَ السَّاجِدِينَ» [الحجر: 97-98].", hadith: "«لما عرج بي مررت بقوم لهم أظفار من نحاس يخموشون وجوههم وصدورهم...»", protection: "(اللهم طهر عرضي من غيبة الغائبين ونميمة النمامين، واجعلني خيراً مما يظنون).", comfort: "كلامهم يملأ صحائف سيئاتهم ويرفع درجاتك، دعهم في غيهم واطمئن للعدل الإلهي." },
        "envy_magic": { title: "الحسد، العين، السحر، الخوف من زوال النعمة", ayah: "«أَمْ يَحْسُدُونَ النَّاسَ عَلَىٰ مَا آتَاهُمُ اللَّهُ مِن فَضْلِهِ» [النساء: 54].", hadith: "«العَيْنُ حَقٌّ، ولو كانَ شيءٌ سابَقَ القَدَرَ سَبَقَتْهُ العَيْنُ»", protection: "(بسم الله أرقيك من كل شيء يؤذيك، من شر كل نفس أو عين حاسد الله يشفيك).", comfort: "الملك ملكه والقدر قدره، وحصنك بالأذكار يبطل مكر الإنس والجن ولو اجتمعوا عليك." },
        "depression_sadness": { title: "الحزن الشديد، الاكتئاب، ضيق الصدر، الخنقة", ayah: "«...فَنَادَىٰ فِي الظُّلُمَاتِ أَن لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ ۝ فَاسْتَجَبْنَا لَهُ وَنَجَّيْنَاهُ مِنَ الْغَمِّ...» [الأنبياء: 87-88].", hadith: "«مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ وَلَا حُزْنٍ... إِلَّا كَفَّرَ اللَّهُ بِهَا مِنْ خَطَايَاهُ».", protection: "(اللهم إني أعوذ بك من الهم والحزن، والعجز والكسل.. واجعل القرآن ربيع قلبي).", comfort: "هذه الغمامة ستمر، والضيق الذي تشعر به هو بداية لفرج مدهش يغسل أثره." },
        "fear_future": { title: "الخوف، القلق، التوتر، الامتحانات، المستقبل، الفشل", ayah: "«قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا هُوَ مَوْلَانَا...» [التوبة: 51].", hadith: "«احْرِصْ عَلَى مَا يَنْفَعُكَ، وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجَزْ»", protection: "(اللهم لا سهل إلا ما جعلته سهلاً، اللهم خر لي واختر لي واكفني ما أهمني).", comfort: "لا تقلق من الغد، فالمستقبل الذي تخاف منه يدبره جبار السماوات والأرض برحمته ولطفه." },
        "money_debts": { title: "الرزق، الديون، الفقر، قلة المال، ضيق الحال", ayah: "«إِنَّ اللَّهَ هُوَ الرَّزَّاقُ ذُو الْقُوَّةِ الْمَتِينُ» [الذاريات: 58].", hadith: "«اللهم إني أعوذ بك من غلبة الدين وقهر الرجال».", protection: "(اللهم اكفني بحلالك عن حرامك، وأغنني بفضلك عمن سواك).", comfort: "الأرزاق مقسومة ومكتوبة من قبل خلق الأرض، اسع بالأسباب والباب سيفتح فجأة بالاستغفار." },
        "injustice_loneliness": { title: "الظلم، القهر، الخذلان، الوحدة، الفراق", ayah: "«وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ...» [إبراهيم: 42].", hadith: "«وعزتي وجلالي لأنصرنك ولو بعد حين».", protection: "(حسبي الله ونعم الوكيل، اللهم فوضت أمري إليك وآنس وحشتي واجبر قلبي).", comfort: "دعوتك صعدت ومظلمتك عند الله محفوظة. نم هادئاً، فالمحكمة الإلهية لا تظلم أحداً." },
        "sins_repentance": { title: "الذنوب، المعصية، التقصير، الغفلة، التوبة", ayah: "«قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَىٰ أَنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ...» [الزمر: 53].", hadith: "«لو لَمْ تُذْنِبُوا لَذَهَبَ اللَّهُ بِكُمْ، وَلَجَاءَ بِقَوْمٍ يُذْنِبُونَ فَيَسْتَغْفِرُونَ...»", protection: "(اللهم أنت ربي لا إله إلا أنت خلقتني وأنا عبدك.. أبوء لك بذنبي فاغفر لي).", comfort: "طالما أنك تشعر بالندم، فقلبك حي. الله ينتظر توبتك ليفرح بها، امسح الماضي وابدأ من جديد." },
        "sickness_pain": { title: "المرض، التعب، الوجع، الألم الجسدي والابتلاء", ayah: "«...وَإِذَا مَرِضْتُ فَهو يشفين» [الشعراء: 80].", hadith: "«ضع يدك على الذي تألم من جسدك وقل باسم الله ثلاثاً...»", protection: "(اللهم رب الناس أذهب البأس، واشفِ أنت الشافي، لا شفاء إلا شفاؤك).", comfort: "ألمك يطهرك من الذنوب ويرفع درجاتك في الجنة، الشافي قريب جداً وسيبدلك صحة وعافية." }
    };

    const keywordsMap = {
        "social_harm": ["تنمر", "متنمر", "بيتنمروا", "سخرية", "تريقة", "بيتريقوا", "اهانة", "اذى", "استهزاء"],
        "people_talk": ["كلام الناس", "قالوا", "يقولون", "بيتكلموا", "اشاعة", "غيبة", "نميمة", "انتقاد"],
        "envy_magic": ["حسد", "حاسد", "حسدوني", "العين", "عين", "نظرة", "سحر", "مسحور", "عمل"],
        "depression_sadness": ["حزين", "حزن", "غم", "هم", "مهموم", "اكتئاب", "مكتئب", "مكسور", "دموع", "بكاء", "ابكي", "مخنوق", "خنقة", "ضيق", "متضايق"],
        "fear_future": ["خايف", "خوف", "قلق", "قلقان", "متوتر", "مستقبل", "بكرة", "امتحان", "مذاكرة", "فشل"],
        "money_debts": ["الرزق", "رزق", "فلوس", "مال", "فقر", "شغل", "وظيفة", "ديون", "دين", "مديون", "مفلس"],
        "injustice_loneliness": ["مظلوم", "ظلم", "قهر", "مقهور", "خذلان", "مخذول", "خيانة", "وحيد", "وحدة", "فراق"],
        "sins_repentance": ["مذنب", "ذنب", "معصية", "غلطت", "التوبة", "تقصير", "غفلة", "وسوسة"],
        "sickness_pain": ["مريض", "المرض", "مرض", "تعب", "وجع", "ألم", "ابتلاء", "الموت", "وجعان"]
    };

    // متغيرات العدادات والتحكم
    let currentCategory = 'morning';
    let currentIndex = 0;
    let userCount = 0;

    // دالة تحديث وعرض الذكر والعداد والبار بالشكل الصحيح
    function loadZkr() {
        const currentList = azkarData[currentCategory];
        const zkr = currentList[currentIndex];
        
        // طباعة النصوص داخل المربعات
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        
        // تعديل العداد وعرضه بشكل واضح وصحيح (الحالي أولاً ثم المطلوب)
        const btn = document.getElementById("counterBtn");
        if (userCount >= zkr.count) {
            btn.classList.add("done");
            btn.innerText = `✓ تم (${zkr.count})`;
        } else {
            btn.classList.remove("done");
            btn.innerText = `${userCount} / ${zkr.count}`;
        }

        // تحديث شريط التمرحل الإجمالي
        const percent = ((currentIndex + 1) / currentList.length) * 100;
        document.getElementById("progressBar").style.width = `${percent}%`;
    }

    // دالة النقر على زر العد
    function countZkr() {
        const currentList = azkarData[currentCategory];
        const max = currentList[currentIndex].count;
        
        if (userCount < max) {
            userCount++;
            loadZkr(); // إعادة تحميل العرض لتحديث الرقم فوراً
        } else {
            nextZkr(); 
        }
    }

    // الانتقال للذكر التالي
    function nextZkr() {
        const currentList = azkarData[currentCategory];
        if (currentIndex < currentList.length - 1) {
            currentIndex++;
            userCount = 0; // تصفير العداد للذكر الجديد
            loadZkr();
        } else {
            alert("ما شاء الله، كتب الله أجرك! لقد أتممت الـ 15 ذكراً كاملة لهذه المجموعة بنجاح وجعلها الله في ميزان حسناتك 🤍");
        }
    }

    // العودة للذكر السابق
    function prevZkr() {
        if (currentIndex > 0) {
            currentIndex--;
            userCount = 0; // تصفير العداد للذكر العائد له
            loadZkr();
        }
    }

    // التنقل بين تصنيفات الأذكار (صباح / مساء / نوم)
    function switchAzkar(category) {
        currentCategory = category;
        currentIndex = 0;
        userCount = 0;
        
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        
        loadZkr();
    }

    // تنظيف النصوص العربية
    function cleanArabicText(text) {
        if (!text) return "";
        return text
            .trim()
            .replace(/[ًٌٍَُِّْ]/g, "") 
            .replace(/[أإآ]/g, "ا")     
            .replace(/ة/g, "ه")        
            .replace(/ى/g, "ي");       
    }

    // محرك بحث الصحابة
    function searchCompanion() {
        const input = document.getElementById("companionInput").value;
        const cleanedInput = cleanArabicText(input);
        const resultContainer = document.getElementById("companionResult");

        if (!cleanedInput) {
            resultContainer.innerHTML = `<div class="result-card companion-card" style="border-right-color: #e63946;">يرجى كتابة اسم الصحابي للبحث عن سيرته العطرة.</div>`;
            return;
        }

        let matchedCompanion = companionsData.find(c => cleanArabicText(c.name).includes(cleanedInput));

        if (matchedCompanion) {
            resultContainer.innerHTML = `
                <div class="result-card companion-card">
                    <h3 style="color: var(--companions-color); margin-bottom: 10px;">🕌 ${matchedCompanion.name} (رضي الله عنه)</h3>
                    <p><span class="section-title companion-title">🏷️ اللقب والتعريف:</span><br>${matchedCompanion.title}</p>
                    <p><span class="section-title companion-title">📜 من سيرته وقصته:</span><br>${matchedCompanion.story}</p>
                </div>
            `;
        } else {
            resultContainer.innerHTML = `
                <div class="result-card companion-card" style="border-right-color: var(--highlight);">
                    <h3 style="color: var(--highlight); margin-bottom: 10px;">🔍 لم نجد الصحابي المطلوب بدقة</h3>
                    <p>تأكد من كتابة الاسم بشكل صحيح (مثال: "أبو بكر"، "عمر"، "خالد"، "بلال"، "عثمان"). تحتوي هذه الموسوعة على أبرز 25 صحابياً من قادة وسلف الأمة العظماء.</p>
                </div>
            `;
        }
    }

    function handleCompanionPress(event) {
        if (event.key === "Enter") {
            searchCompanion();
        }
    }

    // محرك البحث النفسي والوجداني
    function searchFeeling() {
        const input = document.getElementById("searchInput").value;
        const cleanedInput = cleanArabicText(input);
        const resultContainer = document.getElementById("searchResult");
        
        if (!cleanedInput) {
            resultContainer.innerHTML = `<div class="result-card" style="border-right-color: #e63946;">يرجى كتابة كلمات تعبر عن شعورك أولاً حتى نتمكن من مساعدتك.</div>`;
            return;
        }

        let foundKey = null;

        for (const key in keywordsMap) {
            for (const keyword of keywordsMap[key]) {
                const cleanedKeyword = cleanArabicText(keyword);
                if (cleanedInput.includes(cleanedKeyword)) {
                    foundKey = key;
                    break;
                }
            }
            if (foundKey) break;
        }

        if (foundKey && database[foundKey]) {
            const data = database[foundKey];
            resultContainer.innerHTML = `
                <div class="result-card">
                    <h3 style="color: var(--primary-color); margin-bottom: 10px;">🩺 تشخيص الجرح الروحي: ${data.title}</h3>
                    <p><span class="section-title">📖 من القرآن الكريم:</span><br>${data.ayah}</p>
                    <p><span class="section-title">💬 من السنة النبوية:</span><br>${data.hadith}</p>
                    <p><span class="section-title">🛡️ دعاء الوقاية والتحصين:</span><br><strong style="color: var(--highlight);">${data.protection}</strong></p>
                    <p><span class="section-title">🤍 جرعة طمأنينة لقلبك:</span><br>${data.comfort}</p>
                </div>
            `;
        } else {
            resultContainer.innerHTML = `
                <div class="result-card" style="border-right-color: var(--highlight);">
                    <h3 style="color: var(--highlight); margin-bottom: 10px;">🤍 لم نجد تطابقاً دقيقاً لفضفضتك، ولكن إليك هذه السكينة العامة:</h3>
                    <p><span class="section-title">📖 آية تسع قلبك:</span><br>«الَّذِينَ آمَنُوا وَتَطْمَئِنُّ قُلُوبُهُمْ بِذِكْرِ اللَّهِ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ قُلُوبُهُمْ» [الرعد: 28].</p>
                    <p><span class="section-title">🛡️ حصن شامل:</span><br>اكثر من قول: (لا حول ولا قوة إلا بالله العلي العظيم) فإنها دواء لـ 99 داء أيسرهم الهم.</p>
                    <p><span class="section-title">🤍 رسالة لك:</span><br>الله يسمع دقات قلبك المجهدة ويعلم تفاصيل ما يؤذيك، سلم أمرك له وستفرج قريباً.</p>
                </div>
            `;
        }
    }

    function quickSearch(feeling) {
        document.getElementById("searchInput").value = feeling;
        searchFeeling();
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            searchFeeling();
        }
    }

    // إطلاق التشغيل الآمن والنهائي بمجرد تجهيز المتصفح لكافة العناصر والوسوم
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", loadZkr);
    } else {
        loadZkr();
    }
    </script>
</body>
</html>
