<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - مساحتك الروحية</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #48cae4;
            --accent-color: #5bc0be;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-color);
            color: var(--bg-color);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background-color: var(--accent-color);
            transform: scale(1.02);
        }

        .search-result {
            width: 100%;
            min-height: 50px;
            text-align: right;
        }

        .result-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-right: 5px solid var(--primary-color);
            line-height: 1.8;
            font-size: 1.15rem;
            animation: fadeIn 0.5s ease;
        }

        .quick-feelings {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .quick-feelings h3 {
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .feeling-btn {
            padding: 15px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .feeling-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .feeling-btn span {
            font-size: 1.5rem;
        }

        footer {
            margin-top: auto;
            padding: 30px 0 10px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>مساحتك الهادئة للاستراحة، الاطمئنان، وراحة البال بذكر الله</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="اكتب ما تشعر به الآن.. (مثال: مخنوق، خايف، فاشل، الرزق)">
            <button onclick="searchFeeling()">ابحث</button>
        </div>
        <div id="searchResult" class="search-result"></div>
    </div>

    <div class="quick-feelings">
        <h3>أو اختر حالتك الحالية مباشرة:</h3>
        <div class="buttons-grid">
            <button class="feeling-btn" onclick="quickSearch('حزين')"><span>😔</span>حزن وغم</button>
            <button class="feeling-btn" onclick="quickSearch('خايف')"><span>😨</span>خوف وقلق</button>
            <button class="feeling-btn" onclick="quickSearch('مخنوق')"><span>😣</span>ضيق وصدر</button>
            <button class="feeling-btn" onclick="quickSearch('مذنب')"><span>💔</span>توبة وذنب</button>
            <button class="feeling-btn" onclick="quickSearch('تعبان')"><span>😫</span>مرض وتعب</button>
            <button class="feeling-btn" onclick="quickSearch('وحيد')"><span>👤</span>وحدة وغربة</button>
            <button class="feeling-btn" onclick="quickSearch('غضب')"><span>😡</span>غضب وعصبية</button>
            <button class="feeling-btn" onclick="quickSearch('الرزق')"><span>💵</span>الرزق والدين</button>
            <button class="feeling-btn" onclick="quickSearch('مشتت')"><span>🤔</span>حيرة وتشتت</button>
            <button class="feeling-btn" onclick="quickSearch('مظلوم')"><span>⚖️</span>ظلم وقهر</button>
        </div>
    </div>

    <footer>
        <p>صُنع بكل حب ليلامس قلبك بآيات الله وسنة رسوله | طمئن قلبك © 2026</p>
    </footer>

    <script>
    // قاعدة البيانات الشاملة المبنية على الآيات والأحاديث والأدعية
    const searchDatabase = {
        // 1. الحزن والكسرة والغم
        "حزين": "📖 آية: «وَلَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا» [التوبة: 40].<br>💬 حديث: قال ﷺ: «مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ وَلَا حُزْنٍ وَلَا أَذًى وَلَا غَمٍّ، حَتَّى الشَّوْكَةِ يُشَاكُهَا، إِلَّا كَفَّرَ اللَّهُ بِهَا مِنْ خَطَايَاهُ».<br>🤲 دعاء: (اللهم إني أعوذ بك من الهم والحزن).",
        "زعلان": "📖 آية: «وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَىٰ» [الضحى: 5].<br>💬 حديث: «عَجَبًا لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ خَيْرٌ».<br>🤲 دعاء: (يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين).",
        "مكسور": "📖 آية: «وَاصْبِرْ لِحُكْمِ رَبِّكَ فَإِنَّكَ بِأَعْيُنِنَا» [الطور: 48].<br>💬 حديث: كان ﷺ يدعو بين السجدتين: «اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاجْبُرْنِي».<br>🤲 دعاء: (اللهم يا جابر كسر المنكسرين، اجبر خاطري وقرّ عيني بما أتمنى).",
        "دموع": "📖 آية: «تَرَىٰ أَعْيُنَهُمْ تَفِيضُ مِنَ الدَّمْعِ مِمَّا عَرَفُوا مِنَ الْحَقِّ» [المائدة: 83].<br>💬 حديث: «عَيْنَانِ لَا تَمَسُّهُمَا النَّارُ: عَيْنٌ بَكَتْ مِنْ خَشْيَةِ اللَّهِ...».<br>🤲 دعاء: (اللهم ابدل دمعتي فرحاً، وضيق صدري إنشراحاً وطمأنينة).",
        "بكاء": "📖 آية: «وَأَنَّهُ هُوَ أَضْحَكَ وَأَبْكَىٰ» [النجم: 43].<br>💬 حديث: كان النبي ﷺ إذا حزبه أمر (أقلقه) فزع إلى الصلاة.<br>🤲 دعاء: (اللهم ارحم ضعفي واكشف همي وافتح لي أبواب رحمتك وفرحك).",
        "ببكي": "📖 آية: «فَسَيَكْفِيكَهُمُ اللَّهُ ۚ وَهُوَ السَّمِيعُ الْعَلِيمُ» [البقرة: 137].<br>🤲 دعاء: (اللهم اجعل من كل هم فرجاً ومن كل ضيق مخرجاً).",
        "الدموع": "📖 آية: «لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا».. فرج الله قريب جداً وسيمسح أثر دمعك.",

        // 2. الضيق والخنقة والاكتئاب والصدر
        "مخنوق": "📖 آية: «وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ بِمَا يَقُولُونَ * فَسَبِّحْ بِحَمْدِ رَبِّكَ وَكُن مِّنَ السَّاجِدِينَ» [الحجر: 97-98].<br>🤲 دعاء الكرب: (لا إله إلا الله العظيم الحليم، لا إله إلا الله رب العرش العظيم، لا إله إلا الله رب السماوات ورب الأرض ورب العرش الكريم).",
        "ضيق": "📖 آية: «فَإِنَّ مَعَ الْعُسْرِ يُسْرًا * إِنَّ مَعَ الْعُسْرِ يُسْرًا» [الشرح: 5-6].<br>💬 حديث: «وَاعْلَمْ أَنَّ الْفَرَجَ مَعَ الْكَرْبِ، وَأَنَّ مَعَ الْعُسْرِ يُسْرًا».<br>🤲 دعاء: (اللهم اشرح لي صدري ويسر لي أمري).",
        "تعبان": "📖 آية: «أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ» [الأنبياء: 83].<br>💬 حديث: «إِذَا أَرَادَ اللَّهُ بِعَبْدِهِ الْخَيْرَ عجَّلَ لَهُ الْعُقُوبَةَ فِي الدُّنْيَا».<br>🤲 دعاء: (اللهم أرح قلبي وفكري، واصرف عني شتات العقل والتعب).",
        "مهموم": "📖 آية: «وَتَوَلَّىٰ عَنْهُمْ وَقَالَ يَا أَسَفَىٰ عَلَىٰ يُوسُفَ وَابْيَضَّتْ عَيْنَاهُ مِنَ الْحُزْنِ فَهُوَ كَظِيمٌ» [يوسف: 84] ثم جاء الفرج.<br>💬 حديث: من لزم الاستغفار جعل الله له من كل هم فرجاً ومن كل ضيق مخرجاً.<br>🤲 دعاء: (اللهم إني عبدك ابن عبدك... أذهب همي وأبدله فرحاً).",
        "مكتئب": "📖 آية: «أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ» [الرعد: 28].<br>💬 حديث: «أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ، فَأَكْثِرُوا الدُّعَاءَ».<br>🤲 دعاء: (اللهم يا منور القلوب، أنر ظلمة قلبي بنور ذكرك وطاعتك).",
        "اكتئاب": "📖 آية: «وَنُنَزِّلُ مِنَ الْقُرْآنِ مَا هُوَ شِفَاءٌ وَرَحْمَةٌ لِّلْمُؤْمِنِينَ» [الإسراء: 82].<br>🤲 دعاء: (اللهم اجعل القرآن العظيم ربيع قلبي، ونور صدري، وجلاء حزني، وذهاب همي).",
        "خنقة": "📖 آية: «فَنَادَىٰ فِي الظُّلُمَاتِ أَن لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ» [الأنبياء: 87].<br>💬 حديث: «دَعْوَةُ ذِي النُّونِ... لَمْ يَدْعُ بِهَا رَجُلٌ مُسْلِمٌ فِي شَيْءٍ قَطُّ إِلَّا اسْتَجَابَ اللَّهُ لَهُ».",
        "مضايق": "📖 آية: «لَا تَدْرِي لَعَلَّ اللَّهَ يُحْدِثُ بَعْدَ ذَٰلِكَ أَمْرًا» [الطلاق: 1].<br>🤲 دعاء: (حسبي الله ونعم الوكيل، فوضت أمري إلى الله).",
        "زهقان": "📖 آية: «يَا أَيُّهَا النَّاسُ قَدْ جَاءَتْكُم مَّوْعِظَةٌ مِّن رَّبِّكُمْ وَشِفَاءٌ لِّمَا فِي الصُّدُورِ» [يونس: 57].<br>🤲 دعاء: (اللهم حبب إلينا الإيمان وزينه في قلوبنا).",

        // 3. الخوف والقلق والمستقبل والدراسة
        "خايف": "📖 آية: «فَلَا تَخَافُوهُمْ وَخَافُونِ إِن كُنتُم مُّؤْمِنِينَ» [آل عمران: 175] وتذكر «قَالَ لَا تَخَافَا ۖ إِنَّنِي مَعَكُمَا أَسْمَعُ وَأَرَىٰ».<br>💬 حديث: «احْفَظِ اللَّهَ يَحْفَظْكَ، احْفَظِ اللَّهَ تَجِدْهُ تُجَاهَكَ».<br>🤲 دعاء: (اللهم آمن روعاتي، واستر عوراتي، واحفظني من بين يدي ومن خلفي).",
        "قلقان": "📖 آية: «قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا هُوَ مَوْلَانَا» [التوبة: 51].<br>💬 حديث: «لَوْ أَنَّكُمْ تَتَوَكَّلُونَ عَلَى اللَّهِ حَقَّ تَوَكُّلِهِ لَرَزَقَكُمْ كَمَا يَرْزُقُ الطَّيْرَ».<br>🤲 دعاء: (اللهم رب السماوات والأرض، اكفني ما أهمني وأقلقني).",
        "متوتر": "📖 آية: «إِذْ يَقُولُ لِصَاحِبِهِ لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا ۖ فَأَنزَلَ اللَّهِ سَكِينَتَهُ عَلَيْهِ» [التوبة: 40].<br>🤲 دعاء: (اللهم أنزل سكينتك على قلبي، واجعلني بك مطمئناً راضياً).",
        "المستقبل": "📖 آية: «وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ» [الطلاق: 3].<br>💬 حديث: «وَاعْلَمْ أَنَّ مَا أَخْطَأَكَ لَمْ يَكُنْ لِيُصِيبَكَ، وَمَا أَصَابَكَ لَمْ يَكُنْ لِيُخْطِئَكَ».<br>🤲 دعاء: (اللهم خر لي واختر لي ولا تكلني إلى خياري).",
        "الامتحانات": "📖 آية: «وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ * وَأَنَّ سَعْيَهُ سَوْفَ يُرَىٰ» [النجم: 39-40].<br>🤲 دعاء: (اللهم لا سهل إلا ما جعلته سهلاً، وأنت تجعل الحزن إذا شئت سهلاً، يسر لي هذا الامتحان).",
        "الامتحان": "📖 آية: «رَبِّ اشْرَحْ لي صَدْري * وَيَسِّرْ لي أَمْري» [طه: 25-26].<br>🤲 دعاء: (اللهم ذكرني ما نسيت، وعلمني ما جهلت، وافتح عليّ فتوح العارفين).",
        "النتيجة": "📖 آية: «إِنَّا لَا نُضِيعُ أَجْرَ مَنْ أَحْسَنَ عَمَلًا» [الكهف: 30].<br>💬 حديث: «احْرِصْ عَلَى مَا يَنْفَعُكَ، وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجَزْ».<br>🤲 دعاء: (اللهم رضني بقضائك وبارك لي في قدري).",
        "خوف": "📖 آية: «الَّذِينَ آمَنُوا وَلَمْ يَلْبِسُوا إِيمَانَهُم بِظُلْمٍ أُولَٰئِكَ لَهُمُ الْأَمْنُ» [الأنعام: 82].<br>🤲 دعاء: (اللهم إني أعوذ بك من الخوف إلا منك، ومن الذل إلا لك).",
        "قلق": "📖 آية: «إِذْ تَسْتَغِيثُونَ رَبَّكُمْ فَاسْتَجَابَ لَكُمْ» [الأنفال: 9].<br>🤲 دعاء: (حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم).",
        "الدراسة": "📖 آية: «وَقُل رَّبِّ زِدْنِي عِلْمًا» [طه: 114].<br>💬 حديث: «مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ بِهِ طَرِيقًا إِلَى الْجَنَّةِ».",
        "المذاكرة": "📖 آية: «اقْرَأْ وَرَبُّكَ الْأَكْرَمُ * الَّذِي عَلَّمَ بِالْقَلَمِ» [العلق: 3-4].<br>🤲 دعاء: (اللهم إني أستودعك ما قرأت وما حفظت فرده إليّ عند حاجتي إليه).",

        // 4. الرزق والمال والعمل والديون
        "الرزق": "📖 آية: «وَفِي السَّمَاءِ رِزْقُكُمْ وَمَا تُوعَدُونَ» [الذاريات: 22]، وتذكر: «إِنَّ اللَّهَ هُوَ الرَّزَّاقُ ذُو الْقُوَّةِ الْمَتِينُ».<br>💬 حديث: «لَوْ أَنَّ ابْنَ آدَمَ هَرَبَ مِنْ رِزْقِهِ كَمَا يَهْرَبُ مِنَ الْمَوْتِ، لَأَدْرَكَهُ رِزْقُهُ كَمَا يُدْرِكُهُ الْمَوْتُ».<br>🤲 دعاء: (اللهم ارزقني رزقاً حلالاً طيباً مباركاً فيه).",
        "فلوس": "📖 آية: «وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا * وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ» [الطلاق: 2-3].<br>💬 حديث: «إِنَّكَ لَنْ تَدَعَ شَيْئاً لِلَّهِ عَزَّ وَجَلَّ إِلَّا بَدَّلَكَ اللَّهُ بِهِ مَا هُوَ خَيْرٌ لَكَ مِنْهُ».<br>🤲 دعاء: (اللهم أغنني بفضلك عمن سواك).",
        "فقير": "📖 آية: «وإِنْ خِفْتُمْ عَيْلَةً فَسَوْفَ يُغْنِيكُمُ اللَّهُ مِن فَضْلِهِ إِن شَاءَ» [التوبة: 28].<br>💬 حديث: كان النبي ﷺ يقول: «اللَّهُمَّ إِنِّي أَسْأَلُكَ الْهُدَى وَالتُّقَى وَالْعَفَافَ وَالْغِنَى».",
        "شغل": "📖 آية: «هُوَ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ ذَلُولًا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِن رِّزْقِهِ» [الملك: 15].<br>💬 حديث: «مَا أَكَلَ أَحَدٌ طَعَامًا قَطُّ خَيْرًا مِنْ أَنْ يَأْكُلَ مِنْ عَمَلِ يَدِهِ».",
        "وظيفة": "📖 آية: «قَالَ عَسَىٰ رَبِّي أَن يَهْدِيَنِي سَوَاءَ السَّبِيلِ» [القصص: 22].<br>🤲 دعاء: (اللهم يسر لي عملاً صالحاً يغنيني ويكون سبباً في رفعتي في الدنيا والآخرة).",
        "ديون": "📖 آية: «إِن يَكُونُوا فُقَرَاءَ يُغْنِهِمُ اللَّهُ مِن فَضْلِهِ» [النور: 32].<br>💬 حديث: علّم النبي ﷺ علياً دعاء سداد الدين: «اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ، وَأَغْنِنِي بِفَضْلِكَ عَمَّنْ سِوَاك_ فلو كان عليك مثل جبل صِيرٍ دَيْناً أداه الله عنك».",
        "دين": "💬 حديث: (اللهم إني أعوذ بك من الهم والحزن، والعجز والكسل، والبخل والجبن، وضلع الدين، وغلبة الرجال).",
        "المال": "📖 آية: «الْمَالُ وَالْبَنُونَ زِينَةُ الْحَيَاةِ الدُّنْيَا ۖ وَالْبَاقِيَاتُ الصَّالِحَاتُ خَيْرٌ عِندَ رَبِّكَ ثَوَابًا» [الكهف: 46].<br>🤲 دعاء: (اللهم بارك لي فيما رزقتني وقني عذاب النار).",

        // 5. العلاقات والمشاعر الاجتماعية والظلم
        "مظلوم": "📖 آية: «وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ» [إبراهيم: 42].<br>💬 حديث: «واتَّقِ دَعْوَةَ المَظْلُومِ، فإنَّه ليسَ بَيْنَهُ وبيْنَ اللَّهِ حِجَابٌ»، ويقول الله في الحديث القدسي لدعوة المظلوم: «وعزتي وجلالي لأنصرنك ولو بعد حين».<br>🤲 دعاء: (حسبي الله ونعم الوكيل، اللهم أرني الحق حقاً وانصرني).",
        "وحدي": "📖 آية: «وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ» [الحديد: 4].<br>📖 آية أخرى: «إِذْ يَقُولُ لِصَاحِبِهِ لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا».<br>🤲 دعاء: (اللهم آنس وحشتي، وتولّ أمري، واجعل لي من لدنك سلطاناً نصيراً).",
        "وحيد": "📖 آية: «رَبِّ لَا تَذَرْنِي فَرْدًا وَأَنتَ خَيْرُ الْوَارِثِينَ» [الأنبياء: 89].<br>💬 حديث: «أَنَا مَعَ عَبْدِي مَا ذَكَرَنِي وَتَحَرَّكَتْ بِي شَفَتَاهُ» (حديث قدسي).<br>🤲 دعاء: (يا ألوهية قلبي، يا مونس كل وحيد، كن معي واغمرني بفضلك).",
        "مخذول": "📖 آية: «وَإِن يَمْسَسْكَ اللَّهُ بِضُرٍّ فَلَا كَاشِفَ لَهُ إِلَّا هُوَ» [الأنعام: 17].<br>💬 حديث: «إِذَا سَأَلْتَ فَاسْأَلِ اللَّهَ، وَإِذَا اسْتَعَنْتَ فَاسْتَعِنْ بِاللَّهِ».<br>🤲 دعاء: (اللهم لا تكلني إلى أحد من خلقك، واجعل اعتمادي وكفايتي عليك وحدك).",
        "خيانة": "📖 آية: «إِنَّ اللَّهَ يُدَافِعُ عَنِ الَّذِينَ آمَنُوا ۗ إِنَّ اللَّهَ لَا يُحِبُّ كُلَّ خَوَّانٍ كَفُورٍ» [الحج: 38].<br>💬 حديث: «أَدِّ الأَمَانَةَ إِلَى مَنِ ائْتَمَنَكَ وَلا تَخُنْ مَنْ خَانَكَ».",
        "الفراق": "📖 آية: «وَعَسَىٰ أَن تَكْرَهُوا شَيْئًا وَهُوَ خَيْرٌ لَّكُمْ» [البقرة: 216].<br>🤲 دعاء: (اللهم أجرني في مصيبتي واخلف لي خيراً منها).",
        "اشتياق": "📖 آية: «قَالَ إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ» [يوسف: 86].<br>🤲 دعاء: (اللهم اجمعني بمن أحب في حلالك، أو اجمعني بهم في جنتك دار مستقرك).",
        "الناس": "📖 آية: «فَلَا يَحْزُنكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ» [يس: 76].<br>🤲 دعاء: (اللهم اكفني شر خلقك، واجعل كيدهم في نحورهم).",
        "الظلم": "📖 آية: «أَلَا لَعْنَةُ اللَّهِ عَلَى الظَّالِمِينَ» [هود: 18].<br>💬 حديث: «يَا عِبَادِي إِنِّي حَرَّمْتُ الظُّلْمَ عَلَى نَفْسِي وَجَعَلْتُهُ بَيْنَكُمْ مُحَرَّمًا فَلَا تَظَالَمُوا».",

        // 6. النجاح والفشل والهدف والشغف
        "فاشل": "📖 آية: «وَاصْبِرْ وَمَا صَبْرُكَ إِلَّا بِاللَّهِ» [النحل: 127]، وتذكر: «وَالَّذِينَ جَاهَدُوا فِينَا لَنَهْدِيَنَّهُمْ سُبُلَنَا».<br>💬 حديث: «الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللَّهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ... احْرِصْ عَلَى مَا يَنْفَعُكَ، وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجَزْ».",
        "فشلت": "📖 آية: «مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ» [الضحى: 3]. أخفقت اليوم لتنجح بكرة بسيرة أقوى، استعن بالله.<br>🤲 دعاء: (اللهم سدد خطاي، وافتح لي أبواب توفيقك وهدايتك).",
        "يائس": "📖 آية: «قَالُوا بَشَّرْنَاكَ بِالْحَقِّ فَلَا تَكُن مِّنَ الْقَانِطِينَ * قَالَ وَمَن يَقْنَطُ مِن رَّحْمَةِ رَبِّهِ إِلَّا الضَّالُّونَ» [الحجر: 55-56].<br>🤲 دعاء: (اللهم لا تجعلني من اليائسين، واجعل قلبي معلقاً برجائك وعفوك).",
        "طموح": "📖 آية: «وَفِي ذَٰلِكَ فَلْيَتَنَافَسِ الْمُتَنَافِسُونَ» [المطففين: 26].<br>💬 حديث: «إِنَّ اللَّهَ تَعَالَى يُحِبُّ مَعَالِيَ الأُمُورِ وَأَشْرَافَهَا، وَيَكْرَهُ سَفْسَافَهَا».",
        "هدفي": "📖 آية: «وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ ۚ عَلَيْهِ تَوَكَّلْتُ وَإِلَيْهِ أُنِيبُ» [هود: 88].<br>🤲 دعاء: (اللهم حقق لي غايتي وطموحي واجعل عاقبتها خيراً لي).",

        // 7. الذنوب والتوبة والروحانيات والفتور
        "مذنب": "📖 آية: «قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَىٰ أنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ ۚ إِنَّ اللَّهَ يَغْفِرُ الذُّنُوبَ جَمِيعًا» [الزمر: 53].<br>💬 حديث: «كُلُّ بَنِي آدَمَ خَطَّاءٌ وَخَيْرُ الْخَطَّائِينَ التَّوَّابُونَ».<br>🤲 دعاء: (اللهم اغفر لي ذنبي كله، دِقّه وجِلّه، وأوله وآخره).",
        "غلطت": "📖 آية: «وَالَّذِينَ إِذَا فَعَلُوا فَاحِشَةً أَوْ ظَلَمُوا أَنفُسَهُمْ ذَكَرُوا اللَّهَ فَاسْتَغْفَرُوا لِذُنُوبِهِمْ» [آل عمران: 135].<br>💬 حديث: «للهُ أَفْرَحُ بِتَوْبَةِ عَبْدِهِ مِنْ أَحَدِكُمْ سَقَطَ عَلَى بَعِيرِهِ وَقَدْ أَضَلَّهُ فِي أَرْضٍ فَلَاةٍ».",
        "تعبت من الذنب": "📖 آية: «إِنَّ الْحَسَنَاتِ يُذْهِبْنَ السَّيِّئَاتِ» [هود: 114].<br>💬 حديث: «إِنَّ عَبْدًا أَذْنَبَ ذَنْبًا فَقَالَ: رَبِّ أَذْنَبْتُ فَاغْفِرْ لِي، فَقَالَ رَبُّهُ: عَلِمَ عَبْدِي أَنَّ لَهُ رَبًّا يَغْفِرُ الذَّنبَ وَيَأْخُذُ بِهِ؟ غَفَرْتُ لِعَبْدِي...».",
        "الصلاة": "📖 آية: «وَأَقِمِ الصَّلَاةَ لِذِكْرِي» [طه: 14]، و«إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَّوْقُوتًا».<br>💬 حديث: كان ﷺ يقول لبلال: «أَرِحْنَا بِهَا يَا بِلَالُ».<br>🤲 دعاء: (ربِّ اجعلني مقيم الصلاة ومن ذريتي ربنا وتقبل دعاء).",
        "مشتت": "📖 آية: «اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ» [الفاتحة: 6].<br>🤲 دعاء: (اللهم يا مقلب القلوب ثبت قلبي على دينك، ويا مصرف القلوب صرف قلبي إلى طاعتك).",
        "ضعيف": "📖 آية: «وَخُلِقَ الْإِنسَانُ ضَعِيفًا» [النساء: 28].<br>💬 حديث: كنز من كنوز الجنة: «لا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ».<br>🤲 دعاء: (اللهم خذ بيدي، وقوّ ضعفي، واجبر كسري).",
        "الذنب": "📖 آية: «وَإِنِّي لَغَفَّارٌ لِّمَن تَابَ وَآمَنَ وَعَمِلَ صَالِحًا ثُمَّ اهْتَدَىٰ» [طه: 82].<br>🤲 دعاء سيد الاستغفار: (اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك...).",
        "توبة": "📖 آية: «يَا أَيُّهَا الَّذِينَ آمَنُوا تُوبُوا إِلَى اللَّهِ تَوْبَةً نَّصُوحًا» [التحريم: 8].<br>💬 حديث: «إِنَّ اللَّهَ يَقْبَلُ تَوْبَةَ الْعَبْدِ مَا لَمْ يُغَرْغِرْ».",
        "الاستغفار": "📖 آية: «فَقُلْتُ اسْتَغْفِرُوا رَبَّكُمْ إِنَّهُ كَانَ غَفَّارًا * يُرْسِلِ السَّمَاءَ عَلَيْكُم مِّدْرَارًا * وَيُمْدِدْكُم بِأَمْوَالٍ وَبَنِينَ» [نوح: 10-12].",

        // 8. الموت والابتلاء والمرض والصحة
        "مريض": "📖 آية: «وَإِذَا مَرِضْتُ فَهُوَ يَشْفِينِ» [الشعراء: 80].<br>💬 حديث: قال ﷺ: «ضَعْ يَدَكَ عَلَى الَّذِي تَأَلَّمَ مِنْ جَسَدِكَ، وَقُلْ: بِاسْمِ اللَّهِ (ثَلَاثًا)، وَقُلْ سَبْعَ مَرَّاتٍ: أَعُوذُ بِاللَّهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ».<br>🤲 دعاء: (اللهم رب الناس أذهب البأس، اشفِ أنت الشافي لا شفاء إلا شفاؤك).",
        "تعبانة": "📖 آية: «أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ» [الأنبياء: 83].<br>💬 حديث: «مَا مِنْ مُسْلِمٍ يُصِيبُهُ أَذًى مِنْ مَرَضٍ فَمَا سِوَاهُ إِلَّا حَطَّ اللَّهُ بِهِ سَيِّئَاتِهِ كَمَا تَحُطُّ الشَّجَرَةُ وَرَقَهَا».",
        "الموت": "📖 آية: «كُلُّ نَفْسٍ ذَائِقَةُ الْمَوْتِ ۗ وَإِنَّمَا تُوَفَّوْنَ أُجُورَكُمْ يَوْمَ الْقِيَامَةِ» [آل عمران: 185].<br>🤲 دعاء: (اللهم أحسن عاقبتنا في الأمور كلها، وتوفنا وأنت راضٍ عنا غير خزايا ولا مفتونين).",
        "مات": "📖 آية: «الَّذِينَ إِذَا أَصَابَتْهُم مُّصِيبَةٌ قَالُوا إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ» [البقرة: 156].<br>💬 حديث: «إِذَا مَاتَ الْإِنْسَانُ انْقَطَعَ عَنْهُ عَمَلُهُ إِلَّا مِنْ ثَلَاثَةٍ: صَدَقَةٍ جَارِيَةٍ، أَوْ عِلْمٍ يُنْتَفَعُ بِهِ، أَوْ وَلَدٍ صَالِحٍ يَدْعُو لَهُ».<br>🤲 دعاء: (اللهم اغفر له وارحمه وعافه واعف عنه).",
        "ابتلاء": "📖 آية: «وَلَنَبْلُوَنَّكُم بِشَيْءٍ مِّنَ الْخَوْفِ وَالْجُوعِ وَنَقْصٍ مِّنَ الْأَمْوَالِ وَالْأَنفُسِ وَالثَّمَرَاتِ ۗ وَبَشِّرِ الصَّابِرِينَ» [البقرة: 155].<br>💬 حديث: «إِنَّ عِظَمَ الْجَزَاءِ مَعَ عِظَمِ الْبَلَاءِ، وَإِنَّ اللَّهَ إِذَا أَحَبَّ قَوْمًا ابْتَلَاهُمْ».",

        // 9. الزواج والحياة الأسرية والعزوبية
        "الزواج": "📖 آية: «وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً» [الروم: 21].<br>🤲 دعاء: «رَبَّنَا هَبْ لَنَا مِنْ أَزْوَاجِنَا وَذُرِّيَّاتِنَا قُرَّةَ أَعْيُنٍ وَجَعَلْنَا لِلْمُتَّقِينَ إِمَامًا» [الفرقان: 74].",
        "العزوبية": "📖 آية: «وَلْيَسْتَعْفِفِ الَّذِينَ لَا يَجِدُونَ نِكَاحًا حَتَّىٰ يُغْنِيَهُمُ اللَّهُ مِن فَضْلِهِ» [النور: 33].<br>🤲 دعاء: (اللهم ارزقني زوجاً صالحاً / زوجة صالحة تقر بها عيني وتعينني على طاعتك).",
        "الحب": "💬 حديث: «لَمْ نَرَ لِلْمُتَحَابِّينَ مِثْلَ النِّكَاحِ» (رواه ابن ماجه). حصّن قلبك واجعله لله وفي رضا الله دائمًا.",
        "أهلي": "📖 آية: «وَبِالْوَالِدَيْنِ إِحْسَانًا» [الإسراء: 23].<br>🤲 دعاء: «رَّبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا» [الإسراء: 24]، و(اللهم احفظ أهلي واجمعنا على طاعتك).",

        // 10. كلمات وجدانية عامة للاطمئنان اليومي السريع
        "تعب": "📖 آية: «أَلَيْسَ اللَّهُ بِكَافٍ عَبْدَهُ» [الزمر: 36].<br>🤲 دعاء تفويض الأمر: «وَأُفَوِّضُ أَمْرِي إِلَى اللَّهِ ۚ إِنَّ اللَّهَ بَصِيرٌ بِالْعِبَادِ» [غافر: 44].",
        "يارب": "📖 آية: «وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ ۖ أُجِيبُ دَعْوَةَ الدَّاعِ إِذَا دَعَانِ» [البقرة: 186].<br>💬 حديث قدسي: «أَنَا عِنْدَ ظَنِّ عَبْدِي بِي، وَأَنَا مَعَهُ إِذَا ذَكَرَنِي».",
        "الله": "📖 آية: «اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ» [آل عمران: 2]. هو الحي الذي لا يموت، والملجأ والمستند في السراء والضراء.",
        "طمئني": "📖 آية: «الَّذِينَ آمَنُوا وَتَطْمَئِنُّ قُلُوبُهُم بِذِكْرِ اللَّهِ ۗ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ» [الرعد: 28]. طمأن الله قلبك ويسر دربك.",
        "الراحة": "📖 آية: «جَنَّاتُ عَدْنٍ يَدْخُلُونَهَا تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ ۖ لَهُمْ فِيهَا مَا يَشَاؤُونَ» [النحل: 31]. الراحة التامة هناك، وهنا بالرضا والتسليم.",
        "الحمدلله": "📖 آية: «لَئِن شَكَرْتُمْ لَأَزِيدَنَّكُمْ» [إبراهيم: 7].<br>💬 حديث: «الْحَمْدُ لِلَّهِ تَمْلأُ الْمِيزَانَ». الحمد لله رب العالمين حمداً كثيراً طيباً.",
        "مستقبلي": "📖 آية: «وَكَانَ أَمْرُ اللَّهِ قَدَرًا مَّقْدُورًا» [الأحزاب: 38]. فوض أمرك كله لله ولا تقلق من الغيب."
    };

    // دالة البحث الذكية لربط الكلمات والمشاعر
    function searchFeeling() {
        const input = document.getElementById("searchInput").value.trim().toLowerCase();
        const resultBox = document.getElementById("searchResult");
        
        if (input === "") {
            resultBox.innerHTML = "<p style='color: var(--text-muted);'>من فضلك اكتب كلمة أو شعور في الخانة للبحث.</p>";
            return;
        }
        
        // البحث عن تطابق الكلمة في قاعدة البيانات
        let foundMessage = "";
        for (let key in searchDatabase) {
            if (input.includes(key) || key.includes(input)) {
                foundMessage = searchDatabase[key];
                break;
            }
        }
        
        if (foundMessage !== "") {
            resultBox.innerHTML = `
                <div class="result-card">
                    <p style="color: var(--text-color); font-weight: 500; text-align: justify;">${foundMessage}</p>
                </div>
            `;
        } else {
            resultBox.innerHTML = `
                <div class="result-card" style="border-right-color: var(--text-muted);">
                    <p style="color: var(--text-muted);">لم نجد هذه الكلمة بالضبط، ولكن تذكر دائماً: «أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ». جرب كلمات بديلة مثل (مخنوق، حزين، خايف، الرزق، توبة).</p>
                </div>
            `;
        }
    }

    // دالة للضغط السريع من الأزرار
    function quickSearch(word) {
        document.getElementById("searchInput").value = word;
        searchFeeling();
    }
    </script>
