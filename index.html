<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكار وطمأنينة</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --text-color: #ffffff;
            --primary-blue: #38bdf8;
            --btn-color: #2dd4bf;
            --highlight: #facc15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* التصميم المطابق لـ image_a4af3a.png */
        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            color: var(--primary-blue);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .zkr-text {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reward {
            color: var(--highlight);
            font-size: 1.1rem;
            margin-bottom: 30px;
            min-height: 40px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* الزر الفيروزي الكبير المماثل للصورة */
        .action-btn {
            flex: 1;
            background-color: var(--btn-color);
            color: #0b132b;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .action-btn.done {
            background-color: #10b981;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">✨ أذكار وطمأنينة</div>
        
        <!-- النص الأول يظهر فوراً بدون جافا سكريبت لمنع أي شاشة تحميل قديمة -->
        <div id="zkrText" class="zkr-text">بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ...</div>
        <div id="zkrReward" class="reward">لم يضره أي شيء أو فجأة بلاء حتى يصبح.</div>

        <div class="controls">
            <button class="nav-btn" onclick="prev()">السابق</button>
            <button id="mainBtn" class="action-btn" onclick="handleClick()">
                <span>الذكر التالي</span> ➡️
            </button>
            <button class="nav-btn" onclick="next()">التالي</button>
        </div>
    </div>

    <script>
        // الأذكار الكاملة بالتكرار الصحيح
        const azkar = [
            { text: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ...", reward: "لم يضره أي شيء أو فجأة بلاء حتى يصبح.", count: 3 },
            { text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...}", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ}", reward: "تكفيك من كل شيء عند قراءتها ثلاث مرات.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ.", reward: "تمنحك البركة وراحة البال والنشاط في يومك.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أنتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ...", reward: "سيد الاستغفار: من قالها موقناً بها ومات من يومه دخل الجنة.", count: 1 }
        ];

        let index = 0;
        let currentProgress = 0;

        function updateUI() {
            const currentZkr = azkar[index];
            document.getElementById("zkrText").innerText = currentZkr.text;
            document.getElementById("zkrReward").innerText = currentZkr.reward;
            
            const btn = document.getElementById("mainBtn");
            
            if (currentProgress >= currentZkr.count) {
                btn.innerHTML = `<span>✓ تم (${currentZkr.count}) - التالي</span> ➡️`;
                btn.classList.add("done");
            } else {
                btn.innerHTML = `<span>الذكر التالي (${currentProgress} / ${currentZkr.count})</span> ➡️`;
                btn.classList.remove("done");
            }
        }

        function handleClick() {
            const max = azkar[index].count;
            if (currentProgress < max) {
                currentProgress++;
                updateUI();
            } else {
                next();
            }
        }

        function next() {
            if (index < azkar.length - 1) {
                index++;
                currentProgress = 0;
                updateUI();
            } else {
                alert("ما شاء الله! أتممت الأذكار بالكامل 🤍");
                index = 0;
                currentProgress = 0;
                updateUI();
            }
        }

        function prev() {
            if (index > 0) {
                index--;
                currentProgress = 0;
                updateUI();
            }
        }

        // تشغيل التحديث الأول للتأكد من العدادات
        updateUI();
    </script>
</body>
</html>
