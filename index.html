<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        /* الأزرار الرئيسية */
        .menu-box { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 25px; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
            cursor: pointer; 
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .menu-box:hover { 
            border-color: var(--primary-color); 
            transform: translateY(-3px);
            background: #222f54;
        }
        
        /* الأقسام الداخلية */
        .content-section { 
            display: none; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        
        /* تصميم العداد والتبويبات */
        .azkar-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: #000; }
        .azkar-box { background: rgba(10, 17, 40, 0.6); padding: 20px; border-radius: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; }
        .zkr-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 10px; color: #fff; }
        .zkr-reward { font-size: 0.95rem; color: var(--highlight); }
        .azkar-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .counter-btn { flex: 1; max-width: 180px; padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: #000; font-size: 1.2rem; font-weight: bold; cursor: pointer; direction: ltr; }
        .counter-btn.done { background: var(--success-color); color: #fff; }
        
        /* البحث والمشاعر والقصص */
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0a1128; color: #fff; font-size: 1rem; }
        .search-btn { padding: 0 20px; border-radius: 10px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; }
        .result-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 5px solid var(--primary-color); margin-top: 15px; line-height: 1.8; text-align: justify; }
        .buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .feeling-btn { padding: 10px; border-radius: 8px; border: none; background: #0a1128; color: #fff; cursor: pointer; font-size: 0.9rem; }
        
        /* شبكة بوكسات الصحابة */
        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; transition: all 0.2s ease; }
        .companion-card:hover { transform: translateY(-2px); background: #131f42; border-right-color: var(--accent-color); }
        .companion-card h3 { color: #fff; font-size: 1.1rem; margin-bottom: 8px; }
        .companion-card h4 { color: var(--highlight); font-size: 0.85rem; font-weight: normal; }
        
        /* النافذة المنبثقة لعرض التفاصيل عند الضغط */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 550px; width: 100%; border-radius: 20px; padding: 25px; border: 2px solid var(--primary-color); position: relative; animation: fadeIn 0.3s ease; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 1.2rem; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #ff4d4d; }
        .modal-title { color: var(--accent-color); font-size: 1.6rem; margin-bottom: 5px; margin-left: 30px; }
        .modal-subtitle { color: var(--highlight); font-size: 1rem; margin-bottom: 15px; }
        .modal-body { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; text-align: justify; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .companions-grid::-webkit-scrollbar { width: 6px; }
        .companions-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .companions-grid::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
        .hint-text { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">اختر من الأقسام الرئيسية بالأسفل</p>
    </header>

    <div class="main-container">
        
        <!-- القائمة الرئيسية -->
        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء ومواقفهم</div>
        </div>

        <!-- 1. قسم الأذكار -->
        <div id="azkarSection" class="content-section">
            <h2 class="box-title">🌅 الأذكار اليومية <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">الصباح</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">المساء</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">النوم</button>
            </div>
            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">تحميل...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>
            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 0</button>
                <button class="nav-btn" onclick="nextZkr()">التالي</button>
            </div>
        </div>

        <!-- 2. قسم المشاعر -->
        <div id="feelingsSection" class="content-section">
            <h2 class="box-title">🩹 محرك المشاعر والأمان النفسي <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك الحالي (مخنوق، خايف، مديون...)">
                <button class="search-btn" onclick="searchFeeling()">بحث</button>
            </div>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 ضيق وخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('خايف')">😨 خوف وقلق</button>
                <button class="feeling-btn" onclick="quickSearch('مديون')">💵 ضيق رزق</button>
                <button class="feeling-btn" onclick="quickSearch('حزين')">😢 حزن وهم</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ مظلومية</button>
                <button class="feeling-btn" onclick="quickSearch('مذنب')">🧎‍♂️ تقصير وذنب</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <!-- 3. قسم الصحابة -->
        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 سير الصحابة العظماء ومواقفهم <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            
            <div class="search-box">
                <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي لتصفيته فوريًا...">
            </div>
            <p class="hint-text">اضغط على بوكس أي صحابي لقراءة سيرته كاملة ومواقفه العظيمة.</p>
            
            <div id="companionsGrid" class="companions-grid"></div>
        </div>

    </div>

    <!-- النافذة المنبثقة للتفاصيل (Modal) -->
    <div id="companionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null)">×</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <h4 id="modalSubtitle" class="modal-subtitle"></h4>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
    const azkarData = {
        morning: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} [آية الكرسي]", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تصبح.", count: 1 },
            { text: "{قُلْ هُوَ اللَّهُ أَحَدٌ...} و {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...} و {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...}", reward: "فضلها: تكفيك من كل شيء.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ...", reward: "فضلها: تمنحك التوحيد والسكينة والتوكل في بداية يومك.", count: 1 }
        ],
        evening: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} [آية الكرسي]", reward: "فضلها: حفظ من الله وأمان حتى تصبح.", count: 1 },
            { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", reward: "فضلها: لا يضرك شيء في ليلتك.", count: 3 }
        ],
        sleep: [
            { text: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ...", reward: "فضلها: أمان تام وحراسة إلهية لروحك في منامك.", count: 1 }
        ]
    };

    const database = {
        "makhnooq": { title: "الضيق والخنقة", ayah: "«وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ... فَسَبِّحْ بِحَمْدِ رَبِّكَ»", hadith: "«ما يصيب المسلم من هم إلا كفّر الله به من خطاياه».", comfort: "الجأ للسجود والتسبيح الآن، فرجك قريب." },
        "khaif": { title: "الخوف والقلق", ayah: "«قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا»", hadith: "«استعن بالله ولا تعجز»", comfort: "المستقبل ملك للرحيم، فلا تقلق وتوكل عليه." },
        "madioon": { title: "الدين وضيق الرزق", ayah: "«وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ»", hadith: "«اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ»", comfort: "الرزق مقسوم ومكتوب، أكمل سعيك وأبشر." },
        "hazin": { title: "الحزن والهم", ayah: "«لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا»", hadith: "«يا حي يا قيوم برحمتك أستغيث»", comfort: "سيعقب الحزن فرح وسرور عظيم يغسل قلبك." },
        "mazloom": { title: "الظلم والقهر", ayah: "«وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ»", hadith: "«اتق دعوة المظلوم فإنه ليس بينها وبين الله حجاب»", comfort: "حقك محفوظ عند قاضي السماء والأرض ولن يضيع." },
        "maznoob": { title: "التقصير والذنب", ayah: "«قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا... لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ»", hadith: "«التائب من الذنب كمن لا ذنب له»", comfort: "باب التوبة مفتوح الآن، استغفر واملأ قلبك بالأمل." }
    };

    const companionsData = [
        { name: "أبو بكر الصديق", title: "الصديق، أول الخلفاء الراشدين", story: "عبد الله بن أبي قحافة، رفيق النبي في الغار والهجرة، جاهد بماله كله، وثبت الأمة بعد وفاة الرسول وحارب المرتدين وضبط الأمن." },
        { name: "عمر بن الخطاب", title: "الفاروق، أمير المؤمنين", story: "أعز الله به الإسلام، تميز بالعدل المطلق والزهد الشديد، وفتح في عهده الشام ومصر وبيت المقدس وأسس التقويم الهجري ودواوين الدولة." },
        { name: "عثمان بن عفان", title: "ذو النورين، جامع القرآن", story: "تزوج ابنتي النبي، جهز جيش العسرة، واشترى بئر رومة، وثالث الخلفاء الراشدين الذي جمع الأمة على مصحف واحد لقطع الخلاف." },
        { name: "علي بن أبي طالب", title: "الفدائي الأول، باب العلم", story: "ابن عم النبي وزوج فاطمة، نام في فراش الرسول ليلة الهجرة، واشتهر بالشجاعة النادرة والفصاحة، ورابع الخلفاء الراشدين الراشدين." },
        { name: "بلال بن رباح", title: "مؤذن رسول الله ﷺ", story: "صاحب صيحة 'أحد أحد' تحت وطأة التعذيب الشديد، أعتقه أبو بكر وجعله الرسول مؤذن الإسلام الأول لجمال صوته وقوة ثباته." },
        { name: "خالد بن الوليد", title: "سيف الله المسلول", story: "العبقرية العسكرية التي لم تهزم in تاريخها، قاد معركة اليرموك وفتح الشام والعراق وكسر شوكة الفرس والروم تماماً." },
        { name: "طلحة بن عبيد الله", title: "طلحة الخير، فدائي أحد", story: "أحد العشرة المبشرين، جعل جسده ترساً لحماية النبي يوم أحد وتلقى بضعاً وثمانين طعنة وضربة حتى شلت يده المباركة فداء للدعوة." },
        { name: "الزبير بن العوام", title: "حواري رسول الله ﷺ", story: "ابن عمة النبي وأول من سل سيفاً في الإسلام بمكة حماية للرسول، وكان فارساً مغواراً يمثل جيشاً كاملاً لشجاعته وحنكته العالية." },
        { name: "عبد الرحمن بن عوف", title: "تاجر الرحمن، غني الشاكرين", story: "هاجر لا يملك شيئاً وفتح الله عليه حتى جهز قوافل وتصدق بنصف ماله مراراً وتكراراً، وأحد العشرة المبشرين وعضو الشورى الستة." },
        { name: "سعد بن أبي وقاص", title: "خال النبي، قاهر الفرس", story: "أول من رمى بسهم في سبيل الله، قائد المسلمين الظافر في معركة القادسية الكبرى، وكان مستجاب الدعوة ببركة دعاء النبي له." },
        { name: "سعيد بن زيد", title: "المستجاب الدعوة الصامت", story: "من أوائل المسلمين، سبَب في إسلام عمر بن الخطاب، اعتزل الفتن والمناصب، وجاهد بإخلاص ويقين مستجاب الدعوة مبارك الأثر." },
        { name: "أبو عبيدة بن الجراح", title: "أمين هذه الأمة، فاتح الشام", story: "عامر بن الجراح، قاد فتوحات الشام وزهد في الدنيا كلياً، ونزع حلقتي المغفر من وجنتي النبي بأسنانه حتى سقطت ثناياه الشريفة." },
        { name: "حمزة بن عبد المطلب", title: "أسد الله، سيد الشهداء", story: "عم النبي، كان إسلامه منعة وعزاً للمسلمين، قاد المعارك ببسالة واستشهد غدراً في أحد وحزن عليه النبي حزناً عميقاً وجبر قلبه." },
        { name: "العباس بن عبد المطلب", title: "عم النبي وساقي الحرمين", story: "كان سنداً للنبي في بيعة العقبة، وتميز بصوته الجهوري الذي جمع المسلمين يوم حنين، واستسقى به عمر عام الرمادة فنزل الغيث." },
        { name: "جعفر بن أبي طالب", title: "جعفر الطيار، ذو الجناحين", story: "خطيب المهاجرين في الحبشة، استشهد في مؤتة بعدما قطعت يداه وهو يحتضن الراية، فعوضه الله بجناحين يطير بهما في الجنة علواً." },
        { name: "الحسن بن علي", title: "ريحانة النبي، مصلح الأمة", story: "سبط الرسول، تنازل عن الخلافة لمعاوية حقناً لدماء المسلمين وجمعاً للكلمة، محققاً نبوءة جده بأنه سيد يصلح الله به بين فئتين." },
        { name: "الحسين بن علي", title: "سيد شباب أهل الجنة", story: "ابن فاطمة الزهراء، ومن أشبه الناس برسول الله ﷺ، رفض الظلم واستشهد فداء لمبادئه الحق في كربلاء شامخاً ومحتسباً لله." },
        { name: "أبو هريرة", title: "حافظ السنة النبوية الأول", story: "عبد الرحمن بن صخر، لازم النبي طويلاً ودعا له الرسول ببركة الحفظ، فنقل للأمة آلاف الأحاديث النبوية بدقة متناهية لا مثيل لها." },
        { name: "عبد الله بن عمر", title: "التابع الشديد للأثر النبوي", story: "ابن الفاروق، تميز بورعه الفائق وحرصه المطلق على تتبع خطى ورسائل النبي في أدق تفاصيل حياته، وعالماً فقيهاً وزاهداً ورعاً." },
        { name: "عبد الله بن عباس", title: "ترجمان القرآن, حبر الأمة", story: "ابن عم النبي، دعا له بالفقاهة والتأويل، فصار المرجع الأكبر لكل الصحابة في تفسير كتاب الله وعمره في منتهى الشباب والعطاء." },
        { name: "سلمان الفارسي", title: "الباحث عن الحق، صاحب الخندق", story: "تنقل بين البلدان بحثاً عن الدين الصحيح، وأشار على النبي بحفر الخندق في غزوة الأحزاب لإنقاذ المدينة بذكائه وعمق بصيرته." },
        { name: "عمار بن ياسر", title: "المملوء إيماناً حتى العظم", story: "صبر على تعذيب قريش الطاغي واستشهد والداه أمامه، وبشره النبي بأن الفئة الباغية ستقتله، وكان رمزاً للولاء واليقين الراسخ." },
        { name: "أبو ذر الغفاري", title: "أصدق الناس لهجة، رائد الزهد", story: "جهر بالإسلام عند الكعبة متحدياً قريش، وعاش زاهداً متبتلاً يهرب من الدنيا ومفاتنها كلياً، ومات وحيداً كنبؤة النبي الإعجازية له." },
        { name: "المقداد بن عمرو", title: "فارس بدر المغوار", story: "من السابقين للاستجابة، قال للنبي يوم بدر: 'لا نقول كما قالت بنو إسرائيل بل نقاتل عن يمينك وشمالك' فتهلل وجه النبي فرحاً وسروراً." },
        { name: "مصعب بن عمير", title: "سفير الإسلام الأول بالمدينة", story: "ترك حياة الثراء الفاحش والنعيم والروائح العطرة حباً بالدين، وفتح المدينة المنورة بالقرآن، واستشهد في أحد يحمل الراية الشريفة." },
        { name: "معاذ بن جبل", title: "أعلم الأمة بالحلال والحرام", story: "شاب أنصاري جمع القرآن، وبعثه النبي قاضياً لليمن، وقال له النبي 'يا معاذ إني لأحبك'، وتوفي شاباً مباركاً في طاعون عمواس." },
        { name: "أبي بن كعب", title: "سيد القراء وأقرأ الصحابة", story: "من كتاب الوحي، أمره الله تعالى للنبي أن يقرأ عليه سورة البينة تكريماً له، وكان المرجع الأول لضبط حروف القرآن العظيم وتلاوته." },
        { name: "زيد بن ثابت", title: "كاتب الوحي وجامع المصحف", story: "تعلم لغات الأعجم بطلب نبوي في أيام معدودة، وتولى المهمة التاريخية الكبرى برئاسة لجنة جمع القرآن الشريف في عهد الصديق وعثمان." },
        { name: "أبو الدرداء", title: "حكيم الأمة وقاضي الشام", story: "اعتزل التجارة وتفرغ للعبادة والتدبر والقرآن، تميز بحكمته البالغة وأقواله المأثورة في تزكية النفوس والتقرب لرب العباد بيقين." },
        { name: "أنس بن مالك", title: "خادم رسول الله ﷺ المقرب", story: "خدم النبي 10 سنوات بكل أمانة وحب، ودعا له النبي بكثرة المال والولد والبركة في العمر، فكان من أواخر الصحابة وفاة وأكثرهم بركة." },
        { name: "سعد بن معاذ", title: "الذي اهتز لوفاته عرش الرحمن", story: "سيد الأوس، حمى الدين بقوة في الخندق وأصيب، ومات وعمره 36 سنة فقط واهتز العرش شوقاً لروحه وشيعه سبعون ألفاً من الملائكة." },
        { name: "عبد الله بن مسعود", title: "صاحب النعلين وأول من جهر بالقرآن", story: "غلام نحيل البنية، صدح بالقرآن عند الكعبة فضربوه، ورجلاه النحيلتان في ميزان العدل الإلهي تزن جبل أحد بأكمله رفعة وقيمة." },
        { name: "حذيفة بن اليمان", title: "أمين سر رسول الله ﷺ", story: "صاحب قائمة أسماء المنافقين التي خصه بها النبي، وكان خبيراً بفتن الزمان والسياسة، يسأله عمر بن الخطاب دوماً للتأكد والتحقق." },
        { name: "أبو موسى الأشعري", title: "صاحب الصوت المزماري الخاشع", story: "جاء من اليمن، وأثنى النبي على جمال صوته في تلاوة القرآن كأنه مزمار داودي، وتولى القضاء والإمارة بكفاءة وورع وتجرد تام." },
        { name: "عمرو بن العاص", title: "داهية العرب وفاتح مصر", story: "سياسي عبقري وقائد عسكري فذ، فتح أرض مصر وحررها وبنى أول مسجد بأفريقيا ونشر نور الإسلام والعدل في ربوعها بحنكة بالغة." },
        { name: "البراء بن مالك", title: "فدائي حديقة الموت باليمامة", story: "شجاع لا يهاب الموت، رمى بنفسه داخل أسوار حصن مسيلمة الكذاب ليفتح الباب للمسلمين، ومستجاب القسم لو أقسم على الله لأبره يقيناً." },
        { name: "أسامة بن زيد", title: "الحِب بن الحِب، القائد الشاب", story: "تولى قيادة جيش المسلمين لقتال الروم وعمره 18 سنة فقط وبتوجيه وإصرار نبوي، وضمت قيادته كبار شيوخ الصحابة كعمر والزبير." },
        { name: "زيد بن حارثة", title: "الصحابي المذكور صراحة بالقرآن", story: "كان يدعى زيد بن محمد قبل تحريم التبني، نزل اسمه في سورة الأحزاب صراحة، واستشهد كقائد أول شجاع وباسل في معركة مؤتة." },
        { name: "أبو طلحة الأنصاري", title: "الرامي الفدائي يوم معركة أحد", story: "تصدق بأحب أمواله (بستان بيرحاء)، وحمى النبي بقوسه وجسده في أحد وهو يصيح: 'نفسي دون نفسك ونحري دون نحرك يا رسول الله'." },
        { name: "خديجة بنت خويلد", title: "أم المؤمنين، السند الأول", story: "الزوجة الأولى والداعمة الأكبر بمالها وحكمتها، ثبتت النبي وقت نزول الوحي، وبشرها الله بجبريل ببيت في الجنة من قصب لا صخب فيه." },
        { name: "عائشة بنت أبي بكر", title: "الصديقة الفصيحة، فقيهة الأمة", story: "أحب زوجات النبي إليه، نقلت للأمة علوماً وفقه أحكام الأسرة الشريفة والحديث لعقلها العبقري وقوة حفظها ومكانتها السامقة." },
        { name: "فاطمة الزهراء", title: "بنت المصطفى وسيدة نساء الجنة", story: "أحب بنات النبي لقلبه، تميزت بالطهر والزهد المطلق، وهي زوجة علي وأم السبطين، وأول أهله لحوقاً به بعد وفاته بأشهر قليلة." },
        { name: "أسماء بنت أبي بكر", title: "ذات النطاقين وصخرة الصبر", story: "شقت نطاقها لربط طعام الهجرة المباركة، وصمدت أمام تعذيب أبي جهل، ووالدة ابن الزبير وعاشت 100 عام شامخة بقوة وعقل متزن." },
        { name: "أم سليم بنت ملحان", title: "الرميصاء صاحبة المهر الإسلامي", story: "والدة أنس، اشترطت إسلام أبي طلحة مهراً لها فكان أغلى مهر، شاركت في المعارك بالخناجر وبشرها النبي بالجنة ورؤيتها بداخلها." },
        { name: "نسيبة بنت كعب", title: "أم عمارة فدائية معركة أحد الشجاعة", story: "بايعت في العقبة، وقاتلت بالسيوف والسهام ذوداً عن النبي يوم أحد وأصيبت بـ 12 جرحاً بليغاً، وأثنى النبي على قتالها يميناً وشمالاً." },
        { name: "عبد الله بن عمرو بن العاص", title: "العابد الكاتب للصحيفة الصادقة", story: "كان يصوم النهار ويقوم الليل، واستأذن النبي بكتابة الأحاديث فدون 'الصحيفة الصادقة' ليسبق غيره في تدوين وضبط السنة الشريفة." },
        { name: "ثوبان بن بجدد", title: "مولى رسول الله شديد الشوق والحب", story: "تغير لونه ونحل جسده خوفاً من فراق النبي في الجنة، فأنزل الله آيات الطمأنينة لمعشر المحبين المخلصين لرسوله ومكانتهم معه." },
        { name: "أبو قتادة الأنصاري", title: "فارس رسول الله وحامي المدينة", story: "تميز بشجاعته الفائقة في مطاردة المشركين وحراسة تخوم المدينة، وقال فيه النبي ﷺ إعزازاً وتكريماً: 'خير فرساننا اليوم أبو قتادة'." },
        { name: "جعيل بن سراقة الضمري", title: "الصحابي الزاهد المخلص الثابت", story: "بدل النبي اسمه تكريماً له، وكان من فقراء أهل الصفة الأخيار، ثبت ببسالة يوم حنين وأثنى عليه الرسول لعظيم إيمانه وصدقه." },
        { name: "سعيد بن العاص", title: "أمير البيان وكريّم الأخلاق", story: "اتسم بفصاحة لسان عجيبة ولغة راقية، فكان هو الذي يملي المصحف بلسانه وعربيته لكتابة النسخة الإمام في عهد الخليفة عثمان." },
        { name: "عبد الله بن الزبير", title: "فارس الحجاز، أول مولود للمهاجرين", story: "فرح المسلمون بمولده جداً بالمدينة تفنيداً لشائعات سحر اليهود، واشتهر بالعبادة الطويلة المتبتلة والفروسية والشجاعة الخارقة بالميدان." },
        { name: "الحارث بن هشام", title: "شريف مكة ومجاهد اليرموك", story: "شقيق أبي جهل لكنه أسلم وحسن إسلامه، وخرج بكل ماله وعياله مجاهداً في الشام واستشهد في معركة اليرموك وهو عطشان يؤثر غيره بالماء." },
        { name: "عكرمة بن أبي جهل", title: "الفارس الفدائي الشجاع", story: "فر يوم الفتح ثم أسلم فرحب به النبي، وقاد كتيبة الموت الفدائية في اليرموك دفاعاً عن الإسلام حتى نال الشهادة مقبلاً ومحتسباً كلياً." },
        { name: "صفوان بن أمية", title: "كريم قريش ومجاهد الغزوات", story: "أسلم بعد حنين وشهد المعارك وأقرض النبي سلاحه وماله بكرم، وصار من خيار المسلمين والمدافعين عن ثغور الأمة بكل بسالة وإخلاص." },
        { name: "سهيل بن عمرو", title: "خطيب قريش ومثبت مكة", story: "صاحب صلح الحديبية، أسلم وحسن إسلامه خطيباً مفوهاً، وثبت أهل مكة خطيباً فيهم يوم وفاة النبي كخطبة الصديق بالمدينة لئلا يرتدوا." },
        { name: "حكيم بن حزام", title: "الصحابي المولود داخل الكعبة", story: "صديق النبي قبل البعثة، أسلم وحسن إسلامه وكان جواداً، وعاهد النبي ألا يسأل أحداً شيئاً فما سأل أحداً من الناس مالاً حتى مماته زاهداً." },
        { name: "أبو سفيان بن الحارث", title: "ابن عم النبي وشبيهه الفدائي", story: "هجا النبي طويلاً ثم أسلم ليلة الفتح، وظل مطأطئ الرأس حياء من النبي، وثبت ببسالة خارقة يوم حنين يحمي ناقة الرسول برروح فدائية." },
        { name: "جعفر بن أبي سفيان", title: "الفارس الشجاع الثابت بحنين", story: "أسلم مع أبيه ليلة فتح مكة، واشترك في الغزوات وكان من القلة القليلة الشجاعة التي ثبتت حول جسد النبي في معركة حنين الكبرى باستماتة." },
        { name: "معاوية بن أبي سفيان", title: "كاتب الوحي ومؤسس الدولة الأموية", story: "أسلم يوم الفتح وكتب الوحي للنبي، وتولى إمارة الشام لعقود وأسس أول أسطول بحري إسلامي، وحقن الدماء بصلحه التاريخي مع الحسن بن علي." },
        { name: "يزيد بن أبي سفيان", title: "يزيد الخير، قائد جيوش فتح الشام", story: "من خيار قادة الفتوحات، أمره أبو بكر على جيش الشام ووصاه بالوصايا العشر الشهيرة، وتميز بحسن الإدارة والجهاد الصادق والعدالة." },
        { name: "أبو الأعور السلمي", title: "فارس بني سليم ومجاهد الشام", story: "شهد المعارك والفتوحات الكبرى، وكان من الفرسان الأشداء الذين اعتمدت عليهم الجيوش الإسلامية في تأمين حدود وسرايا الدولة ببراعة." },
        { name: "عمرو بن معديكرب", title: "فارس العرب وصاحب الصولات", story: "شاعر وفارس يمني يعد بألف رجل لشجاعته، أسلم وقاد المعارك الكبرى ضد الفرس وأبلى بلاءً معجزاً بالقادسية ونال الشهادة بطلاً." },
        { name: "الأشعث بن قيس", title: "سيد كنده وأمير أذربيجان", story: "قدم في وفد كنده، وحسن إسلامه واشترك بالفتوحات الكبرى بالعراق والشام وولاه عثمان إمارة أذربيجان فكان قائداً فقيهاً عادلاً في الرعية." },
        { name: "حجر بن عدي", title: "حجر الخير، العابد المجاهد", story: "وفد على النبي، وكان عابداً مستجاب الدعوة، اشترك في فتوحات العراق والشام وبناء الكوفة وصاحب يقين ثابت لا يتزعزع مطلقاً." },
        { name: "عدي بن حاتم الطائي", title: "ابن الجود ورمز الوفاء والكرام", story: "ملك طيء وابن حاتم الطائي، أسلم وثبت قومه على الإسلام وقت الردة وجاهد بالشام والعراق وفقد عينه في معركة الجمل حماية للدين." },
        { name: "سفينة مولى رسول الله ﷺ", title: "صاحب لقب سفينة النبوي", story: "لقبه النبي بسفينة لأنه حمل أمتعة الرفاق في السفر دون تعب، وصاحب القصة الشهيرة مع الأسد الذي دله على الطريق طاعة وتوقيراً له." },
        { name: "أبو رافع مولى النبي", title: "خادم وسند البيت النبوي", story: "كان عبداً للعباس فوهبه للنبي وبشره بإسلام العباس فأعتقه، شهد المشاهد كلها وكان ملازماً لأسرار وفقه البيت النبوي الشريف والورع." },
        { name: "ثوبان بن بجدد الكناني", title: "الملازم لرسول الله ﷺ", story: "أعتقه النبي ليلازمه، فكان يخدمه بحب شديد ونقل الكثير من أحاديث السنن النبوية، وسكن حمص بالشام معلماً وموجهاً للأمة قاطبة." },
        { name: "شقران مولى رسول الله ﷺ", title: "صاحب العهد والوفاء بالدفن", story: "شهد بدراً والمشاهد، وكان ممن نزل في قبر رسول الله ﷺ مع علي بن أبي طالب ليدفن الجسد الطاهر بكل توقير وبكاء ومهابة وعشق." },
        { name: "فضالة بن عبيد", title: "قاضي دمشق وبطل فتح رودس", story: "بايع تحت الشجرة، وشهد المشاهد، وتولى قضاء دمشق في عهد معاوية، وكان فقيهاً مجاهداً يقود الغزوات البحرية بالروم ببسالة وحنكة تامة." },
        { name: "عقبة بن عامر الجهني", title: "المقرئ الفقيه والرامي الفائد", story: "جمع بين العلم والجهاد، كان قارئاً فصيحاً للقرآن، ووالياً على مصر، ورامياً بارعاً يمتلك دقة خارقة يصيب بها أهدافه بالميدان دائماً." },
        { name: "مقبل بن سراقة", title: "مجاهد الصفة الصامت والمخلص", story: "من فقراء المسلمين الأبرار الذين عاشوا في المسجد النبوي وتلقوا العلم والتربية مباشرة، وجاهد بكل الغزوات مخلصاً لله مقبلاً صادقاً." },
        { name: "أبو ليلى الأنصاري", title: "والد عبد الرحمن وفدائي المعارك", story: "شهد العقبة وبدراً وأحداً، وكان من فرسان الأنصار البواسل الذين افتدوا الدعوة بدمائهم وأموالهم وثبتوا في وجه الطغيان دون أي تراجع." },
        { name: "عبد الرحمن بن أبي ليلى", title: "الصحابي الصغير والمحدث", story: "رأى النبي وعاصر كبار الصحابة وروى عنهم علماً جماً، وصار حلقة وصل علمية فقهية كبرى بين جيل الصحابة والتابعين الأجلاء بالكوفة." },
        { name: "زياد بن لبيد", title: "والي حضرموت الصارم الصادق", story: "أنصاري شهد العقبة والمشاهد، ولاه النبي ﷺ على حضرموت وثبت بقوة في حرب المرتدين وأخمد الفتن بحزم عسكري عادل وصارم للدعوة." },
        { name: "المهاجر بن أبي أمية", title: "والي صنعاء وفاتح حصون الردة", story: "شقيق أم المؤمنين أم سلمة، ولاه النبي إمارة اليمن، وقاد الجيوش ببراعة في عهد أبي بكر لسحق تمرد المرتدين باليمن بنجاح عسكري باهر." },
        { name: "عكاشة بن محصن", title: "صاحب السبق إلى الجنة", story: "فارس شجاع انكسر سيفه يوم بدر فأعطاه النبي غصناً صار سيفاً، ودعا له النبي فكان أول من يدخل الجنة بلا حساب ولا عذاب لعظيم يقينه." },
        { name: "سنان بن أبي سنان", title: "بطل مبايعي بيعة الرضوان", story: "أول من بايع النبي ﷺ في بيعة الرضوان تحت الشجرة على الموت وعدم الفرار، وجاهد ببسالة فائقة في كل المشاهد والغزوات بروح وثابة." },
        { name: "شجاع بن وهب", title: "سفير النبي إلى ملوك الغساسنة", story: "من المهاجرين الأوائل وشهد بدراً، واختاره النبي يحمل رسالة الإسلام إلى جبلة بن الأيهم ملك الغساسنة بجرأة وشجاعة الحوار الصادق." },
        { name: "عتبة بن غزوان", title: "المجاهد ومؤسس مدينة البصرة", story: "سابع سبعة أسلموا بمكة، هاجر وشهد المعارك وقاد جيش فتح الأبلة، وهو الذي بنى وأسس مدينة البصرة بالعراق ومات زاهداً فقيراً متجرداً." },
        { name: "نافع بن الحارث", title: "طبيب العرب والصحابي الخبير", story: "من أهل الطائف أسلم وحسن إسلامه، واشتهر بالطب والحكمة وعلاج المرضى والجرحى بجيوش المسلمين بخبرته العميقة الواسعة في الميدان." },
        { name: "أبو محذورة", title: "مؤذن مكة صاحب الصوت الشجي", story: "كان يستهزئ بالأذان فسمعه النبي ودعا له ومسح على صدره فصار محباً للأذان وصار مؤذن مكة الدائم ببركة وصوت معجز وعميق الأثر." },
        { name: "خالد بن سعيد", title: "من أوائل المهاجرين الأباة", story: "أسلم قديماً جداً بمكة وهاجر للحبشة، ولاه النبي على صنعاء، واستشهد مجاهداً باسل في معركة مرج الصفر بفتوحات الشام بكل ثبات وإقدام." },
        { name: "أبان بن سعيد", title: "أمير السرايا والوالي المخلص", story: "أسلم بعد خيبر، ولاه النبي قيادة السرايا ثم ولاه إمارة البحرين لرجاحة عقله الكبرى، واستشهد بطلاً مجاهداً في معركة أجنادين الشام." },
        { name: "عمرو بن سعيد", title: "فرسان فتوحات الشام الأوفياء", story: "هاجر في الهجرة الثانية للحبشة، وعاد وشهد المشاهد مع النبي واستشهد بطلاً مغواراً مع إخوته في معارك أجنادين الكبرى بالشام فداء للدين." },
        { name: "أبو حذيفة بن عتبة", title: "الفدائي المهاجر الصابر يوم اليمامة", story: "ابن عتبة بن ربيعة قائد المشركين، لكنه اختار الإسلام وهاجر وشهد بدراً، واستشهد فدائياً في معركة اليمامة ضد مسيلمة الكذاب مقبلاً." },
        { name: "سالم مولى أبي حذيفة", title: "من أهل القرآن وأعظم قرائه", story: "عبد معتق صار إماماً للمهاجرين بقراءته وعلمه، قال عنه النبي: 'خذوا القرآن من أربعة منهم سالم'، واستشهد باليمامة حاملاً الراية ببطولة." },
        { name: "سهل بن حنيف", title: "الفارس الرامي الثابت المحمي للنبي", story: "أنصاري بدري، ثبت مع النبي يوم أحد يرمي بالسهام بقوة، وقال النبي: 'نبلوا سهلاً فإنه سهل'، وولاه علي بن أبي طالب إمارة المدينة الكبرى." },
        { name: "عثمان بن حنيف", title: "خبير مساحة الأراضي والوالي الاقتصادي", story: "اشتهر بالذكاء المالي والهندسي، عينه عمر بن الخطاب مساحاً لأراضي السواد بالعراق لعدله وخبرته، وولاه علي بن أبي طالب إمارة البصرة." },
        { name: "خوات بن جبير", title: "فارس الأنصار الباسل الشجاع", story: "أنصاري بدري شجاع، صاحب قصة تاريخية مشهورة في الجاهلية وافتخر بالإسلام وعزته وشهد المعارك كلها بفروسية خارقة لحماية الدعوة الحقة." },
        { name: "أبو دجانة", title: "صاحب العصابة الحمراء وفدائي المعارك", story: "سماك بن خرشة، أخذ سيف النبي بحقه يوم أحد ولبس عصابته الحمراء متبختراً بين الصفوف وقاتل ببسالة وهدم صفوف المشركين حماية للرسول." },
        { name: "الحارث بن صمة", title: "حامي ظهر النبي الجريح يوم أحد", story: "أنصاري بدري شجاع، ثبت يوم أحد وقاتل المشركين ببسالة حتى قتل منهم جماعة وحمل النبي الجريح على ظهره حتى الصخرة المعزولة الآمنة." },
        { name: "عاصم بن ثابت", title: "حمي الدبر وحامي عهد الله", story: "أنصاري بدري، عاهد الله ألا يمسه مشرك ولا يمس مشركاً، واستشهد في غزوة الرجيع وحمت جسده الطاهر أسراب النحل والزنابير من كفار قريش." },
        { name: "خبيب بن عدي", title: "بطل مصلوب مكة وصاحب ركعتي الموت", story: "قع أسيراً بيد قريش، وهو أول من سن ركعتين قبل الإعدام والصلب بصبر ويقين معجز، واهتزت مشاعر مكة لقوة كلماته وثباته الطاهر الأبي." },
        { name: "زيد بن الدثنة", title: "الشهيد الصابر الصادق بحب النبي", story: "أسر مع خبيب، وعند إعدامه سألوه: أتحب أن محمداً مكانك؟ قال: 'والله ما أحب أن يشاك النبي بشوكة وأنا في أهلي' فقتلوه شهيداً صابراً شامخاً." },
        { name: "عبد الله بن طارق", title: "شهيد غزوة الرجيع الأبي الصامد", story: "صحابي شجاع غدرت به قبائل عضل والقارة في حادثة الرجيع، فرفض الاستسلام والذل وقاتلهم بقطعة خشب حتى قتلوه شهيداً مجاهداً صامداً." },
        { name: "مسعود بن ربيعة", title: "من المهاجرين الأوائل البدريين", story: "أسلم قديماً قبل دخول النبي دار الأرقم، هاجر وشهد معركة بدر الكبرى وأحداً والخندق وجميع المشاهد في صمت تام وإخلاص ويقين راسخ." },
        { name: "شماس بن عثمان", title: "فدائي معركة أحد وسيم قريش المهاجر", story: "كان وسيم المظهر هاجر وشهد بدراً، وفي أحد جعل جسده درعاً حياً يتلقى الضربات بدلاً من جسد النبي حتى مات متأثراً بجراحه الكثيرة البالغة." },
        { name: "أم حكيم بنت الحارث", title: "بطلة معركة مرج الصفر وقاتلة الروم", story: "أسلمت يوم الفتح واستنقذت زوجها عكرمة، وفي معركة مرج الصفر بالشام قتلت بانتفاضة شجاعة 7 من جنود الروم بعمود الخيمة فداء ونصرة لربها." },
        { name: "جليبيب", title: "الصحابي الفقير البسيط المقرب للنبي", story: "كان فقيراً بسيط المظهر، زوجّه النبي مكافأة لإيمانه، واستشهد في غزوة بعدما قتل 7 من المشركين، وحمله النبي على ذراعيه الشريفتين يبكي دفنه." }
    ];

    let currentCategory = 'morning', currentIndex = 0, userCount = 0;

    window.onload = function() {
        renderCompanions(companionsData);
    };

    // عرض الصحابة ببوكسات صغيرة (الاسم واللقب فقط - تم حذف قصة السيرة من العرض هنا بالكامل)
    function renderCompanions(data) {
        const grid = document.getElementById("companionsGrid");
        grid.innerHTML = "";
        data.forEach((c) => {
            // نمرر تفاصيل الصحابي بدقة للمودال عند النقر، ونحمي النص عبر استبدال علامات الاقتباس
            const safeStory = c.story.replace(/'/g, "\\'");
            const safeTitle = c.title.replace(/'/g, "\\'");
            const safeName = c.name.replace(/'/g, "\\'");
            
            grid.innerHTML += `
                <div class="companion-card" onclick="openModal('${safeName}', '${safeTitle}', '${safeStory}')">
                    <h3>🕌 ${c.name}</h3>
                    <h4>✨ ${c.title}</h4>
                </div>`;
        });
    }

    // فتح المودال (النافذة المنبثقة) لعرض السيرة الكاملة عند الضغط على البوكس
    function openModal(name, title, story) {
        document.getElementById("modalTitle").innerText = name;
        document.getElementById("modalSubtitle").innerText = title;
        document.getElementById("modalBody").innerText = story;
        document.getElementById("companionModal").style.display = "flex";
    }

    // إغلاق المودال
    function closeModal(event) {
        document.getElementById("companionModal").style.display = "none";
    }

    // فلترة وبحث الصحابة فوريًا داخل البوكسات
    function filterCompanions() {
        const input = cleanText(document.getElementById("companionInput").value);
        const filtered = companionsData.filter(c => cleanText(c.name).includes(input) || cleanText(c.title).includes(input));
        renderCompanions(filtered);
    }

    // الأقسام والتحويلات
    function showSection(sectionId) {
        document.getElementById('mainMenu').style.display = 'none';
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
        if(sectionId === 'azkarSection') loadZkr();
    }

    function showMenu() {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById('mainMenu').style.display = 'flex';
    }

    // إدارة الأذكار والعدادات
    function loadZkr() {
        const list = azkarData[currentCategory];
        const zkr = list[currentIndex];
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        
        const btn = document.getElementById("counterBtn");
        if (userCount >= zkr.count) { 
            btn.classList.add("done"); 
            btn.innerText = `✓ تم (${zkr.count})`; 
        } else { 
            btn.classList.remove("done"); 
            btn.innerText = `${userCount} / ${zkr.count}`; 
        }
    }

    function countZkr() {
        const list = azkarData[currentCategory];
        if (userCount < list[currentIndex].count) { 
            userCount++; 
            loadZkr(); 
        } else { 
            nextZkr(); 
        }
    }

    function nextZkr() {
        if (currentIndex < azkarData[currentCategory].length - 1) { 
            currentIndex++; 
            userCount = 0; 
            loadZkr(); 
        } else { 
            alert("الحمد لله! أتممت هذه المجموعة 🤍"); 
        }
    }

    function prevZkr() { 
        if (currentIndex > 0) { 
            currentIndex--; 
            userCount = 0; 
            loadZkr(); 
        } 
    }

    function switchAzkar(category) {
        currentCategory = category; currentIndex = 0; userCount = 0;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        loadZkr();
    }

    // تنظيف النصوص والبحث عن المشاعر
    function cleanText(text) { 
        return text ? text.trim().replace(/[ًٌٍَُِّْ]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي") : ""; 
    }

    function searchFeeling() {
        const input = cleanText(document.getElementById("searchInput").value);
        const result = document.getElementById("searchResult");
        if (!input) return;
        
        let key = "makhnooq";
        if (input.includes("خايف") || input.includes("قلق")) key = "khaif";
        else if (input.includes("مديون") || input.includes("رزق") || input.includes("فقر")) key = "madioon";
        else if (input.includes("حزين") || input.includes("هم")) key = "hazin";
        else if (input.includes("مظلوم") || input.includes("ظلم")) key = "mazloom";
        else if (input.includes("مذنب") || input.includes("تقصير")) key = "maznoob";
        
        const data = database[key];
        result.innerHTML = `
            <div class="result-card">
                <h3>🩺 عند الشعور بـ ${data.title}:</h3>
                <p style="margin-top:10px;"><strong>📖 من القرآن:</strong> ${data.ayah}</p>
                <p style="margin-top:10px;"><strong>💬 من السنة:</strong> ${data.hadith}</p>
                <p style="margin-top:10px; color:var(--highlight); font-weight:bold;"><strong>🤍 رسالة لقلبك:</strong> ${data.comfort}</p>
            </div>`;
    }

    function quickSearch(feeling) { 
        document.getElementById("searchInput").value = feeling; 
        searchFeeling(); 
    }
    </script>
</body>
</html>
