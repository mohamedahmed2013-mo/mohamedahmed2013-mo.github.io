<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        /* الأزرار الرئيسية */
        .menu-box { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 25px; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
            cursor: pointer; 
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .menu-box:hover { 
            border-color: var(--primary-color); 
            transform: translateY(-3px);
            background: #222f54;
        }
        
        /* الأقسام الداخلية */
        .content-section { 
            display: none; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        
        /* تصميم العداد والتبويبات */
        .azkar-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: #000; }
        .azkar-box { background: rgba(10, 17, 40, 0.6); padding: 20px; border-radius: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; }
        .zkr-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 10px; color: #fff; }
        .zkr-reward { font-size: 0.95rem; color: var(--highlight); }
        .azkar-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .counter-btn { flex: 1; max-width: 180px; padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: #000; font-size: 1.2rem; font-weight: bold; cursor: pointer; direction: ltr; }
        .counter-btn.done { background: var(--success-color); color: #fff; }
        
        /* البحث والمشاعر والقصص */
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0a1128; color: #fff; font-size: 1rem; }
        .search-btn { padding: 0 20px; border-radius: 10px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; }
        .result-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 5px solid var(--primary-color); margin-top: 15px; line-height: 1.8; text-align: justify; }
        .buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .feeling-btn { padding: 10px; border-radius: 8px; border: none; background: #0a1128; color: #fff; cursor: pointer; font-size: 0.9rem; }
        
        /* شبكة بوكسات الصحابة */
        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; transition: all 0.2s ease; }
        .companion-card:hover { transform: translateY(-2px); background: #131f42; border-right-color: var(--accent-color); }
        .companion-card h3 { color: #fff; font-size: 1.1rem; margin-bottom: 8px; }
        .companion-card h4 { color: var(--highlight); font-size: 0.85rem; font-weight: normal; }
        
        /* النافذة المنبثقة لعرض التفاصيل عند الضغط */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 600px; width: 100%; border-radius: 20px; padding: 25px; border: 2px solid var(--primary-color); position: relative; animation: fadeIn 0.3s ease; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 1.2rem; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #ff4d4d; }
        .modal-title { color: var(--accent-color); font-size: 1.6rem; margin-bottom: 5px; margin-left: 30px; }
        .modal-subtitle { color: var(--highlight); font-size: 1rem; margin-bottom: 15px; }
        .modal-body { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; text-align: justify; max-height: 400px; overflow-y: auto; padding-left: 5px; }
        .modal-body::-webkit-scrollbar { width: 4px; }
        .modal-body::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .companions-grid::-webkit-scrollbar { width: 6px; }
        .companions-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .companions-grid::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
        .hint-text { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">اختر من الأقسام الرئيسية بالأسفل</p>
    </header>

    <div class="main-container">
        
        <!-- القائمة الرئيسية -->
        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء ومواقفهم</div>
        </div>

        <!-- 1. قسم الأذكار -->
        <div id="azkarSection" class="content-section">
            <h2 class="box-title">🌅 الأذكار اليومية <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">الصباح</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">المساء</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">النوم</button>
            </div>
            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">تحميل...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>
            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 0</button>
                <button class="nav-btn" onclick="nextZkr()">التالي</button>
            </div>
        </div>

        <!-- 2. قسم المشاعر -->
        <div id="feelingsSection" class="content-section">
            <h2 class="box-title">🩹 محرك المشاعر والأمان النفسي <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك الحالي (مخنوق، خايف، مديون...)">
                <button class="search-btn" onclick="searchFeeling()">بحث</button>
            </div>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 ضيق وخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('خايف')">😨 خوف وقلق</button>
                <button class="feeling-btn" onclick="quickSearch('مديون')">💵 ضيق رزق</button>
                <button class="feeling-btn" onclick="quickSearch('حزين')">😢 حزن وهم</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ مظلومية</button>
                <button class="feeling-btn" onclick="quickSearch('مذنب')">🧎‍♂️ تقصير وذنب</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <!-- 3. قسم الصحابة -->
        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 سير الصحابة العظماء ومواقفهم <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            
            <div class="search-box">
                <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي لتصفيته فوريًا...">
            </div>
            <p class="hint-text">اضغط على بوكس أي صحابي لقراءة سيرته كاملة ومواقفه العظيمة.</p>
            
            <div id="companionsGrid" class="companions-grid"></div>
        </div>

    </div>

    <!-- النافذة المنبثقة للتفاصيل (Modal) -->
    <div id="companionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null)">×</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <h4 id="modalSubtitle" class="modal-subtitle"></h4>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
    const azkarData = {
        morning: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} [آية الكرسي]", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تصبح.", count: 1 },
            { text: "{قُلْ هُوَ اللَّهُ أَحَدٌ...} و {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...} و {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...}", reward: "فضلها: تكفيك من كل شيء.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ...", reward: "فضلها: تمنحك التوحيد والسكينة والتوكل في بداية يومك.", count: 1 }
        ],
        evening: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} [آية الكرسي]", reward: "فضلها: حفظ من الله وأمان حتى تصبح.", count: 1 },
            { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", reward: "فضلها: لا يضرك شيء في ليلتك.", count: 3 }
        ],
        sleep: [
            { text: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ...", reward: "فضلها: أمان تام وحراسة إلهية لروحك في منامك.", count: 1 }
        ]
    };

    const database = {
        "makhnooq": { title: "الضيق والخنقة", ayah: "«وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ... فَسَبِّحْ بِحَمْدِ رَبِّكَ»", hadith: "«ما يصيب المسلم من هم إلا كفّر الله به من خطاياه».", comfort: "الجأ للسجود والتسبيح الآن، فرجك قريب." },
        "khaif": { title: "الخوف والقلق", ayah: "«قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا»", hadith: "«استعن بالله ولا تعجز»", comfort: "المستقبل ملك للرحيم، فلا تقلق وتوكل عليه." },
        "madioon": { title: "الدين وضيق الرزق", ayah: "«وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ»", hadith: "«اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ»", comfort: "الرزق مقسوم ومكتوب، أكمل سعيك وأبشر." },
        "hazin": { title: "الحزن والهم", ayah: "«لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا»", hadith: "«يا حي يا قيوم برحمتك أستغيث»", comfort: "سيعقب الحزن فرح وسرور عظيم يغسل قلبك." },
        "mazloom": { title: "الظلم والقهر", ayah: "«وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ»", hadith: "«اتق دعوة المظلوم فإنه ليس بينها وبين الله حجاب»", comfort: "حقك محفوظ عند قاضي السماء والأرض ولن يضيع." },
        "maznoob": { title: "التقصير والذنب", ayah: "«قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا... لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ»", hadith: "«التائب من الذنب كمن لا ذنب له»", comfort: "باب التوبة مفتوح الآن، استغفر واملأ قلبك بالأمل." }
    };

    const companionsData = [
        { name: "أبو بكر الصديق", title: "الصديق، أول الخلفاء الراشدين", story: "عبد الله بن أبي قحافة، الرفيق الأول للنبي ﷺ في الغار ورحلة الهجرة المباركة. كان أول من أسلم من الرجال وأعز الأمة بماله حيث أنفق ماله كله في سبيل الله لتجهيز الجيوش وإعتاق العبيد المستضعفين مثل بلال بن رباح. تميز باللين والرحمة الفائقة، لكنه أظهر حزماً أسطورياً وثباتاً هز الجبال بعد وفاة الرسول ﷺ؛ فخطب في الناس وثبت قلوبهم، ثم تولى الخلافة وحارب المرتدين ومانعي الزكاة، وحافظ على وحدة وبناء الدولة الإسلامية الناشئة حتى ثبت أركانها تماماً وتوفي ودفن بجوار الحبيب ﷺ." },
        { name: "عمر بن الخطاب", title: "الفاروق، أمير المؤمنين", story: "أعز الله به الإسلام إثر دعوة النبي ﷺ، وبإسلامه جهر المسلمون بصلاتهم عند الكعبة المشرفة. هو القائد العادل الشديد في الحق، والزاهد اللين مع الرعية والفقراء. فتح الله في عهده الشام ومصر والعراق وبيت المقدس، ووضع التقويم الهجري وأسس الدواوين ونظام العسس (الأمن الليلي). اشتهر بمواقفه التاريخية مع الفقراء والعدل المطلق حتى لُقب بالفاروق لأنه فرق بين الحق والباطل، وكان ينفق ليله يتفقد أحوال رعيته متحملاً المسؤولية الكاملة، واستشهد محراب الصلاة بضربة غادرة." },
        { name: "عثمان بن عفان", title: "ذو النورين، جامع القرآن", story: "ثالث الخلفاء الراشدين، لُقب بذي النورين لزواجه من ابنتي رسول الله ﷺ (رقية ثم أم كلثوم). تميز بالحياء الشديد الذي كانت تستحي منه ملائكة الرحمن. كان من أثرى قريش وأكثرهم سخاءً وجوداً؛ جهز نصف جيش العسرة وحده (غزوة تبوك)، واشترى بئر رومة وجعله وقفاً للمسلمين يشربون منه مجاناً، ووسع المسجد النبوي. من أعظم إنجازاته التاريخية جمع الأمة على مصحف واحد وبقراءة موحدة (المصحف العثماني) لقطع دابر الاختلاف في تلاوة كتاب الله الكريم، واستشهد صائماً يقرأ القرآن." },
        { name: "علي بن أبي طالب", title: "الفدائي الأول، باب العلم", story: "ابن عم النبي ﷺ وزوج ابنته فاطمة الزهراء، ووالد السبطين الحسن والحسين. فدا النبي ﷺ بنفسه ونام في فراشه ليلة الهجرة الشريفة ليوهم المشركين ويرد الأمانات لأصحابها. رابع الخلفاء الراشدين، واشتهر بالشجاعة الفريدة الخارقة في غزو الخندق وخيبر، وكان فقيهاً قضائياً وقاضي الأمة والنسق الأعلى في الفصاحة والبلاغة والعلم، لدرجة أن النبي ﷺ قال فيه: 'أنا مدينة العلم وعلي بابها'. قاد الأمة في فترة مليئة بالفتن بحكمة وصبر عظيمين حتى اغتيل ساجداً في المحراب." },
        { name: "بلال بن رباح", title: "مؤذن رسول الله ﷺ", story: "الصحابي الحبشي الذي ضرب أروع أمثلة الصبر والثبات في تاريخ البشرية. كان يُعذب في رمضاء مكة وتوضع الصخرة العظيمة على صدره ليترك دينه، فما كان منه إلا أن يردد بكل يقين: 'أحدٌ أحد'. أعتقه أبو بكر الصديق، وجعله النبي ﷺ المؤذن الأول للإسلام لجمال وعمق صوته وقوة إيمانه. يوم فتح مكة، أمره النبي ﷺ أن يصعد فوق ظهر الكعبة ويصدح بالأذان أمام الملأ. بعد وفاة الرسول، لم يطق بلال البقاء في المدينة لشدة حزنه وشوقه، وخرج مجاهداً للشام ولم يؤذن بعدها إلا بطلب من الصحابة فبكى الجميع شوقاً." },
        { name: "خالد بن الوليد", title: "سيف الله المسلول", story: "العبقرية العسكرية الفذة التي لم تهزم في أكثر من مائة معركة خاضها طوال حياته في الجاهلية والإسلام. سماه النبي ﷺ 'سيف الله المسلول' بعد حنكته الخارقة وإنقاذه لجيش المسلمين في معركة مؤتة. قاد فتوحات الشام والعراق، وحطم عروش الإمبراطوريتين الفارسية والبيزنطية، وهزم الروم في معركة اليرموك الخالدة. تميز بالولاء التام والتجرد؛ فعندما عزله عمر بن الخطاب من قيادة الجيش خشية أن يفتتن الناس به، تقبل القرار ببساطة وتحول إلى جندي عادي يقاتل بنفس الحماس، وتوفي على فراشه باكياً ومستغرباً كيف يموت حتف أنفه وجسده مليء بالضربات." },
        { name: "طلحة بن عبيد الله", title: "طلحة الخير، فدائي أحد", story: "أحد العشرة المبشرين بالجنة، ولُقب بطبيعة الحال بـ 'طلحة الخير' و'طلحة الفياض' لكثرة إنفاقه وصدقاته. بطل معركة أحد الأسطوري؛ حيث جعل من جسده ترساً حياً لحماية النبي ﷺ عندما تفرق الناس عنه، فكان يتلقى السهام والضربات بيديه وجسده، وتلقى بضعاً وثمانين طعنة وضربة وسهم، وشُلّت إصبعه المباركة وهو يدافع عن الحبيب. قال عنه النبي ﷺ يومها: 'من سره أن ينظر إلى شهيد يمشي على وجه الأرض فليظر إلى طلحة بن عبيد الله' فكان رمزاً للتضحية المطلقة." },
        { name: "الزبير بن العوام", title: "حواري رسول الله ﷺ", story: "ابن عمة النبي ﷺ (صفية بنت عبد المطلب)، وأحد العشرة المبشرين بالجنة. هو أول من سلّ سيفاً في سبيل الله بمكة المكرمة وهو ما زال غلاماً ناشئاً حين شاع أن النبي أُوذى. تميز ببنيته القوية وشجاعته النادرة، وكان فارساً مغواراً يقاتل بسيفين ويقود الخيل برجليه. شهد المشاهد كلها مع الرسول ﷺ، وكان يمثل بفروسيته كتيبة كاملة في اليرموك وفتح مصر. قال عنه النبي ﷺ مدحاً له وتقديراً لمكانته: 'إن لكل نبي حوارياً، وحواريّ الزبير بن العوام'." },
        { name: "عبد الرحمن بن عوف", title: "تاجر الرحمن، غني الشاكرين", story: "أحد العشرة المبشرين بالجنة، وهاجر إلى المدينة المنورة لا يملك درهماً واحداً بعد أن صادرت قريش أمواله. رفض أخذ نصف مال أخيه الأنصاري وقال عبارته الشهيرة: 'دلوني على السوق'. فتح الله عليه أبواب الرزق الواسعة ببركة أمانته وذكائه حتى قال: 'لو رفعت حجراً لظننت أني أجد تحته ذهباً'. جهز قوافل تجارية عملاقة وتصدق بنصف ماله مراراً، وتصدق بأرباح قافلة كاملة تضم 700 بعير لأهل المدينة، وعاش زاهداً خاشعاً رغم ثرائه الفاحش وكان عضو لجنة الشورى الستة لاختيار الخليفة." },
        { name: "سعد بن أبي وقاص", title: "خال النبي، قاهر الفرس", story: "أحد العشرة المبشرين بالجنة، وأول من رمى بسهم في سبيل الله في الإسلام. كان النبي ﷺ يفتخر به ويقول أمام الصحابة: 'هذا خالي فليرني امرؤ خاله'. تميز بكونه مستجاب الدعوة ببركة دعاء النبي له: 'اللهم سدد رميته وأجب دعوته'. قاد الجيوش الإسلامية المظفرة في معركة القادسية الكبرى التي أسقطت دولة الساسانيين الفارسية وفتحت مدائن كسرى، وبنى مدينة الكوفة بالعراق، وتولى إمارتها فعدل وأحسن السياسة، وتوفي وهو أخر العشرة المبشرين وفاة." },
        { name: "سعيد بن زيد", title: "المستجاب الدعوة الصامت", story: "من العشرة المبشرين بالجنة، وابن زيد بن عمرو بن نفيل الذي مات على الحنيفية قبل البعثة. أسلم سعيد قديماً جداً مع زوجته فاطمة بنت الخطاب وكان سيباً مباشراً في إسلام الفاروق عمر. شهد الغزوات كلها عدا بدراً لأنه كان يتجسس على عير قريش بأمر نبوي. اعتزل المناصب والفتن تماماً وعاش عابداً زاهداً مستجاب الدعوة. اتهمته امرأة بالاستيلاء على أرضها ظلماً، فدعا الله قائلاً: 'اللهم إن كانت كاذبة فأعمِ بصرها واقتلها في أرضها'، فعميت وسقطت في بئر أرضها وماتت، فصارت قصته عبرة وعلامة على صدقه ويقينه." },
        { name: "أبو عبيدة بن الجراح", title: "أمين هذه الأمة، فاتح الشام", story: "عامر بن عبد الله بن الجراح، أحد العشرة المبشرين بالجنة، وسماه النبي ﷺ 'أمين هذه الأمة' لشدة نزاهته وتجرده التام وإخلاصه. ضرب مثالاً قاصماً في غزوة بدر حين واجه أباه المشرك الذي صمم على قتله، فقتله أبو عبيدة دفاعاً عن التوحيد. في غزوة أحد، انتزع حلقتي المغفر الحديديتين اللتين غرزتا في وجنتي النبي ﷺ بأسنانه الشريفة حتى سقطت ثناياه (أسنانه الأمامية) حباً وفداءً للرسول. قاد فتوحات الشام بعد عزل خالد، وتوفي في طاعون عمواس زاهداً لا يملك من الدنيا إلا سيفه وفرشه." },
        { name: "حمزة بن عبد المطلب", title: "أسد الله، سيد الشهداء", story: "عم النبي ﷺ وأخوه من الرضاعة، كان إسلامه نقطة تحول تاريخية وعزاً ومنعة للمسلمين المستضعفين في مكة بعد أن ضرب أبا جهل حماية لابن أخيه. اشتهر بالقوة البدنية الهائلة والفروسية والشجاعة الخارقة. برز في معركة بدر الكبرى بطلاً مغواراً يقاتل بسيفين ومعلماً صدره بريشة نعامة ليعرفه الأعداء. استشهد في معركة أحد غدراً بحربة وحشي الحبشي الذي ترصد له بطلب من هند بنت عتبة، وحزن عليه النبي ﷺ حزناً تفتت له القلوب ولُقب بسيد الشهداء لعظيم تضحيته ومكانته السامقة." },
        { name: "العباس بن عبد المطلب", title: "عم النبي وساقي الحرمين", story: "عم النبي ﷺ، وكان سنداً سياسياً واجتماعياً قوياً له في مكة قبل إسلامه؛ حيث حضر معه بيعة العقبة الثانية مع الأنصار ليتأكد من حمايتهم لابن أخيه رغم أنه كان لم يسلم بعد. أسلم وحسن إسلامه وهاجر، وتميز بصوته الجهوري الخارق الذي جمع به صفوف المسلمين وتثبيتهم يوم حنين حين نادى بأمر النبي: 'يا معشر الأنصار.. يا أصحاب الشجرة' فعادوا كالسيل. في عهد عمر بن الخطاب، أصاب الناس قحط شديد (عام الرمادة)، فخرج عمر يستسقي بالعباس قائلاً: 'اللهم إنا كنا نتوسل إليك بنبينا فتسقينا، وإنا نتوسل إليك بعم نبينا فاسقنا' فنزل المطر غزيراً وسُمي بساقي الحرمين." },
        { name: "جعفر بن أبي طالب", title: "جعفر الطيار، ذو الجناحين", story: "ابن عم النبي ﷺ وشقيقه الأكبر لعلي، كان أشبه الناس خلقاً وخُلقاً برسول الله ﷺ. خطيب المهاجرين البارع في الحبشة، وصاحب الكلمات الأسطورية التي أبكت النجاشي وحمت المسلمين من مؤامرة قريش وعمر بن العاص حينها. قاد المسلمين في معركة مؤتة الشام، وحمل الراية ببسالة فائقة، وعندما قُطعت يده اليمنى احتضن الراية بيده اليسرى، فلما قُطعت احتضنها بعضديه حتى استشهد وبجسده بضع وتسعون طعنة وضربة. فأخبر النبي ﷺ الصحابة بأن الله أبدله عن يديه جناحين يطير بهما في الجنة حيث يشاء، فلُقب بجعفر الطيار." },
        { name: "الحسن بن علي", title: "ريحانة النبي، مصلح الأمة", story: "سبط رسول الله ﷺ وابن ابنته فاطمة الزهراء، كان شديد الشبه بجده ﷺ الذي كان يحمله على كتفيه ويقول: 'اللهم إني أحبه فأحبه'. تولى الخلافة بعد استشهاد أبيه علي بن أبي طالب، وبايعه أربعون ألفاً، لكنه بعد ستة أشهر ضرب أعظم مواقف التجريد والحكمة في تاريخ السياسة الإسلامية؛ حيث تنازل بالخلافة طواعية لمعاوية بن أبي سفيان حقناً لدماء المسلمين وجمعاً لكلمتهم وإنهاءً للفتنة الطويلة، محققاً نبوءة جده الإعجازية حين قال عنه وهو صغير: 'إن ابني هذا سيد، ولعل الله أن يصلح به بين فئتين عظيمتين من المسلمين'، وسُمي ذلك العام بعام الجماعة." },
        { name: "الحسين بن علي", title: "سيد شباب أهل الجنة", story: "الابن الثاني لعلي وفاطمة، وريحانة المصطفى ﷺ الذي قال فيه: 'حسين مني وأنا من حسين، أحب الله من أحب حسيناً'. عاش شجاعاً أبياً يرفض الظلم والضيم، وتميز بالعبادة والورع الشديد. بعد وفاة معاوية، رفض مبايعة يزيد بن معاوية لخروج الأمر عن الشورى، وخرج متوجهاً إلى الكوفة بعد أن كاتبه أهلها بنصرته. تخلوا عنه وا حوصر في أرض كربلاء مع ثلة قليلة من آل بيته وأصحابه، ورفض الاستسلام مهاناً وقاتل ببسالة أسطورية حتى استشهد شامخاً محتسباً، لينال مقام الشهادة العظيم وسؤدد شباب أهل الجنة." },
        { name: "أبو هريرة", title: "حافظ السنة النبوية الأول", story: "عبد الرحمن بن صخر الدوسي، جاء من اليمن وأسلم ولزم النبي ﷺ لزوماً مطلقاً طوال أربع سنوات. كان من فقراء أهل الصفة الذين يعيشون في المسجد النبوي، فرغ نفسه كلياً لسمع وحفظ أحاديث الحبيب. دعا له النبي ﷺ ببركة الحفظ وبسط ثوبه ثم ضمه إلى صدره، فما نسي حديثاً سمعه بعدها أبداً. صار المرجع والأرشيف الأكبر للأمة الإسلامية؛ حيث نقل آلاف الأحاديث النبوية الشريفة بدقة متناهية، وتتلمذ على يديه مئات التابعين، وتولى إمارة البحرين والمدينة لاحقاً وعاش متواضعاً يخدم فقه الدين." },
        { name: "عبد الله بن عمر", title: "التابع الشديد للأثر النبوي", story: "ابن أمير المؤمنين عمر بن الخطاب، أسلم وهو صغير وهاجر مع أبيه، وردّه النبي يوم بدر وأحد لصغر سنه وشهد الخندق وما بعدها. اشتهر في تاريخ الإسلام بشدة تتبعه وتقليده لدقائق أفعال وحركات النبي ﷺ حباً وشوقاً؛ فكان يصلي حيث رأى النبي يصلي، وينزل تحت الشجرة التي استظل بها الرسول. تميز بالورع الفديد والزهد الخالص؛ فكان يرفض المناصب والقضاء خوفاً من الحساب، وكان إذا أعجبه شيء من ماله وتجاره تصدق به فوراً تقرباً لله، وصار من كبار فقهاء ومفتي المدينة المنورة طوال عقود." },
        { name: "عبد الله بن عباس", title: "ترجمان القرآن، حبر الأمة", story: "ابن عم النبي ﷺ، ولد قبل الهجرة بثلاث سنوات ولازم النبي في طفولته المتأخرة. دعا له النبي ﷺ بدعوة تاريخية صاغت مستقبله: 'اللهم فقهه في الدين وعلمه التأويل'. صار ببركة هذه الدعوة وعمق اجتهاده المفسر الأول والعالم الأكبر للقرآن الكريم (ترجمان القرآن). كان الخلفاء كعمر بن الخطاب يقربونه في مجالس الشورى مع كبار شيوخ بدر لرجاحة عقله وعمق بصيرته، وأسس مدرسة علمية كبرى بمكة لتعليم التفسير والحديث والفقه، وأمضى حياته ينشر نور العلم حتى توفي بالطائف." },
        { name: "سلمان الفارسي", title: "الباحث عن الحق، صاحب الخندق", story: "أحد عظماء الصحابة، بدأت قصته في فارس حيث ترك عبادة النار وهرب من والده بحثاً عن الدين الحق. تنقل بين البلدان وبيع كعبد في الأسر حتى وصل إلى المدينة وعرفه النبي ﷺ وأعانه الصحابة على كتابة عتقه. هو صاحب الفكرة العبقرية العسكرية بحفر الخندق حول المدينة في غزوة الأحزاب، وهي استراتيجية لم تكن تعرفها العرب، فأنقذت المسلمين من إبادة محققة من جيوش القبائل. تميز بالزهد الشديد والعقل الراجح وتولى إمارة المدائن وعاش يصنع الخوص بيده ويأكل من عمله، وقال فيه النبي: 'سلمان منا أهل البيت'." },
        { name: "عمار بن ياسر", title: "المملوء إيماناً حتى العظم", story: "من السابقين الأولين للإسلام بمكة، عُذب عذاباً نكراً هو ووالداه (ياسر وسمية) على يد قريش، واستشهد والداه أمامه فكانا أول شهيدين في الإسلام، وبشرهم النبي بقوله: 'صبراً آل ياسر فإن موعدكم الجنة'. هاجر وشهد المشاهد وبنى أول مسجد في الإسلام (مسجد قباء). وصفه النبي ﷺ بأن 'عمار مُلئ إيماناً إلى مشاشه (عظامه)'، وبشره بنبوءة إعجازية: 'تقتلك الفئة الباغية'. عاش مجاهداً عابداً وولاه عمر الكوفة، واستشهد في معركة صفين وهو ابن تسعين سنة يقاتل بجانب علي بن أبي طالب محققاً نبوءة الرسول." },
        { name: "أبو ذر الغفاري", title: "أصدق الناس لهجة، رائد الزهد", story: "جندب بن جنادة، جاء من قبيلة غفار قطاع الطرق وأسلم بمكة جهاراً وتحدى قريشاً وصرخ بالشهادة عند الكعبة فضربوه حتى أغمي عليه. أمره النبي بالعودة لقومه فأسلمت قبيلته كلها بسببه. تميز بصدق اللهجة الشديد والزهد المطلق والصارم في الدنيا ومحاربة كنز الأموال، لدرجة أن النبي ﷺ قال فيه: 'ما أقلت الغبراء ولا أظلت الخضراء أصدق لهجة من أبي ذر'. عاش مستقلاً متبتلاً يهرب من بريق الدنيا والمناصب، ومات وحيداً في صحراء الربذة كنبؤة النبي الإعجازية له: 'يرحم الله أبا ذر، يمشي وحده، ويموت وحده، ويبعث وحده'." },
        { name: "المقداد بن عمرو", title: "فارس بدر المغوار", story: "من السابقين للإسلام وأحد السبعة الذين أظهروا إسلامهم بمكة وتحملوا الأذى. هو صاحب الموقف الأسطوري يوم معركة بدر الكبرى؛ حين استشار النبي الصحابة في قتال قريش، فقام المقداد وقال كلمته التي خلدها التاريخ وتهلل لها وجه النبي فرحاً: 'يا رسول الله، لا نقول لك كما قالت بنو إسرائيل لموسى: اذهب أنت وربك فقاتلا إنا هاهنا قاعدون، ولكن نقاتل عن يمينك وعن شمالك ومن بين يديك ومن خلفك'. كان الفارس الوحيد الذي يمتلك فرساً ويقاتل عليه طوال معركة بدر، وشهد فتح مصر والشام فارساً بطلاً." },
        { name: "مصعب بن عمير", title: "سفير الإسلام الأول بالمدينة", story: "شاب مكي مترف، كان أنعم شباب قريش ثراءً وعطراً ولباساً. ترك هذا النعيم كله فور إسلامه وحبسه أهله وعذبوه فصبر وثبت. اختاره النبي ﷺ ليكون السفير الأول للإسلام؛ فبعثه إلى المدينة المنورة بعد بيعة العقبة الأولى ليعلم أهلها القرآن والدين، فنجح بحكمته ولينه وهدوئه في فتح بيوت المدينة للإسلام وأسلم على يديه سادتهم كأنيس وسعد بن معاذ. حمل راية المهاجرين في بدر وأحد، وفي أحد استشهد يحمل الراية ودافع عن النبي حتى قطعت يداه، ولم يجدوا كفناً يغطيه كلياً فبكى الصحابة تذكراً لتضحيته." },
        { name: "معاذ بن جبل", title: "أعلم الأمة بالحلال والحرام", story: "شاب أنصاري أسلم وعمره ثمانية عشر عاماً، تميز بالذكاء المفرط والجمال والفصاحة. لُقب بأعلم الأمة بالحلال والحرام بشهادة نبوية شريفة. بعثه النبي ﷺ قاضياً ومعلماً لأهل اليمن وصاحبه مودعاً وماشياً بجانب ركابه وقال له: 'يا معاذ، لعلك لا تلقاني بعد عامي هذا'، فبكى معاذ شوقاً وحزناً. كان عمر بن الخطاب يستعين به في معضلات الفقه ويقول: 'لولا معاذ لهلك عمر'. أصيب بطاعون عمواس في الشام وتوفي وهو في ذروة شبابه وعطائه (36 سنة) متطلعاً للقاء الله بقلب سليم." },
        { name: "أبي بن كعب", title: "سيد القراء وأقرأ الصحابة", story: "أنصاري من الخزرج وشهد العقبة وبدراً، وكان من أهم كتاب الوحي لرسول الله ﷺ. سماه النبي ﷺ 'سيد القراء' وقال للأمة: 'أقرأكم أبي'. ضرب موقفاً إعجازياً حين قال له النبي ﷺ: 'إن الله أمرني أن أقرأ عليك سورة البينة'، فبكى أبي بن كعب من شدة التأثر والمهابة وسأل زاهداً: 'يا رسول الله، وآلله سماني لك؟' قال: 'نعم بسماك في الملأ الأعلى'. كان المرجع الشامل لضبط حروف وتلاوة القرآن الكريم، واستعان به الصديق وعمر في جمع وضبط المصحف لعلمه الراسخ." },
        { name: "زيد بن ثابت", title: "كاتب الوحي وجامع المصحف", story: "شاب أنصاري عبقري، كفله النبي ﷺ وطلب منه تعلم لغة اليهود والأعجم ليأمن مكرهم ومراسلاتهم، فتعلمها وأتقنها كتابة ونطقاً في خمسة عشر يوماً فقط! صار الكاتب الأساسي والأمين للوحي بين يدي رسول الله ﷺ. تولى بطلب من أبي بكر الصديق ثم عثمان بن عفان المهمة التاريخية الأعظم والأخطر: رئاسة لجنة جمع القرآن الكريم وتدوينه في مصحف واحد؛ فكان يتتبع الآيات من الصدور والرقاع بدقة وشروط تثبت معجزة، وحفظ للأمة كتاب ربها مدوناً بدقة لا يتطرق إليها الشك." },
        { name: "أبو الدرداء", title: "حكيم الأمة وقاضي الشام", story: "عويمر بن مالك الأنصاري، تأخر إسلامه قليلاً حتى غزوة بدر بمساعي صديقه ابن رواحة، لكنه منذ أسلم تفرغ كلياً للعبادة والقرآن وترك التجارة والدنيا قائلاً: 'أردت أن أجمع بين التجارة والعبادة فلم يجتمعا، فتركت التجارة ولزمت العبادة'. لُقب بحكيم الأمة لعمق فكره وأقواله المأثورة في الزهد والتدبر وتزكية النفوس. ولاه عمر بن الخطاب قضاء الشام، فكان يرفض مظاهر الترف ويعيش في كوخ بسيط معلماً الناس القرآن والزهد ويحاسب نفسه على الكلمة والدرهم حباً وخوفاً من الله." },
        { name: "أنس بن مالك", title: "خادم رسول الله ﷺ المقرب", story: "أنصاري قدمته أمه (أم سليم) للنبي ﷺ عند وصوله للمدينة ليخدمه وعمره عشر سنوات، فقبله النبي وضمه لأهل بيته. خدم النبي ﷺ عشر سنوات كاملة بكل أمانة وعشق، وقال واصفاً رحمة الحبيب: 'خدمت النبي عشر سنين فما قال لي أف قط، ولا قال لشيء فعلته لم فعلته'. دعا له النبي ﷺ بدعاء بارك حياته: 'اللهم أكثر ماله وولده وأطل عمره وأدخله الجنة'؛ فصار من أكثر الصحابة مالاً وولداً (ولد له صلبة وأولاد أولاده أكثر من مائة)، وعاش مائة وثلاث سنوات ونقل للأمة كنزاً من السنة النبوية." },
        { name: "سعد بن معاذ", title: "الذي اهتز لوفاته عرش الرحمن", story: "سيد الأوس وزعيم الأنصار العظيم، أسلم على يد مصعب بن عمير وعمره ثلاثون سنة فأسلمت قبيلته كلها في يوم واحد. كان صاحب المواقف الاستراتيجية الحازمة في بدر والخندق لحماية الدين والرسول. أُصيب بسهم في غزوة الخندق، ودعا الله ألا يميتة حتى يقر عينه من خيانة بني قريظة، فحكّمه النبي فيهم فقضى بحكم الله. انفتح جرحه ومات وعمره ستة وثلاثون سنة فقط (قضى في الإسلام 6 سنوات فقط!)، لكنها كانت كافية ليهتز عرش الرحمن شوقاً لروح سعد، وشيعه سبعون ألفاً من الملائكة لم يطئوا الأرض قبلها." },
        { name: "عبد الله بن مسعود", title: "صاحب النعلين وأول من جهر بالقرآن", story: "غلام نحيل البنية وقصير القامة، كان يرعى الغنم بمكة وأسلم قديماً بعد رؤية معجزة درع الشاة مع النبي وأصبح خادماً خاصاً ملازماً للرسول يحمل نعليه وسواكه وطهوره حتى ظن الناس أنه من أهل البيت. هو أول من صدح بالقرآن الكريم جهاراً عند الكعبة أمام طغاة قريش فضربوه حتى أدموه فما انكسر. قال عنه النبي: 'من أحب أن يقرأ القرآن رطباً كما نزل فليقرأه على قراءة ابن أم عبد'. ضحك الصحابة يوماً من دقة ساقيه النحيلتين، فقال النبي ﷺ: 'والذي نفسي بيده، لهما في الميزان أثقل من جبل أحد' لفضله وعلمه العظيم الكوفة." },
        { name: "حذيفة بن اليمان", title: "أمين سر رسول الله ﷺ", story: "صحابي جليل هاجر مع والده وشهد المشاهد، وتميز بذكاء استخباراتي وقدرة نادرة على كتم الأسرار وقراءة النفوس؛ ولذلك خصه النبي ﷺ بسر عظيم لم يطلعه على غيره: قائمة بأسماء منافقين داخل المدينة والفتن التي ستقع بالأمة. أرسله النبي ﷺ في ليلة الخندق المظلمة الباردة وسط جيش الأحزاب ليتجسس على قراراتهم بحنكة بالغة الإعجاز. كان عمر بن الخطاب يراقبه؛ فإذا مات ميت ولم يصلّ عليه حذيفة، عرف عمر أنه منافق فلا يصلي عليه، وسأله عمر يوماً: 'يا حذيفة، أنشدك الله، أمن العمال (الولاة) الذين عينتهم أحد من المنافقين؟' فعاش أميناً للسر حافظاً للأمة."  },
        { name: "خديجة بنت خويلد", title: "أم المؤمنين، السند الأول", story: "سيدة نساء العالمين، وزوجة النبي ﷺ الأولى وبداية طمأنينته. كانت أنجح وأشرف نساء قريش تجارة وعقلاً. عندما نزل الوحي أول مرة وجاء النبي يرجف فزعاً، احتضنته بكلماتها الأسطورية التي رسخت في التاريخ: 'كلا والله لا يخزيك الله أبداً، إنك لتصل الرحم وتصدق الحديث وتحمل الكل وتكسب المعدوم وتقري الضيف وتعين على نوائب الحق'. أنفقت ثروتها الطائلة كلها لدعم الدعوة في حصار شعب أبي طالب وصبرت صبر الجبال، وأرسل الله لها السلام مع جبريل وبشرها ببيت في الجنة من قصب لا صخب فيه ولا نصب، وحزن النبي لوفاتها حزناً سمى عامه بعام الحزن وظل يذكر فضلها وبرها طوال حياته." },
        { name: "عائشة بنت أبي بكر", title: "الصديقة الفصيحة، فقيهة الأمة", story: "أم المؤمنين، وأحب زوجات النبي ﷺ إليه والوحيدة التي تزوجها بكراً. تميزت بعقلية عبقرية نادرة، وقدرة فائقة على الحفظ والذكاء والفصاحة والبيان الأدبي الشاهق. نقلت للأمة الإسلامية ربع الأحكام الشرعية والدقائق الفقهية والسنن النبوية وبخاصة ما يتعلق بأحكام الأسرة والبيت النبوي الطاهر. كانت المرجع الفقهي الأساسي والأكبر لكبار الصحابة إذا أشكل عليهم أمر أو حديث في فقه الدين؛ فكانوا يأتون إليها ويسألونها خلف الحجاب فيجدون عندها علماً فصلاً وشرحاً وافياً مبرهناً، وتوفيت بالمدينة ودفنت بالبقيع." },
        { name: "فاطمة الزهراء", title: "سيدة نساء أهل الجنة", story: "ابنة الرسول ﷺ الصغرى وأحبهم إلى قلبه الطاهر، لُقبت بالزهراء والبتول لتفرغها للعبادة وطهرها وعفتها الشاهقة. كانت أشبه الناس مشياً وحديثاً ووقوفاً بأبيها ﷺ، وإذا دخلت عليه قام إليها وقبّلها وأجلسها في مجلسه حباً وإعزازاً. عانت من أذى المشركين لأبيها وهي طفلة فكانت تدافع عنه وتمسح الأذى عن ظهره الشريف بكاءً وصموداً. زوجة علي بن أبي طالب وأم السبطين، وعاشت حياة زاهدة تطحن بيديها حتى مجلت يداها صابرة محتسبة، وأسرّ لها النبي ﷺ في مرضه أنها أول أهله لحوقاً به وبشرها بأنها سيدة نساء أهل الجنة، وتوفيت بعده بستة أشهر فقط." }
    ];

    let currentCategory = 'morning', currentIndex = 0, userCount = 0;

    window.onload = function() {
        renderCompanions(companionsData);
    };

    // عرض الصحابة ببوكسات صغيرة (الاسم واللقب فقط)
    function renderCompanions(data) {
        const grid = document.getElementById("companionsGrid");
        grid.innerHTML = "";
        data.forEach((c) => {
            // نمرر تفاصيل الصحابي بدقة للمودال عند النقر، ونحمي النص عبر استبدال علامات الاقتباس
            const safeStory = c.story.replace(/'/g, "\\'");
            const safeTitle = c.title.replace(/'/g, "\\'");
            const safeName = c.name.replace(/'/g, "\\'");
            
            grid.innerHTML += `
                <div class="companion-card" onclick="openModal('${safeName}', '${safeTitle}', '${safeStory}')">
                    <h3>🕌 ${c.name}</h3>
                    <h4>✨ ${c.title}</h4>
                </div>`;
        });
    }

    // فتح المودال (النافذة المنبثقة) لعرض السيرة الكاملة الكبيرة عند الضغط على البوكس
    function openModal(name, title, story) {
        document.getElementById("modalTitle").innerText = name;
        document.getElementById("modalSubtitle").innerText = title;
        document.getElementById("modalBody").innerText = story;
        document.getElementById("companionModal").style.display = "flex";
    }

    // إغلاق المودال
    function closeModal(event) {
        document.getElementById("companionModal").style.display = "none";
    }

    // فلترة وبحث الصحابة فوريًا داخل البوكسات
    function filterCompanions() {
        const input = cleanText(document.getElementById("companionInput").value);
        const filtered = companionsData.filter(c => cleanText(c.name).includes(input) || cleanText(c.title).includes(input));
        renderCompanions(filtered);
    }

    // الأقسام والتحويلات
    function showSection(sectionId) {
        document.getElementById('mainMenu').style.display = 'none';
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
        if(sectionId === 'azkarSection') loadZkr();
    }

    function showMenu() {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById('mainMenu').style.display = 'flex';
    }

    // إدارة الأذكار والعدادات
    function loadZkr() {
        const list = azkarData[currentCategory];
        const zkr = list[currentIndex];
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        
        const btn = document.getElementById("counterBtn");
        if (userCount >= zkr.count) { 
            btn.classList.add("done"); 
            btn.innerText = `✓ تم (${zkr.count})`; 
        } else { 
            btn.classList.remove("done"); 
            btn.innerText = `${userCount} / ${zkr.count}`; 
        }
    }

    function countZkr() {
        const list = azkarData[currentCategory];
        if (userCount < list[currentIndex].count) { 
            userCount++; 
            loadZkr(); 
        } else { 
            nextZkr(); 
        }
    }

    function nextZkr() {
        if (currentIndex < azkarData[currentCategory].length - 1) { 
            currentIndex++; 
            userCount = 0; 
            loadZkr(); 
        } else { 
            alert("الحمد لله! أتممت هذه المجموعة 🤍"); 
        }
    }

    function prevZkr() { 
        if (currentIndex > 0) { 
            currentIndex--; 
            userCount = 0; 
            loadZkr(); 
        } 
    }

    function switchAzkar(category) {
        currentCategory = category; currentIndex = 0; userCount = 0;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        loadZkr();
    }

    // تنظيف النصوص والبحث عن المشاعر
    function cleanText(text) { 
        return text ? text.trim().replace(/[ًٌٍَُِّْ]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي") : ""; 
    }

    function searchFeeling() {
        const input = cleanText(document.getElementById("searchInput").value);
        const result = document.getElementById("searchResult");
        if (!input) return;
        
        let key = "makhnooq";
        if (input.includes("خايف") || input.includes("قلق")) key = "khaif";
        else if (input.includes("مديون") || input.includes("رزق") || input.includes("فقر")) key = "madioon";
        else if (input.includes("حزين") || input.includes("هم")) key = "hazin";
        else if (input.includes("مظلوم") || input.includes("ظلم")) key = "mazloom";
        else if (input.includes("مذنب") || input.includes("تقصير")) key = "maznoob";
        
        const data = database[key];
        result.innerHTML = `
            <div class="result-card">
                <h3>🩺 عند الشعور بـ ${data.title}:</h3>
                <p style="margin-top:10px;"><strong>📖 من القرآن:</strong> ${data.ayah}</p>
                <p style="margin-top:10px;"><strong>💬 من السنة:</strong> ${data.hadith}</p>
                <p style="margin-top:10px; color:var(--highlight); font-weight:bold;"><strong>🤍 رسالة لقلبك:</strong> ${data.comfort}</p>
            </div>`;
    }

    function quickSearch(feeling) { 
        document.getElementById("searchInput").value = feeling; 
        searchFeeling(); 
    }
    </script>
</body>
</html>
