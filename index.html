<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الصوت</title>
</head>
<body>
    <button id="testBtn" style="padding: 20px; font-size: 24px;">اضغط لتشغيل صوت النظام</button>
    
    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            // إنشاء صوت داخلي بسيط جداً عبر المتصفح (Oscillator)
            // هذه الطريقة لا تحتاج روابط خارجية ولا تتأثر بحظر السيرفرات
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine'; // نوع الصوت
            oscillator.frequency.value = 440; // التردد
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
            oscillator.stop(audioCtx.currentTime + 1);
            
            alert('إذا لم تسمع صوتاً الآن، فالمشكلة في "سماعات الهاتف" أو "زر الصامت الجانبي" وليست في الكود.');
        });
    </script>
</body>
</html>
