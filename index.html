<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأذكار اليومية</title>
    <style>
        body {
            background-color: #0a1128;
            color: #f8fafc;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1c2541;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { color: #00b4d8; margin-bottom: 20px; }
        p { font-size: 1.3rem; line-height: 1.8; margin-bottom: 20px; }
        .reward { color: #ffd166; font-size: 1rem; }
        .btn {
            background: #00f5d4;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>الأذكار اليومية ✨</h1>
        <p id="txt">أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...}</p>
        <div class="reward" id="rew">فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.</div>
        <button class="btn" onclick="next()">الذكر التالي ➡️</button>
    </div>

    <script>
        const list = [
            {t: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...}", r: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي."},
            {t: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ}", r: "تكفيك من كل شيء عند قراءتها ثلاث مرات."},
            {t: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ.", r: "تمنحك البركة وراحة البال في يومك."},
            {t: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ...", r: "لم يضره أي شيء أو فجأة بلاء حتى يصبح."}
        ];
        let idx = 0;
        function next() {
            idx = (idx + 1) % list.length;
            document.getElementById("txt").innerText = list[idx].t;
            document.getElementById("rew").innerText = list[idx].r;
        }
    </script>
</body>
</html>
