<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أذكار المسلم</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        h2 { color: #38bdf8; margin-top: 0; font-size: 1.8rem; }
        p { font-size: 1.4rem; line-height: 1.8; color: #e2e8f0; min-height: 100px; }
        .hint { color: #facc15; font-size: 1rem; margin-top: 15px; display: block; }
        button {
            background: #2dd4bf;
            color: #0f172a;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
        }
        button:hover { background: #14b8a6; }
    </style>
</head>
<body>

    <div class="box">
        <h2>✨ أذكار وطمأنينة</h2>
        <p id="text">أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...}</p>
        <span class="hint" id="hint">فضله: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.</span>
        <button onclick="change()">الذكر التالي ➡️</button>
    </div>

    <script>
        const azkar = [
            {t: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...}", h: "فضله: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي."},
            {t: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ}", h: "تكفيك من كل شيء عند قراءتها ثلاث مرات."},
            {t: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ.", h: "تمنحك البركة وراحة البال في يومك."},
            {t: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ...", h: "لم يضره أي شيء أو فجأة بلاء حتى يصبح."}
        ];
        let i = 0;
        function change() {
            i = (i + 1) % azkar.length;
            document.getElementById("text").innerText = azkar[i].t;
            document.getElementById("hint").innerText = azkar[i].h;
        }
    </script>
</body>
</html>
