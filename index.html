<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - الموسوعة الشاملة والأذكار الموسعة</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin: 30px 0;
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .azkar-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .azkar-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid rgba(0, 180, 216, 0.3);
            background: transparent;
            color: var(--text-color);
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        .azkar-box {
            background: rgba(10, 17, 40, 0.6);
            padding: 25px;
            border-radius: 16px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        .zkr-text {
            font-size: 1.35rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #fff;
        }

        .zkr-reward {
            font-size: 1rem;
            color: var(--highlight);
            font-style: italic;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .azkar-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .counter-btn {
            flex: 1;
            max-width: 250px;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 245, 212, 0.3);
            text-align: center;
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        .counter-btn.done {
            background: var(--success-color);
            color: #fff;
            box-shadow: 0 5px 15px rgba(42, 157, 143, 0.3);
        }

        /* تنسيقات محرك البحث والفضفضة */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 18px 22px;
            border-radius: 16px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.15rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 0 35px;
            border-radius: 16px;
            border: none;
            background-color: var(--primary-color);
            color: #000;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background-color: var(--accent-color);
        }

        .result-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border-right: 6px solid var(--primary-color);
            line-height: 2;
            font-size: 1.25rem;
            animation: fadeIn 0.4s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: justify;
        }

        .section-title {
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
            display: inline-block;
        }

        .quick-feelings {
            text-align: center;
            background: rgba(28, 37, 65, 0.4);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .feeling-btn {
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feeling-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        footer {
            margin-top: 40px;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>الموسوعة الروحية المتكاملة: حصن المسلم الموسع، ومحرك الأمان النفسي لعلاج الهموم والضيق</p>
    </header>

    <div class="main-container">
        
        <!-- قسم الأذكار الموسع -->
        <div class="azkar-section">
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">🌅 أذكار الصباح كامله</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">🌆 أذكار المساء كامله</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">🛏️ أذكار النوم والراحة</button>
            </div>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">جاري تحميل الحصن الروحي...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>

            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق ➡️</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 1</button>
                <button class="nav-btn" onclick="nextZkr()">⬅️ التالي</button>
            </div>
        </div>

        <!-- قسم البحث النفسي والدلالي -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك أو الموقف بالتفصيل (مثال: حاسس بكسرة خاطر، خايف من بكرة، مديون ومخنوق)">
                <button onclick="searchFeeling()">ابحث عن طمأنينة</button>
            </div>
            <div id="searchResult" class="search-result"></div>
        </div>

        <div class="quick-feelings">
            <h3 style="color: var(--text-muted); font-weight: 500;">اضغط سريعاً حسب ما تشعر به الآن:</h3>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('تنمر')">🗣️ التنمر</button>
                <button class="feeling-btn" onclick="quickSearch('حسد')">👁️ الحسد والعين</button>
                <button class="feeling-btn" onclick="quickSearch('كلام الناس')">💬 كلام الناس</button>
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 الضيق والخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('قلقان')">😨 الخوف والقلق</button>
                <button class="feeling-btn" onclick="quickSearch('ديون')">💵 قلة الرزق</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ الظلم والخذلان</button>
                <button class="feeling-btn" onclick="quickSearch('ذنب')">💔 التوبة والذنب</button>
                <button class="feeling-btn" onclick="quickSearch('مرض')">🩺 المرض والألم</button>
            </div>
        </div>

    </div>

    <footer>
        <p>طمئن قلبك © 2026 | أذكار تفاعلية وموسوعة نفسية متكاملة لراحة بالك</p>
    </footer>

    <script>
    // قاعدة بيانات الأذكار الموسعة والكاملة
    const azkarData = {
        morning: [
            { text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ...}", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...}، {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...}، {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...}", reward: "فضلها: من قالها ثلاثاً حين يصبح وحين يمسي كفته من كل شيء.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ.", reward: "فضلها: طلب لخير اليوم واستعاذة من شرور القدر.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.", reward: "فضلها: (سيد الاستغفار) من قالها موقناً بها ومات دخل الجنة.", count: 1 },
            { text: "اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ.", reward: "فضلها: من قالها 4 مرات أعتقه الله من النار في ذلك اليوم.", count: 4 },
            { text: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", reward: "فضلها: لم يضره شيء في الأرض ولا في السماء طوال يومه.", count: 3 },
            { text: "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.", reward: "فضلها: من قالها كفاه الله ما أهمه من أمر الدنيا والآخرة.", count: 7 },

            { text: "سُبْحَانَ اللهِ وَبِحَمْدِهِ.", reward: "فضلها: حُطّت خطاياه وإن كانت مثل زبد البحر، ولم يأتِ أحد بأفضل منه يوم القيامة.", count: 100 },
            { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", reward: "فضلها: حرز تام من الشيطان، وكتبت له 100 حسنة ومُحيت عنه 100 سيئة.", count: 100 },

            { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا.", reward: "فضلها: تمنح النفس السكينة والرضا بأقدار الليل والنهار.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ... فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.", reward: "فضلها: التوبة الليلية الكبرى (سيد الاستغفار).", count: 1 },

    let currentCategory = 'morning';
    let currentIndex = 0;
    let userCount = 0;

    function loadZkr() {
        const currentList = azkarData[currentCategory];
        const zkr = currentList[currentIndex];
        
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        
        userCount = 0;
        updateCounterButton(zkr.count);
        updateProgressBar();
    }

    function updateCounterButton(max) {
        const btn = document.getElementById("counterBtn");
        btn.innerText = `${userCount} / ${max}`;
        if (userCount >= max) {
            btn.classList.add("done");
            btn.innerText = `✓ تم (${max})`;
        } else {
            btn.classList.remove("done");
        }
    }

    function countZkr() {
        const currentList = azkarData[currentCategory];
        const max = currentList[currentIndex].count;
        
        if (userCount < max) {
            userCount++;
            updateCounterButton(max);
        } else {
            nextZkr(); 
        }
    }

    function nextZkr() {
        const currentList = azkarData[currentCategory];
        if (currentIndex < currentList.length - 1) {
            currentIndex++;
            loadZkr();
        } else {
            alert("أحسنت كتب الله أجرك! لقد أتممت هذه المجموعة كاملة بنجاح، جعلها الله حرزاً وحفظاً لك 🤍");
        }
    }

    function prevZkr() {
        if (currentIndex > 0) {
            currentIndex--;
            loadZkr();
        }
    }

    function switchAzkar(category) {
        currentCategory = category;
        currentIndex = 0;
        
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        
        loadZkr();
    }

    function updateProgressBar() {
        const currentList = azkarData[currentCategory];
        const percent = ((currentIndex + 1) / currentList.length) * 100;
        document.getElementById("progressBar").style.width = `${percent}%`;
    }

    window.onload = function() {
        loadZkr();
    };

    function searchFeeling() {
        const input = document.getElementById("searchInput").value.trim().toLowerCase();
        const resultBox = document.getElementById("searchResult");
        
        if (input === "") {
            resultBox.innerHTML = "<p style='color: var(--text-muted); text-align: center;'>من فضلك اكتب شعوراً أو موقفاً تود معالجته وطمأنته.</p>";
            return;
        }
        
        let matchedCategory = null;
        let maxScore = 0;

        for (let category in keywordsMap) {
            let score = 0;
            let keywords = keywordsMap[category];
            keywords.forEach(keyword => {
                if (input.includes(keyword) || keyword.includes(input)) {
                    score += 5;
                }
            });
            if (score > maxScore) {
                maxScore = score;
                matchedCategory = category;
            }
        }

        if (matchedCategory && database[matchedCategory]) {
            const res = database[matchedCategory];
            resultBox.innerHTML = `
                <div class="result-card">
                    <h4 style="color: var(--primary-color); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">📍 تم تشخيص الموقف: ${res.title}</h4>
                    <span class="section-title">📖 الآية الكريمة:</span><br><span>${res.ayah}</span><br><br>
                    <span class="section-title">💬 من السنة الشريفة:</span><br><span style="color: var(--text-muted);">${res.hadith}</span><br><br>
                    <span class="section-title">🤲 دعاء للوقاية والتحصين الشامل:</span><br><span style="color: var(--highlight);">${res.protection}</span><br><br>
                    <span class="section-title">💡 رسالة طمأنينة لقلبك:</span><br><span style="color: var(--accent-color);">${res.comfort}</span>
                </div>`;
        } else {
            resultBox.innerHTML = `
                <div class="result-card">
                    <h4 style="color: var(--text-muted); margin-bottom: 12px;">📍 طمأنينة عامة:</h4>
                    <span class="section-title">📖 الآية:</span><br><span>«أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ»</span><br><br>

                </div>`;
        }
    }

    function quickSearch(word) {
        document.getElementById("searchInput").value = word;
        searchFeeling();
    }
