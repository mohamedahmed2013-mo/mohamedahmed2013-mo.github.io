<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحتي الخاصة</title>
</head>
<body>

    <h1>مرحباً بك في صفحتي</h1>
    
    <!-- زر التشغيل الأساسي -->
    <button id="mainBtn" style="padding: 20px 40px; font-size: 20px; cursor: pointer;">
        اضغط هنا لتشغيل الصوت
    </button>

    <!-- هذا الجزء هو المسؤول عن تشغيل الصوت دون مشاكل -->
    <div id="playerContainer"></div>

    <script>
        document.getElementById('mainBtn').addEventListener('click', function() {
            // هذا الكود يتجاوز قيود المتصفح بإنشاء عنصر صوتي ديناميكي
            const audio = new Audio("https://server11.mp3quran.net/thubti/001.mp3");
            audio.play();
            this.innerText = "يعمل الآن...";
            this.style.backgroundColor = "#c6f6d5";
        });
    </script>
</body>
</html>
