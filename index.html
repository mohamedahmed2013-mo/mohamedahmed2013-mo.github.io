<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك</title>
    <style>
        :root {
            --bg: #0a1128; --card: #1c2541; --text: #f8fafc;
            --primary: #00b4d8; --accent: #00f5d4; --highlight: #ffd166;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        .main-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 25px; }
        
        /* تصميم المستطيلات الثلاثة الرئيسي */
        .box-section { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .box-title { color: var(--accent); font-size: 1.4rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        
        /* عناصر الأذكار */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .tab { padding: 8px 15px; border-radius: 8px; border: 2px solid var(--primary); background: transparent; color: #fff; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--primary); color: #000; }
        .display-area { background: rgba(10,17,40,0.6); padding: 15px; border-radius: 10px; text-align: center; min-height: 120px; margin-bottom: 15px; }
        .controls { display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 15px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .counter { padding: 12px; background: var(--accent); color: #000; font-size: 1.2rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; min-width: 120px; }
        
        /* عناصر البحث */
        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-row input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #0a1128; color: #fff; }
        .search-row button { padding: 0 20px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        .q-btn { padding: 8px; background: #0a1128; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .result { background: #0a1128; padding: 15px; border-radius: 10px; margin-top: 15px; border-right: 4px solid var(--primary); line-height: 1.7; }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
    </header>

    <div class="main-container">
        
        <!-- المستطيل الأول: الأذكار -->
        <div class="box-section">
            <h2 class="box-title">🌅 المستطيل الأول: الأذكار اليومية</h2>
            <div class="tabs">
                <button id="t-morning" class="tab active" onclick="setCat('morning')">الصباح</button>
                <button id="t-evening" class="tab" onclick="setCat('evening')">المساء</button>
            </div>
            <div class="display-area">
                <p id="z-text" style="font-size:1.2rem; margin-bottom:8px;">تحميل...</p>
                <p id="z-reward" style="color:var(--highlight); font-size:0.95rem;"></p>
            </div>
            <div class="controls">
                <button class="btn" onclick="prev()">السابق</button>
                <button id="countBtn" class="counter" onclick="press()">0 / 0</button>
                <button class="btn" onclick="next()">التالي</button>
            </div>
        </div>

        <!-- المستطيل الثاني: المشاعر -->
        <div class="box-section">
            <h2 class="box-title">🩹 المستطيل الثاني: كيف تشعر الآن؟</h2>
            <div class="search-row">
                <input type="text" id="feelIn" placeholder="اكتب شعورك (مخنوق، خايف، مديون...)">
                <button onclick="findFeel()">بحث</button>
            </div>
            <div class="grid">
                <button class="q-btn" onclick="quick('مخنوق')">😣 ضيق وخنقة</button>
                <button class="q-btn" onclick="quick('خايف')">😨 خوف وقلق</button>
                <button class="q-btn" onclick="quick('مديون')">💵 ضيق رزق</button>
            </div>
            <div id="feelOut"></div>
        </div>

        <!-- المستطيل الثالث: الصحابة -->
        <div class="box-section">
            <h2 class="box-title">🕌 المستطيل الثالث: سير الصحابة</h2>
            <div class="search-row">
                <input type="text" id="compIn" placeholder="اكتب اسم الصحابي (أبو بكر، عمر، خالد...)">
                <button onclick="findComp()">اقرأ</button>
            </div>
            <div id="compOut"></div>
        </div>

    </div>

    <script>
    const azkar = {
        morning: [
            {t:"{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} (آية الكرسي)", r:"يحفظك الله بها من الشياطين.", c:1},
            {t:"بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...} (3 مرات)", r:"تكفيك من كل شيء.", c:3}
        ],
        evening: [
            {t:"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", r:"حماية من كل ضرر وسم في ليلتك.", c:3}
        ]
    };

    const comps = [
        {n:"أبو بكر الصديق", s:"أول الخلفاء الراشدين، رفيق الهجرة، وأنفق كل ماله لدعم الإسلام."},
        {n:"عمر بن الخطاب", s:"الفاروق العادل، أعز الله به الدين، وفتح القدس وبنى الدولة."}
    ];

    const feels = {
        "makhnooq": {t:"الضيق والخنقة", a:"«فَسَبِّح * بِحَمْدِ رَبِّكَ وَكُن مِّنَ السَّاجِدِينَ»", c:"الضيق علامة فرج قادم، الجأ للصلاة وسيرتاح قلبك."},
        "khaif": {t:"الخوف والقلق", a:"«حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ»", c:"مستقبلك بيد رب رحيم، فلا تقلق من أوهام الغد."}
    };

    let cat = 'morning', idx = 0, num = 0;

    function render() {
        const item = azkar[cat][idx];
        document.getElementById("z-text").innerText = item.t;
        document.getElementById("z-reward").innerText = item.r;
        document.getElementById("countBtn").innerText = `${num} / ${item.c}`;
    }
    function press() {
        if(num < azkar[cat][idx].c) { num++; render(); } else { next(); }
    }
    function next() { if(idx < azkar[cat].length-1) { idx++; num=0; render(); } }
    function prev() { if(idx > 0) { idx--; num=0; render(); } }
    function setCat(c) { cat=c; idx=0; num=0; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); render(); }
    
    function findComp() {
        const val = document.getElementById("compIn").value;
        const res = comps.find(c => c.n.includes(val));
        document.getElementById("compOut").innerHTML = res ? `<div class="result"><h3>${res.n}</h3><p>${res.s}</p></div>` : '<div class="result">جرب كتابة: أبو بكر، عمر</div>';
    }
    function findFeel() {
        const val = document.getElementById("feelIn").value;
        let k = val.includes("خايف") ? "khaif" : "makhnooq";
        const res = feels[k];
        document.getElementById("feelOut").innerHTML = `<div class="result"><h3>${res.t}</h3><p><strong>الآية:</strong> ${res.a}</p><p><strong>طمأنينة:</strong> ${res.c}</p></div>`;
    }
    function quick(v) { document.getElementById("feelIn").value = v; findFeel(); }

    render();
    </script>
</body>
</html>
