<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - مساحتك الروحية</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #48cae4;
            --accent-color: #5bc0be;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-color);
            color: var(--bg-color);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background-color: var(--accent-color);
            transform: scale(1.02);
        }

        .search-result {
            width: 100%;
            min-height: 50px;
            text-align: right;
        }

        .result-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-right: 5px solid var(--primary-color);
            line-height: 1.8;
            font-size: 1.15rem;
            animation: fadeIn 0.5s ease;
        }

        .share-text {
            display: block;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
            font-weight: bold;
            text-align: center;
            font-size: 1rem;
        }

        .quick-feelings {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .quick-feelings h3 {
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .feeling-btn {
            padding: 15px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .feeling-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .feeling-btn span {
            font-size: 1.5rem;
        }

        footer {
            margin-top: auto;
            padding: 30px 0 10px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>مساحتك الهادئة للاستراحة، الاطمئنان، وراحة البال بذكر الله</p>
    </header>

    <!-- شريط البحث الذكي الشامل -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="اكتب ما تشعر به أو يواجهك.. (مثال: التنمر، مخنوق، خايف، الرزق)">
            <button onclick="searchFeeling()">ابحث</button>
        </div>
        <div id="searchResult" class="search-result"></div>
    </div>

    <!-- أزرار المشاعر والمواقف السريعة -->
    <div class="quick-feelings">
        <h3>أو اختر حالتك الحالية مباشرة:</h3>
        <div class="buttons-grid">
            <button class="feeling-btn" onclick="quickSearch('التنمر')"><span>🗣️</span>التنمر والسخرية</button>
            <button class="feeling-btn" onclick="quickSearch('الحسد')"><span>👁️</span>الحسد والعين</button>
            <button class="feeling-btn" onclick="quickSearch('حزين')"><span>😔</span>حزن وغم</button>
            <button class="feeling-btn" onclick="quickSearch('خايف')"><span>😨</span>خوف وقلق</button>
            <button class="feeling-btn" onclick="quickSearch('مخنوق')"><span>😣</span>ضيق وصدر</button>
            <button class="feeling-btn" onclick="quickSearch('مذنب')"><span>💔</span>توبة وذنب</button>
            <button class="feeling-btn" onclick="quickSearch('تعبان')"><span>😫</span>مرض وتعب</button>
            <button class="feeling-btn" onclick="quickSearch('الرزق')"><span>💵</span>الرزق والدين</button>
            <button class="feeling-btn" onclick="quickSearch('مشتت')"><span>🤔</span>حيرة وتشتت</button>
            <button class="feeling-btn" onclick="quickSearch('مظلوم')"><span>⚖️</span>ظلم وقهر</button>
        </div>
    </div>

    <footer>
        <p>صُنع بكل حب ليلامس قلبك بآيات الله وسنة رسوله | طمئن قلبك © 2026</p>
    </footer>

    <script>
    // قاعدة البيانات الشاملة المبنية على الآيات والأحاديث والأدعية
    const searchDatabase = {
        // قضايا ومواقف اجتماعية (الجديدة)
        "التنمر": "📖 آية: «يَا أَيُّهَا الَّذِينَ آمَنُوا لَا يَسْخَرْ قَوْمٌ مِّن قَوْمٍ عَسَىٰ أَن يَكُونُوا خَيْرًا مِّنْهُمْ» [الحجرات: 11].<br>💬 حديث: قال ﷺ: «بِحَسْبِ امْرِئٍ مِنَ الشَّرِّ أَنْ يَحْقِرَ أَخَاهُ الْمُسْلِمَ».<br>💡 رسالة لقلبك: لا تهتم لكلامهم، فقيمتك عند الله وليست عند البشر، وصبرك على أذاهم مدخر لك في ميزانك.",
        "سخرية": "📖 آية: «إِنَّ الَّذِينَ أَجْرَمُوا كَانُوا مِنَ الَّذِينَ آمَنُوا يَضْحَكُونَ * وَإِذَا مَرُّوا بِهِمْ يَتَغَامَزُونَ» [المطففين: 29-30] وتذكر عاقبتهم: «فَالْيَوْمَ الَّذِينَ آمَنُوا مِنَ الْكُفَّارِ يَضْحَكُونَ».",
        "استهزاء": "📖 آية: «وَلَقَدِ اسْتُهْزِئَ بِرُسُلٍ مِّن قَبْلِكَ فَحَاقَ بِالَّذِينَ سَخِرُوا مِنْهُم مَّا كَانُوا بِهِ يَسْتَهْزِئُونَ» [الأنعام: 10]. السخرية ابتلاء مر به الأنبياء فاصبر.",
        "كلام الناس": "📖 آية: «فَلَا يَحْزُنكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ» [يس: 76] وتذكر: «وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ بِمَا يَقُولُونَ * فَسَبِّحْ بِحَمْدِ رَبِّكَ».",
        "الحسد": "📖 آية: «أَمْ يَحْسُدُونَ النَّاسَ عَلَىٰ مَا آتَاهُمُ اللَّهُ مِن فَضْلِهِ» [النساء: 54] وتذكر: «وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ».<br>💬 حديث: «العَيْنُ حَقٌّ، ولو كانَ شيءٌ سابَقَ القَدَرَ سَبَقَتْهُ العَيْنُ».<br>🤲 تحصين: (أعوذ بكلمات الله التامة، من كل شيطان وهامة، ومن كل عين لامة).",
        "العين": "💬 حديث: كان النبي ﷺ يعوِّذ الحسن والحسين ويقول: «إِنَّ أَبَاكُمَا كَانَ يُعَوِّذُ بِهَا إِسْمَاعِيلَ وَإِسْحَاقَ: أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّةِ...». اقرأ المعوذتين وآية الكرسي دائماً.",

        // 1. الحزن والكسرة والغم
        "حزين": "📖 آية: «وَلَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا» [التوبة: 40].<br>💬 حديث: قال ﷺ: «مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ وَلَا حُزْنٍ وَلَا أَذًى وَلَا غَمٍّ... إِلَّا كَفَّرَ اللَّهُ بِهَا مِنْ خَطَايَاهُ».<br>🤲 دعاء: (اللهم إني أعوذ بك من الهم والحزن).",
        "زعلان": "📖 آية: «وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَىٰ» [الضحى: 5].<br>💬 حديث: «عَجَبًا لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ خَيْرٌ».<br>🤲 دعاء: (يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين).",
        "مكسور": "📖 آية: «وَاصْبِرْ لِحُكْمِ رَبِّكَ فَإِنَّكَ بِأَعْيُنِنَا» [الطور: 48].<br>💬 حديث: كان ﷺ يدعو بين السجدتين: «اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاجْبُرْنِي».<br>🤲 دعاء: (اللهم يا جابر كسر المنكسرين، اجبر خاطري وقرّ عيني بما أتمنى).",
        "دموع": "📖 آية: «تَرَىٰ أَعْيُنَهُمْ تَفِيضُ مِنَ الدَّمْعِ مِمَّا عَرَفُوا مِنَ الْحَقِّ» [المائدة: 83].<br>🤲 دعاء: (اللهم ابدل دمعتي فرحاً، وضيق صدري إنشراحاً وطمأنينة).",
        "بكاء": "📖 آية: «وَأَنَّهُ هُوَ أَضْحَكَ وَأَبْكَىٰ» [النجم: 43].<br>💬 حديث: كان النبي ﷺ إذا حزبه أمر (أقلقه) فزع إلى الصلاة.",
        "ببكي": "📖 آية: «فَسَيَكْفِيكَهُمُ اللَّهُ ۚ وَهُوَ السَّمِيعُ الْعَلِيمُ» [البقرة: 137].",

        // 2. الضيق والخنقة والاكتئاب والصدر
        "مخنوق": "📖 آية: «وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ بِمَا يَقُولُونَ * فَسَبِّحْ بِحَمْدِ رَبِّكَ وَكُن مِّنَ السَّاجِدِينَ» [الحجر: 97-98].<br>🤲 دعاء الكرب: (لا إله إلا الله العظيم الحليم، لا إله إلا الله رب العرش العظيم...).",
        "ضيق": "📖 آية: «فَإِنَّ مَعَ الْعُسْرِ يُسْرًا * إِنَّ مَعَ الْعُسْرِ يُسْرًا» [الشرح: 5-6].<br>💬 حديث: «وَاعْلَمْ أَنَّ الْفَرَجَ مَعَ الْكَرْبِ، وَأَنَّ مَعَ الْعُسْرِ يُسْرًا».",
        "تعبان": "📖 آية: «أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ» [الأنبياء: 83].<br>🤲 دعاء: (اللهم أرح قلبي وفكري، واصرف عني شتات العقل والتعب).",
        "مهموم": "📖 آية: «وَتَوَلَّىٰ عَنْهُمْ وَقَالَ يَا أَسَفَىٰ عَلَىٰ يُوسُفَ...» [يوسف: 84] ثم جاء الفرج.<br>💬 حديث: من لزم الاستغفار جعل الله له من كل هم فرجاً ومن كل ضيق مخرجاً.",
        "مكتئب": "📖 آية: «أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ» [الرعد: 28].<br>🤲 دعاء: (اللهم يا منور القلوب، أنر ظلمة قلبي بنور ذكرك وطاعتك).",
        "اكتئاب": "📖 آية: «وَنُنَزِّلُ مِنَ الْقُرْآنِ مَا هُوَ شِفَاءٌ وَرَحْمَةٌ لِّلْمُؤْمِنِينَ» [الإسراء: 82].",
        "خنقة": "📖 آية: «فَنَادَىٰ فِي الظُّلُمَاتِ أَن لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ» [الأنبياء: 87].",
        "مضايق": "📖 آية: «لَا تَدْرِي لَعَلَّ اللَّهَ يُحْدِثُ بَعْدَ ذَٰلِكَ أَمْرًا» [الطلاق: 1].",

        // 3. الخوف والقلق والمستقبل والدراسة
        "خايف": "📖 آية: «قَالَ لَا تَخَافَا ۖ إِنَّنِي مَعَكُمَا أَسْمَعُ وَأَرَىٰ» [طه: 46].<br>💬 حديث: «احْفَظِ اللَّهَ يَحْفَظْكَ، احْفَظِ اللَّهَ تَجِدْهُ تُجَاهَكَ».<br>🤲 دعاء: (اللهم آمن روعاتي، واستر عوراتي).",
        "قلقان": "📖 آية: «قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا هُوَ مَوْلَانَا» [التوبة: 51].<br>💬 حديث: «لَوْ أَنَّكُمْ تَتَوَكَّلُونَ عَلَى اللَّهِ حَقَّ تَوَكُّلِهِ لَرَزَقَكُمْ كَمَا يَرْزُقُ الطَّيْرَ».",
        "المستقبل": "📖 آية: «وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهو حَسْبُهُ» [الطلاق: 3].<br>💬 حديث: «وَاعْلَمْ أَنَّ مَا أَخْطَأَكَ لَمْ يَكُنْ لِيُصِيبَكَ».",
        "الامتحانات": "📖 آية: «وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ» [النجم: 39].<br>🤲 دعاء: (اللهم لا سهل إلا ما جعلته سهلاً، يسر لي هذا الامتحان).",

        // 4. الرزق والمال والعمل والديون
        "الرزق": "📖 آية: «وَفِي السَّمَاءِ رِزْقُكُمْ وَمَا تُوعَدُونَ» [الذاريات: 22].<br>💬 حديث: «لَوْ أَنَّ ابْنَ آدَمَ هَرَبَ مِنْ رِزْقِهِ كَمَا يَهْرَبُ مِنَ الْمَوْتِ، لَأَدْرَكَهُ رِزْقُهُ».",
        "فلوس": "📖 آية: «وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّلهُ مَخْرَجًا * وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ» [الطلاق: 2-3].",
        "ديون": "💬 حديث علّمه النبي ﷺ لعليٍّ: «اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ، وَأَغْنِنِي بِفَضْلِكَ عَمَّنْ سِوَاك_ فلو كان عليك مثل جبل صِيرٍ دَيْناً أداه الله عنك».",

        // 5. العلاقات والمشاعر الاجتماعية والظلم
        "مظلوم": "📖 آية: «وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ» [إبراهيم: 42].<br>💬 حديث قدسي لدعوة المظلوم: «وعزتي وجلالي لأنصرنك ولو بعد حين».<br>🤲 دعاء: (حسبي الله ونعم الوكيل).",
        "وحيد": "📖 آية: «وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ» [الحديد: 4].<br>🤲 دعاء: (اللهم آنس وحشتي، وتولّ أمري، واجعل لي من لدنك سلطاناً نصيراً).",
        "مخذول": "📖 آية: «وَإِن يَمْسَسْكَ اللَّهُ بِضُرٍّ فَلَا كَاشِفَ لَهُ إِلَّا هُوَ» [الأنعام: 17].",

        // 6. النجاح والفشل والهدف
        "فاشل": "📖 آية: «وَالَّذِينَ جَاهَدُوا فِينَا لَنَهْدِيَنَّهُمْ سُبُلَنَا» [العنكبوت: 69].<br>💬 حديث: «احْرِصْ عَلَى مَا يَنْفَعُكَ، وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجَزْ».",
        "يائس": "📖 آية: «قَالُوا بَشَّرْنَاكَ بِالْحَقِّ فَلَا تَكُن مِّنَ الْقَانِطِينَ» [الحجر: 55].",

        // 7. الذنوب والتوبة
        "مذنب": "📖 آية: «قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَىٰ أَنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ» [الزمر: 53].<br>💬 حديث: «كُلُّ بَنِي آدَمَ خَطَّاءٌ وَخَيْرُ الْخَطَّائِينَ التَّوَّابُونَ».",
        "توبة": "📖 آية: «يَا أَيُّهَا الَّذِينَ آمَنُوا تُوبُوا إِلَى اللَّهِ تَوْبَةً نَّصُوحًا» [التحريم: 8].",

        // 8. الموت والابتلاء والمرض
        "مريض": "📖 آية: «وَإِذَا مَرِضْتُ فَهُوَ يَشْفِينِ» [الشعراء: 80].<br>🤲 دعاء: (اللهم رب الناس أذهب البأس، اشفِ أنت الشافي لا شفاء إلا شفاؤك).",
        "ابتلاء": "📖 آية: «وَلَنَبْلُوَنَّكُم بِشَيْءٍ مِّنَ الْخَوْفِ وَالْجُوعِ... وَبَشِّرِ الصَّابِرِينَ» [البقرة: 155].",

        // 9. كلمات وجدانية عامة
        "يارب": "📖 آية: «وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ ۖ أُجِيبُ دَعْوَةَ الدَّاعِ إِذَا دَعَانِ» [البقرة: 186].",
        "الله": "📖 آية: «اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ» هو السند والملجأ في كل حال.",
        "طمئني": "📖 آية: «أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ» [الرعد: 28]. طمأن الله قلبك ويسر دربك."
    };

    // دالة البحث الذكية لربط الكلمات والمشاعر والمواقف
    function searchFeeling() {
        const input = document.getElementById("searchInput").value.trim().toLowerCase();
        const resultBox = document.getElementById("searchResult");
        
        if (input === "") {
            resultBox.innerHTML = "<p style='color: var(--text-muted);'>من فضلك اكتب كلمة، شعور، أو موقف في الخانة للبحث.</p>";
            return;
        }
        
        // البحث عن تطابق الكلمة في قاعدة البيانات
        let foundMessage = "";
        for (let key in searchDatabase) {
            if (input.includes(key) || key.includes(input)) {
                foundMessage = searchDatabase[key];
                break;
            }
        }
        
        if (foundMessage !== "") {
            resultBox.innerHTML = `
                <div class="result-card">
                    <p style="color: var(--text-color); font-weight: 500; text-align: justify;">${foundMessage}</p>
                    <span class="share-text">انشرها فالدال على الخير كفاعله 🤍</span>
                </div>
            `;
        } else {
            resultBox.innerHTML = `
                <div class="result-card" style="border-right-color: var(--text-muted);">
                    <p style="color: var(--text-muted);">لم نجد هذه الكلمة بالضبط، ولكن تذكر دائماً: «أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ». جرب كلمات ومواقف مثل (التنمر، الحسد، مخنوق، خايف، الرزق).</p>
                    <span class="share-text">انشرها فالدال على الخير كفاعله 🤍</span>
                </div>
            `;
        }
    }

    // دالة للضغط السريع من الأزرار
    function quickSearch(word) {
        document.getElementById("searchInput").value = word;
        searchFeeling();
    }
    </script>
</body>
</html>
