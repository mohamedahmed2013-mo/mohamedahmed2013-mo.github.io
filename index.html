<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        .azan-bar {
            background: linear-gradient(135deg, #132247, #1c2541);
            border: 1px solid var(--primary-color);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .azan-header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .azan-info { display: flex; align-items: center; gap: 12px; }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .azan-status { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .azan-btn:hover { background: var(--accent-color); transform: scale(1.03); }
        .azan-btn.playing { background: #ff4d4d; color: #fff; }

        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; }
        .prayer-item { text-align: center; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.02); }
        .prayer-item.next-prayer { border: 1px solid var(--accent-color); background: rgba(0, 245, 212, 0.1); }
        .prayer-name { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .prayer-time { font-size: 1rem; font-weight: bold; color: #fff; }

        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--text-color); cursor: pointer; border: 2px solid transparent; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .menu-box:hover { border-color: var(--primary-color); transform: translateY(-3px); background: #222f54; }
        
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        
        .azkar-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: #000; }
        .azkar-box { background: rgba(10, 17, 40, 0.6); padding: 20px; border-radius: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; }
        .zkr-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 10px; color: #fff; }
        .zkr-reward { font-size: 0.95rem; color: var(--highlight); }
        .azkar-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn, .counter-btn { padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer; }
        
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0a1128; color: #fff; font-size: 1rem; }
        .search-btn { padding: 0 20px; border-radius: 10px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; }
        .result-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 5px solid var(--primary-color); margin-top: 15px; line-height: 1.8; text-align: justify; }
        .buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .feeling-btn { padding: 10px; border-radius: 8px; border: none; background: #0a1128; color: #fff; cursor: pointer; }

        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; }
        .companion-card:hover { background: #131f42; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 750px; width: 100%; border-radius: 20px; padding: 30px; border: 2px solid var(--primary-color); position: relative; max-height: 80vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 10px; left: 10px; background: #ff4d4d; border: none; color: #fff; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>موسوعة السيرة النبوية العطرة وبستان الصحابة الأجلاء</p>
    </header>

    <div class="main-container">
        <!-- الأذان -->
        <div class="azan-bar">
            <div class="azan-header-container">
                <div class="azan-info">
                    <span>🕌</span>
                    <div>
                        <div class="azan-title">نظام المواقيت والآذان</div>
                        <div id="azanStatus" class="azan-status">اضغط بالشاشة للتنشيط</div>
                    </div>
                </div>
                <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع</button>
            </div>
            <div class="prayer-times-grid">
                <div class="prayer-item" id="p-fajr"><div class="prayer-name">الفجر</div><div class="prayer-time">04:10</div></div>
                <div class="prayer-item" id="p-dhuhr"><div class="prayer-name">الظهر</div><div class="prayer-time">12:55</div></div>
                <div class="prayer-item" id="p-asr"><div class="prayer-name">العصر</div><div class="prayer-time">16:30</div></div>
                <div class="prayer-item" id="p-maghrib"><div class="prayer-name">المغرب</div><div class="prayer-time">19:55</div></div>
                <div class="prayer-item" id="p-isha"><div class="prayer-name">العشاء</div><div class="prayer-time">21:30</div></div>
            </div>
        </div>

        <!-- القائمة -->
        <div id="mainMenu">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء</div>
        </div>

        <!-- الأقسام -->
        <div id="azkarSection" class="content-section">
            <h2 class="box-title">🌅 الأذكار <button class="back-btn" onclick="showMenu()">رجوع</button></h2>
            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">اختر ذكراً للبدء...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>
            <button class="counter-btn" id="counterBtn" onclick="countZkr()">0 / 0</button>
        </div>

        <div id="feelingsSection" class="content-section">
            <h2 class="box-title">🩹 المشاعر <button class="back-btn" onclick="showMenu()">رجوع</button></h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك (مثلاً: خايف، حزين...)">
                <button class="search-btn" onclick="searchFeeling()">بحث</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 الصحابة <button class="back-btn" onclick="showMenu()">رجوع</button></h2>
            <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي..." style="width:100%; padding:10px; border-radius:10px;">
            <div id="companionsGrid" class="companions-grid"></div>
        </div>
    </div>

    <!-- نافذة الصحابة -->
    <div id="companionModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">إغلاق</button>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // دمج البيانات والمنطق البرمجي
        const companions = [
            { name: "أبو بكر الصديق", title: "رفيق الغار", story: "<p>أول من أسلم من الرجال، صاحب النبي في الغار، وأنفق ماله كله في سبيل الله.</p>" },
            { name: "عمر بن الخطاب", title: "الفاروق", story: "<p>أعز الله به الإسلام، ومؤسس النظام الإداري في الدولة الإسلامية.</p>" },
            { name: "عثمان بن عفان", title: "ذو النورين", story: "<p>سخيّ الأمة وكاتب الوحي، جمع القرآن في مصحف واحد.</p>" }
        ];

        function renderCompanions(filter = "") {
            const grid = document.getElementById("companionsGrid");
            grid.innerHTML = "";
            companions.filter(c => c.name.includes(filter)).forEach(c => {
                const div = document.createElement("div");
                div.className = "companion-card";
                div.innerHTML = `<h3>${c.name}</h3><h4>${c.title}</h4>`;
                div.onclick = () => openModal(c);
                grid.appendChild(div);
            });
        }

        function openModal(c) {
            document.getElementById("modalTitle").innerText = c.name;
            document.getElementById("modalBody").innerHTML = c.story;
            document.getElementById("companionModal").style.display = "flex";
        }

        function closeModal() { document.getElementById("companionModal").style.display = "none"; }

        function showSection(id) {
            document.getElementById("mainMenu").style.display = "none";
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'companionsSection') renderCompanions();
        }

        function showMenu() {
            document.getElementById("mainMenu").style.display = "flex";
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        }

        function filterCompanions() {
            renderCompanions(document.getElementById("companionInput").value);
        }

        function enableAudioContext() { /* منطق تفعيل الصوت */ }
        function toggleAzan() { /* منطق الأذان */ }
        
        // البدء بعرض القائمة
        showMenu();
    </script>
</body>
</html>
