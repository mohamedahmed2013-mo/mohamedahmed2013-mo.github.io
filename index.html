<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الكاملة</title>
    <style>
        /* (نفس التنسيقات السابقة لضمان عمل التصميم) */
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; --highlight: #ffd166; --success-color: #2a9d8f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .menu-box { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .menu-box:hover { border-color: var(--primary-color); }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .azkar-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; }
        .zkr-text { font-size: 1.3rem; line-height: 1.8; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border: 1px solid var(--primary-color); background: none; color: white; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--primary-color); }
        .nav-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="mainMenu" class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية (كاملة)</div>

        <div id="azkarSection" class="content-section" style="display: block;">
            <div class="azkar-tabs" style="display:flex; justify-content:center; gap:10px;">
                <button class="tab-btn active" onclick="switchAzkar('morning')">الصباح</button>
                <button class="tab-btn" onclick="switchAzkar('evening')">المساء</button>
                <button class="tab-btn" onclick="switchAzkar('sleep')">النوم</button>
            </div>
            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">تحميل...</div>
                <div id="zkrReward" style="color: var(--highlight);"></div>
            </div>
            <div class="nav-controls">
                <button class="tab-btn" onclick="prevZkr()">السابق</button>
                <button id="counterBtn" class="tab-btn" style="background: var(--accent-color); color:black;">0/0</button>
                <button class="tab-btn" onclick="nextZkr()">التالي</button>
            </div>
        </div>
    </div>

    <script>
    // قاعدة البيانات المحدثة بالأذكار الكاملة
    const azkarData = {
        morning: [
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ.", reward: "فضلها: طمأنينة وتوفيق يومي.", count: 1 },
            { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ.", reward: "فضلها: استحضار عظمة الله.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ لَكَ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ.", reward: "سيد الاستغفار: من قالها موقناً بها حين يصبح فمات من يومه فهو من أهل الجنة.", count: 1 }
        ],
        evening: [
            { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا.", reward: "فضلها: حماية من شرور الليل.", count: 1 },
            { text: "بِاسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", reward: "لم يضره شيء في ليلته.", count: 3 }
        ],
        sleep: [
            { text: "اللَّهُمَّ بِاسْمِكَ أَمُوتُ وَأَحْيَا.", reward: "التوكل قبل النوم.", count: 1 },
            { text: "سُبْحَانَ اللَّهِ (33 مرة)، وَالْحَمْدُ لِلَّهِ (33 مرة)، وَاللَّهُ أَكْبَرُ (34 مرة).", reward: "خير من خادم.", count: 1 }
        ]
    };

    let currentAzkarType = 'morning';
    let currentZkrIndex = 0;
    let userCount = 0;

    function updateZkrUI() {
        const item = azkarData[currentAzkarType][currentZkrIndex];
        document.getElementById("zkrText").innerText = item.text;
        document.getElementById("zkrReward").innerText = item.reward;
        document.getElementById("counterBtn").innerText = `${userCount} / ${item.count}`;
    }

    function switchAzkar(type) {
        currentAzkarType = type;
        currentZkrIndex = 0;
        userCount = 0;
        updateZkrUI();
    }

    function nextZkr() {
        if(currentZkrIndex < azkarData[currentAzkarType].length - 1) {
            currentZkrIndex++;
            userCount = 0;
            updateZkrUI();
        }
    }

    function prevZkr() {
        if(currentZkrIndex > 0) {
            currentZkrIndex--;
            userCount = 0;
            updateZkrUI();
        }
    }

    // تهيئة الصفحة
    updateZkrUI();
    </script>
</body>
</html>
