<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        
        /* الأزرار الرئيسية */
        .menu-box { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 25px; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
            cursor: pointer; 
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .menu-box:hover { 
            border-color: var(--primary-color); 
            transform: translateY(-3px);
            background: #222f54;
        }
        
        /* الأقسام الداخلية */
        .content-section { 
            display: none; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        
        /* تصميم العداد والتبويبات */
        .azkar-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: #000; }
        .azkar-box { background: rgba(10, 17, 40, 0.6); padding: 20px; border-radius: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; }
        .zkr-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 10px; color: #fff; }
        .zkr-reward { font-size: 0.95rem; color: var(--highlight); }
        .azkar-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .counter-btn { flex: 1; max-width: 180px; padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: #000; font-size: 1.2rem; font-weight: bold; cursor: pointer; direction: ltr; }
        .counter-btn.done { background: var(--success-color); color: #fff; }
        
        /* البحث والمشاعر والقصص */
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0a1128; color: #fff; font-size: 1rem; }
        .search-btn { padding: 0 20px; border-radius: 10px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; }
        .result-card { background: #0a1128; padding: 18px; border-radius: 12px; border-right: 5px solid var(--primary-color); margin-top: 15px; line-height: 1.7; }
        .buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .feeling-btn { padding: 10px; border-radius: 8px; border: none; background: #0a1128; color: #fff; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">اختر من الأقسام الرئيسية بالأسفل</p>
    </header>

    <div class="main-container">
        
        <!-- القائمة الرئيسية المباشرة بدون كلمة مستطيل -->
        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء</div>
        </div>

        <!-- 1. قسم الأذكار -->
        <div id="azkarSection" class="content-section">
            <h2 class="box-title">🌅 الأذكار اليومية <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">الصباح</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">المساء</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">النوم</button>
            </div>
            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">تحميل...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>
            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 0</button>
                <button class="nav-btn" onclick="nextZkr()">التالي</button>
            </div>
        </div>

        <!-- 2. قسم المشاعر -->
        <div id="feelingsSection" class="content-section">
            <h2 class="box-title">🩹 محرك المشاعر والأمان النفسي <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك الحالي (مخنوق، خايف، مديون، حزين...)">
                <button class="search-btn" onclick="searchFeeling()">بحث</button>
            </div>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 ضيق وخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('خايف')">😨 خوف وقلق</button>
                <button class="feeling-btn" onclick="quickSearch('مديون')">💵 ضيق رزق</button>
                <button class="feeling-btn" onclick="quickSearch('حزين')">😢 حزن وهم</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ مظلومية</button>
                <button class="feeling-btn" onclick="quickSearch('مذنب')">🧎‍♂️ تقصير وذنب</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <!-- 3. قسم الصحابة -->
        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 سير الصحابة العظماء ومواقفهم <button class="back-btn" onclick="showMenu()">رجوع ↩</button></h2>
            <div class="search-box">
                <input type="text" id="companionInput" placeholder="اكتب اسم الصحابي (أبو بكر، عمر، بلال، عثمان، علي...)">
                <button class="search-btn" onclick="searchCompanion()">اقرأ قصته</button>
            </div>
            <div id="companionResult"></div>
        </div>

    </div>

    <script>
    // قاعدة بيانات أذكار موسعة بالكامل
    const azkarData = {
        morning: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...} [آية الكرسي - البقرة 255]", reward: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تصبح.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...} و {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...} و {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...}", reward: "فضلها: تقرأ ثلاث مرات، تكفيك من كل شيء.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", reward: "فضلها: تمنحك التوحيد والسكينة والتوكل في بداية يومك.", count: 1 },
            { text: "اللَّهُمَّ بكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ.", reward: "فضلها: إقرار بفضل الله وحفظه الدائم للعبد.", count: 1 },
            { text: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.", reward: "فضلها: تفويض الأمر بالكامل لرب العباد ليقود خطاك.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ... [سيد الاستغفار]", reward: "فضلها: من قالها موقناً بها ومات في يومه دخل الجنة.", count: 1 }
        ],
        evening: [
            { text: "{اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...} (آية الكرسي)", reward: "فضلها: حفظ من الله وأمان حتى تصبح.", count: 1 },
            { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ.", reward: "فضلها: سؤال الله خير ما في الليلة والتعوذ من شرها.", count: 1 },
            { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", reward: "فضلها: تقال ثلاث مرات، لا يضرك سم أو لدغة أو سوء في ليلتك.", count: 3 },
            { text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ، وَضَلَعِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ.", reward: "فضلها: تفك الكروب وتذهب غموم النفس والقلب.", count: 1 }
        ],
        sleep: [
            { text: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ، فَإِنْ أَمْسَكْتَ نَفْسِي فَارْحَمْهَا، وَإِنْ أَرْسَلْتَهَا فَاحْفَظْهَا بِمَا تَحْفَظُ بِهِ عِبَادَكَ الصَّالِحِينَ.", reward: "فضلها: أمان تام وحراسة إلهية لروحك في منامك.", count: 1 },
            { text: "اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ.", reward: "فضلها: تقال ثلاث مرات قبل النوم للحماية والوقاية.", count: 3 }
        ]
    };

    // قاعدة بيانات الصحابة الموسعة بقصص وافية
    const companionsData = [
        { name: "أبو بكر الصديق", title: "الصديق، أول الخلفاء الراشدين", story: "عبد الله بن أبي قحافة، صاحب رسول الله ﷺ الملازم له في الغار وأثناء الهجرة، أول من آمن من الرجال، جاهد بماله كله حيث أنفق ماله لتجهيز الجيوش وإعتاق العبيد كبلال، وتجلّى ثباته الأكبر يوم وفاة النبي وحرب المرتدين ليرسي دعائم الأمة." },
        { name: "عمر بن الخطاب", title: "الفاروق، أمير المؤمنين", story: "عمر بن الخطاب بن نفيل، أعز الله به الإسلام عند إسلامه في مكة، لقبه النبي بالفاروق لأنه فرّق بين الحق والباطل. تميز بالعدل المطلق ومراقبة الله، وفتح الله في عهده الشام ومصر والعراق وبيت المقدس وأسس التاريخ الهجري." },
        { name: "عثمان بن عفان", title: "ذو النورين، الشهيد", story: "عثمان بن عفان، تزوج ابنتي الرسول (رقية وأم كلثوم)، اشتهر بالحياء الشديد والكرم غير المحدود حيث جهز جيش العسرة وحده واشترى بئر رومة للمسلمين، وثالث الخلفاء الراشدين الذي جمع القرآن في مصحف واحد." },
        { name: "علي بن أبي طالب", title: "أبو السبطين، الفدائي الأول", story: "ابن عم رسول الله وزوج ابنته فاطمة، وأول من آمن من الصبيان. فدى النبي بنفسه ونام في فراشه ليلة الهجرة، واشتهر بالشجاعة النادرة في المعارك والوعظ وبلاغة العلم، وهو رابع الخلفاء الراشدين." },
        { name: "بلال بن رباح", title: "مؤذن رسول الله ﷺ", story: "عبد حبشي كان يُعذَّب فوق رمال مكة الحارقة ويُوضع الصخر العظيم على صدره ليترك دينه فما زاد على أن قال: 'أحدٌ أحد'. اشتراه أبو بكر وأعتقه، وجعله النبي مؤذن الإسلام الأول." }
    ];

    // قاعدة بيانات المشاعر الموسعة بآيات وأدعية كاملة
    const database = {
        "makhnooq": { title: "الضيق والخنقة الشديدة", ayah: "«وَلَقَدْ نَعْلَمُ أَنَّكَ يَضِيقُ صَدْرُكَ بِمَا يَقُولُونَ فَسَبِّحْ بِحَمْدِ رَبِّكَ وَكُن مِّنَ السَّاجِدِينَ» [الحجر 97-98]", hadith: "«ما يصيب المسلم من نصب ولا وصب ولا هم ولا حزن ولا أذى ولا غم حتى الشوكة يشاكها إلا كفّر الله بها من خطاياه».", comfort: "الضيق دائمًا هو إشارة من الله لتفريغ شحنات الدنيا في السجود والتسبيح، فرجك قريب جداً." },
        "khaif": { title: "الخوف والقلق من الغد والمستقبل", ayah: "«قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا هُوَ مَوْلَانَا وَعَلَى اللَّهِ فَلْيَتَوَكَّلِ الْمُؤْمِنُونَ» [التوبة 51]", hadith: "«احْرِصْ عَلَى مَا يَنْفَعُكَ، وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجِزْ، وَإِنْ أَصَابَكَ شَيْءٌ فَلَا تَقُلْ لَوْ أَنِّي فَعَلْتُ كَانَ كَذَا...»", comfort: "المستقبل غيب والغيب ملك للرحيم، فلماذا تقلق من ملكوت رحيم يحبك؟" },
        "madioon": { title: "الدين، الفقر وضيق الرزق", ayah: "«وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ» [الطلاق 2-3]", hadith: "«اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ، وَأَغْنِنِي بِفَضْلِكَ عَمَّنْ سِوَاكَ».", comfort: "الرزق مكفول ومكتوب ومقسوم قبل خلقك، فلا تحمل همّ غدٍ ما دام الرب حياً يرزق." },
        "hazin": { title: "الحزن والهم والغم", ayah: "«وَنُنَزِّلُ مِنَ الْقُرْآنِ مَا هُوَ شِفَاءٌ وَرَحْمَةٌ لِّلْمُؤْمِنِينَ» [الإسراء 82]", hadith: "«اللَّهُمَّ إِنِّي عَبْدُكَ، وَابْنُ عَبْدِكَ... أَسْأَلُكَ أَنْ تَجْعَلَ الْقُرْآنَ رَبِيعَ قَلْبِي، وَنُورَ صَدْرِي، وَجِلَاءَ حُزْنِي، وَذَهَابَ هَمِّي».", comfort: "الحزن محطة عابرة ليطهر الله بها قلبك ويرفع درجتك، سيعقب الحزن فرح يسجد له قلبك باكياً." },
        "mazloom": { title: "الشعور بالظلم والقهر", ayah: "«وَلَا تَحْسَبَنَّ اللَّهَ غَافِلًا عَمَّا يَعْمَلُ الظَّالِمُونَ إِنَّمَا يُؤَخِّرُهُمْ لِيَوْمٍ تَشْخَصُ فِيهِ الْأَبْصَارُ» [إبراهيم 42]", hadith: "«اتَّقِ دَعْوَةَ الْمَظْلُومِ، فَإِنَّهُ لَيْسَ بَيْنَهَا وَبَيْنَ اللَّهِ حِجَابٌ».", comfort: "قضيتك رُفعت إلى محكمة السماء، وصاحب الحق لا يضيع حقه أبداً ما دام الله هو الحَكَم العدل." },
        "maznoob": { title: "التقصير، ارتكاب الذنوب والرغبة في التوبة", ayah: "«قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَىٰ أَنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ إِنَّ اللَّهَ يَغْفِرُ الذُّنُوبَ جَمِيعًا» [الزمر 53]", hadith: "«لو لَمْ تُذْنِبُوا لَذَهَبَ اللَّهُ بِكُمْ، وَلَجَاءَ بِقَوْمٍ يُذْنِبُونَ فَيَسْتَغْفِرُونَ اللَّهَ فَيَغْفِرُ لَهُمْ».", comfort: "ربك يفرح بتوبتك ويفتح لك ذراعيه في كل ليلة، بادر بالاستغفار وامحُ السيئة بالحسنة." }
    };

    let currentCategory = 'morning', currentIndex = 0, userCount = 0;

    // التنقل والتحكم بالأقسام
    function showSection(sectionId) {
        document.getElementById('mainMenu').style.display = 'none';
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
        if(sectionId === 'azkarSection') loadZkr();
    }

    function showMenu() {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById('mainMenu').style.display = 'flex';
    }

    // تشغيل العدادات والأذكار
    function loadZkr() {
        const list = azkarData[currentCategory];
        const zkr = list[currentIndex];
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        
        const btn = document.getElementById("counterBtn");
        if (userCount >= zkr.count) { 
            btn.classList.add("done"); 
            btn.innerText = `✓ تم (${zkr.count})`; 
        } else { 
            btn.classList.remove("done"); 
            btn.innerText = `${userCount} / ${zkr.count}`; 
        }
    }

    function countZkr() {
        const list = azkarData[currentCategory];
        if (userCount < list[currentIndex].count) { 
            userCount++; 
            loadZkr(); 
        } else { 
            nextZkr(); 
        }
    }

    function nextZkr() {
        if (currentIndex < azkarData[currentCategory].length - 1) { 
            currentIndex++; 
            userCount = 0; 
            loadZkr(); 
        } else { 
            alert("الحمد لله! أتممت هذه المجموعة 🤍"); 
        }
    }

    function prevZkr() { 
        if (currentIndex > 0) { 
            currentIndex--; 
            userCount = 0; 
            loadZkr(); 
        } 
    }

    function switchAzkar(category) {
        currentCategory = category; currentIndex = 0; userCount = 0;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        loadZkr();
    }

    // البحث الذكي عن الصحابة والمشاعر
    function cleanText(text) { 
        return text ? text.trim().replace(/[ًٌٍَُِّْ]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي") : ""; 
    }

    function searchCompanion() {
        const input = cleanText(document.getElementById("companionInput").value);
        const result = document.getElementById("companionResult");
        if (!input) return;
        const found = companionsData.find(c => cleanText(c.name).includes(input));
        result.innerHTML = found ? 
            `<div class="result-card"><h3><h3>🕌 ${found.name}</h3><p style="color:var(--accent-color); margin:5px 0;"><strong>اللقب:</strong> ${found.title}</p><p style="text-align:justify; line-height:1.8;">${found.story}</p></div>` : 
            `<div class="result-card">⚠️ لم نعثر عليه بقاعدة البيانات الحالية، جرب كتابة: أبو بكر، عمر، عثمان، علي، بلال</div>`;
    }

    function searchFeeling() {
        const input = cleanText(document.getElementById("searchInput").value);
        const result = document.getElementById("searchResult");
        if (!input) return;
        
        let key = "makhnooq";
        if (input.includes("خايف") || input.includes("قلق") || input.includes("رعب")) key = "khaif";
        else if (input.includes("مديون") || input.includes("فلوس") || input.includes("رزق") || input.includes("فقر")) key = "madioon";
        else if (input.includes("حزين") || input.includes("زعلان") || input.includes("هم") || input.includes("غم")) key = "hazin";
        else if (input.includes("مظلوم") || input.includes("قهر") || input.includes("ظلم")) key = "mazloom";
        else if (input.includes("مذنب") || input.includes("عاصي") || input.includes("غلطت") || input.includes("تقصير")) key = "maznoob";
        
        const data = database[key];
        result.innerHTML = `
            <div class="result-card">
                <h3>🩺 عند الشعور بـ ${data.title}:</h3>
                <p style="margin-top:10px;"><strong>📖 من القرآن:</strong> ${data.ayah}</p>
                <p style="margin-top:10px;"><strong>💬 من السنة:</strong> ${data.hadith}</p>
                <p style="margin-top:10px; color:var(--highlight); font-weight:bold;"><strong>🤍 رسالة لقلبك:</strong> ${data.comfort}</p>
            </div>`;
    }

    function quickSearch(feeling) { 
        document.getElementById("searchInput").value = feeling; 
        searchFeeling(); 
    }
    </script>
</body>
</html>
