<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك - تفعيل الصوت</title>
    <style>
        body { background: #0a1128; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .btn { padding: 20px 40px; font-size: 20px; background: #00b4d8; border: none; border-radius: 15px; color: white; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #00f5d4; color: black; }
        #status { margin-top: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>نظام الأذان</h1>
    <!-- الرابط مباشر ومجرب -->
    <audio id="audioPlayer" src="https://server11.mp3quran.net/thubti/001.mp3"></audio>
    
    <button class="btn" onclick="forcePlay()">اضغط هنا لتشغيل الصوت</button>
    <p id="status">إذا لم تسمع صوتاً، تأكد أن هاتفك ليس على وضع الصامت.</p>

    <script>
        function forcePlay() {
            const audio = document.getElementById("audioPlayer");
            audio.play().then(() => {
                document.getElementById("status").innerText = "تم تفعيل الصوت بنجاح! يعمل الآن.";
            }).catch(e => {
                document.getElementById("status").innerText = "خطأ في التشغيل: " + e.message;
            });
        }
    </script>
</body>
</html>
