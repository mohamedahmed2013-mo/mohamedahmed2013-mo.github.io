<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - الحصن الرقمي المتكامل</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
            --warning-color: #f4a261;
            --danger-color: #e63946;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin: 30px 0;
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .quran-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .quran-section h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quran-search {
            width: 100%;
            padding: 12px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(10, 17, 40, 0.6);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .quran-search:focus {
            border-color: var(--accent-color);
        }

        .quran-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .quran-grid::-webkit-scrollbar {
            width: 6px;
        }
        .quran-grid::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .quran-grid::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }

        .surah-card {
            background: rgba(10, 17, 40, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
        }

        .surah-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .surah-name {
            font-weight: bold;
            font-size: 1.05rem;
        }

        .surah-status-select {
            width: 100%;
            padding: 6px;
            border-radius: 8px;
            background: #0a1128;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .surah-card.not-read { border-right: 4px solid var(--danger-color); }
        .surah-card.reading { border-right: 4px solid var(--warning-color); }
        .surah-card.done { border-right: 4px solid var(--success-color); background: rgba(42, 157, 143, 0.1); }

        .azkar-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .azkar-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid rgba(0, 180, 216, 0.3);
            background: transparent;
            color: var(--text-color);
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        .azkar-box {
            background: rgba(10, 17, 40, 0.6);
            padding: 25px;
            border-radius: 16px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .zkr-text {
            font-size: 1.35rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #fff;
        }

        .zkr-reward {
            font-size: 1rem;
            color: var(--highlight);
            font-style: italic;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .azkar-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .counter-btn {
            flex: 1;
            max-width: 250px;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 245, 212, 0.3);
            text-align: center;
        }

        .counter-btn.done {
            background: var(--success-color);
            color: #fff;
        }

        .search-container {
            width: 100%;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 18px 22px;
            border-radius: 16px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.15rem;
            outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box .search-btn {
            padding: 0 35px;
            border-radius: 16px;
            border: none;
            background-color: var(--primary-color);
            color: #000;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
        }

        .search-result {
            margin-top: 15px;
        }

        .result-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border-right: 6px solid var(--primary-color);
            line-height: 2;
            font-size: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: justify;
            scroll-margin-top: 20px;
        }

        .section-title {
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
            display: inline-block;
        }

        .quick-feelings {
            text-align: center;
            background: rgba(28, 37, 65, 0.4);
            padding: 25px;
            border-radius: 24px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .feeling-btn {
            padding: 12px 8px;
            border-radius: 12px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .feeling-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p>الموسوعة الإسلامية النفسية الشاملة والمطورة - نصوص كاملة غير مجتزأة</p>
    </header>

    <div class="main-container">

        <div class="azkar-section">
            <div class="azkar-tabs">
                <button id="btn-morning" class="tab-btn active" onclick="switchAzkar('morning')">🌅 أذكار الصباح (15)</button>
                <button id="btn-evening" class="tab-btn" onclick="switchAzkar('evening')">🌆 أذكار المساء (15)</button>
                <button id="btn-sleep" class="tab-btn" onclick="switchAzkar('sleep')">🛏️ أذكار النوم (15)</button>
            </div>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="azkar-box">
                <div id="zkrText" class="zkr-text">جاري تحميل الأذكار...</div>
                <div id="zkrReward" class="zkr-reward"></div>
            </div>

            <div class="azkar-controls">
                <button class="nav-btn" onclick="prevZkr()">السابق ➡️</button>
                <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 1</button>
                <button class="nav-btn" onclick="nextZkr()">⬅️ التالي</button>
            </div>
        </div>

        <div class="quran-section">
            <h2>📖 الحصن القرآني ومتابعة الورد (114 سورة)</h2>
            <input type="text" id="quranSearchInput" class="quran-search" placeholder="🔍 ابحث عن السورة بسرعة (مثال: البقرة، يس، الملك)..." oninput="filterQuran()">
            <div id="quranGrid" class="quran-grid"></div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب شعورك أو الموقف بالتفصيل (مثال: ماليش نفس أذاكر، خايف من النتيجة، مكسور، مديون)" onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchFeeling()">ابحث عن طمأنينة</button>
            </div>
            <div id="searchResult" class="search-result"></div>
        </div>

        <div class="quick-feelings">
            <h3 style="color: var(--text-muted); font-weight: 500;">اضغط سريعاً حسب ما تشعر به الآن:</h3>
            <div class="buttons-grid">
                <button class="feeling-btn" onclick="quickSearch('دراسة')">📚 الدراسة والامتحانات</button>
                <button class="feeling-btn" onclick="quickSearch('تنمر')">🗣️ التنمر والسخرية</button>
                <button class="feeling-btn" onclick="quickSearch('حسد')">👁️ الحسد والعين</button>
                <button class="feeling-btn" onclick="quickSearch('كلام الناس')">💬 كلام الناس</button>
                <button class="feeling-btn" onclick="quickSearch('مخنوق')">😣 الضيق والخنقة</button>
                <button class="feeling-btn" onclick="quickSearch('ديون')">💵 قلة الرزق والمال</button>
                <button class="feeling-btn" onclick="quickSearch('مظلوم')">⚖️ الظلم والخذلان</button>
                <button class="feeling-btn" onclick="quickSearch('ذنب')">💔 التوبة والذنب</button>
                <button class="feeling-btn" onclick="quickSearch('مرض')">🩺 المرض والألم</button>
            </div>
        </div>

    </div>

    <footer>
        <p>طمئن قلبك © 2026 | أذكار، سور القرآن الكريم وموسوعة الطمأنينة النفسية</p>
    </footer>

    <script>
    const surahsList = [
        "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبيآء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"
    ];

    const azkarData = {
        morning: [
            { text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: «اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ»", reward: "فضلها: لن يزال عليك من الله حافظ حتى تصبح ولا يقربك شيطان.", count: 1 },
            { text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: «قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدٌ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ». «قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ». «قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجَنَّةِ وَالنَّاسِ».", reward: "فضلها: تكفيك من كل شيء إذا قرأتها 3 مرات.", count: 3 },
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ.", reward: "فضلها: تمنح النفس الطمأنينة والاستفتاح المبارك لليوم.", count: 1 },
            { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ لَكَ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.", reward: "فضلها: سيد الاستغفار، من قالها موقناً بها ومات في يومه دخل الجنة.", count: 1 },

            hadith: "عن أنس بن مالك رضي الله عنه قال: سمعت رسول الله صلى الله عليه وسلم يقول: «قَالَ اللَّهُ تَبَارَكَ وَتَعَالَى: يَا ابْنَ آدَمَ إِنَّكَ مَا دَعَوْتَنِي وَرَجَوْتَنِي غَفَرْتُ لَكَ عَلَى مَا كَانَ فِيكَ وَلَا أُبَالِي، يَا ابْنَ آدَمَ لَوْ بَلَغَتْ ذُنُوبُكَ عَنَانَ السَّمَاءِ ثُمَّ اسْتَغْفَرْتَنِي غَفَرْتُ لَكَ وَلَا أُبَالِي» [رواه الترمذي].",

        },
        "sickness_pain": {

            keywords: ["مرض", "الم", "تعبان", "وجع", "مريض", "شفا"],
            ayah: "«وَأَيُّوبَ إِذْ نَادَىٰ رَبَّهُ أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ ۝ فَاسْتَجَبْنَا لَهُ فَكَشَفْنَا مَا بِهِ مِن ضُرٍّ ۖ وَآتَيْنَاهُ أَهْلَهُ وَمِثْلَهُم مَّعَهُمْ رَحْمَةً مِّنْ عِندِنَا وَذِكْرَىٰ لِلْعَابِدِينَ» [الأنبياء: 83-84]. وأيضاً قوله تعالى: «وَإِذَا مَرِضْتُ فَهُوَ يَشْفِينِ» [الشعراء: 80].",
            hadith: "عن عثمان بن أبي العاص الثقفي أنه شكا إلى رسول الله صلى الله عليه وسلم وجعاً يجده في جسده منذ أسلم، فقال له رسول الله صلى الله عليه وسلم: «ضَعْ يَدَكَ عَلَى الَّذِي تَأَلَّمَ مِنْ جَسَدِكَ، وَقُلْ: بِاسْمِ اللَّهِ (ثَلَاثًا)، وَقُلْ (سَبْعَ مَرَّاتٍ): أَعُوذُ بِاللَّهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ» [رواه مسلم].",
            protection: "«اللَّهُمَّ رَبَّ النَّاسِ، أَذْهِبِ الْبَأْسَ، وَاشْفِ أَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ، شِفَاءً لَا يُغَادِرُ سَقَمًا».",
            comfort: "كل دقة ألم ووجع، وكل وهن تشعر به ليس عبثاً؛ إنها غسيل وتطهير لخطاياك، ورفع هائل لدرجاتك في الجنة. اصبر وخذ بالأسباب الطبية، وشفاؤك قادم بأمر الشافي سبحانه."

    function displayResult(data) {
        const resultDiv = document.getElementById("searchResult");
        resultDiv.innerHTML = `
            <div class="result-card" id="resultCard">
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">${data.title}</h3>
                <span class="section-title">📖 من القرآن الكريم (النص الكامل):</span><br>${data.ayah}<br>
                <span class="section-title">💬 من السنة النبوية (النص الكامل):</span><br>${data.hadith}<br>
                <span class="section-title">🛡️ حصن نفسك بهذا الدعاء:</span><br>${data.protection}<br>
                <span class="section-title">🤍 رسالة طمأنينة لقلبك:</span><br>${data.comfort}
            </div>
        `;
        document.getElementById("resultCard").scrollIntoView({ behavior: 'smooth' });
    }

    function searchFeeling() {
        const rawInput = document.getElementById("searchInput").value.trim();
        if (!rawInput) return;

        const cleanInput = normalizeArabic(rawInput.toLowerCase());
        let foundData = null;

        for (let key in database) {
            const matched = database[key].keywords.some(keyword => cleanInput.includes(normalizeArabic(keyword)));
            if (matched) {
                foundData = database[key];
                break;
            }
        }

        if (foundData) {
            displayResult(foundData);
        } else {
            document.getElementById("searchResult").innerHTML = `
                <div class="result-card" style="border-right-color: var(--danger-color);">
                    <h3 style="color: var(--warning-color);">لم نجد تصنيفاً دقيقاً لشعورك.. 🤍</h3>
                    <p>لكن تذكر دائماً الآية الكريمة كاملة: «الَّذِينَ آمَنُوا وَتَطْمَئِنُّ قُلُوبُهُم بِذِكْرِ اللَّهِ ۗ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ» [الرعد: 28]. داوم على الاستغفار والصلاة على النبي وسيفتح الله لك أبواب الخير.</p>
                </div>
            `;
        }
    }

    function quickSearch(type) {
        let keyMap = {
            'دراسة': 'study_exams',
            'تنمر': 'social_harm',
            'حسد': 'envy_magic',
            'كلام الناس': 'people_talk',
            'مخنوق': 'depression_sadness',
            'ديون': 'money_debts',
            'مظلوم': 'oppression',
            'ذنب': 'sin_repentance',
            'مرض': 'sickness_pain'
        };
        
        let dbKey = keyMap[type];
        if (dbKey && database[dbKey]) {
            displayResult(database[dbKey]);
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            searchFeeling();
        }
    }

    function switchAzkar(category) {
        currentCategory = category;
        currentIndex = 0;
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        document.getElementById(`btn-${category}`).classList.add("active");
        loadZkr();
    }

    function loadZkr() {
        const currentList = azkarData[currentCategory];
        if(!currentList || currentList.length === 0) return;
        
        if (currentIndex >= currentList.length) currentIndex = 0;
        
        const zkr = currentList[currentIndex];
        document.getElementById("zkrText").innerText = zkr.text;
        document.getElementById("zkrReward").innerText = zkr.reward;
        userCount = 0;
        updateCounterButton(zkr.count);
        updateProgressBar();
        
        localStorage.setItem("current_azkar_cat", currentCategory);
        localStorage.setItem("current_azkar_idx", currentIndex);
    }

    function updateCounterButton(max) {
        const btn = document.getElementById("counterBtn");
        btn.innerText = `${userCount} / ${max}`;
        if (userCount >= max) {
            btn.classList.add("done");
            btn.innerText = `✓ تم (${max})`;
        } else {
            btn.classList.remove("done");
        }
    }

    function countZkr() {
        const currentList = azkarData[currentCategory];
        const max = currentList[currentIndex].count;
        if (userCount < max) {
            userCount++;
            updateCounterButton(max);
        } else {
            nextZkr(); 
        }
    }

    function nextZkr() {
        const currentList = azkarData[currentCategory];
        if (currentIndex < currentList.length - 1) {
            currentIndex++;
            loadZkr();
        }
    }

    function prevZkr() {
        if (currentIndex > 0) {
            currentIndex--;
            loadZkr();
        }
    }

    function updateProgressBar() {
        const currentList = azkarData[currentCategory];
        const percent = ((currentIndex + 1) / currentList.length) * 100;
        document.getElementById("progressBar").style.width = `${percent}%`;
    }

    function initQuran() {
        const grid = document.getElementById("quranGrid");
        grid.innerHTML = "";
        let savedStatus = JSON.parse(localStorage.getItem("quran_tracker_status")) || {};

        surahsList.forEach((name, index) => {
            const surahNum = index + 1;
            const status = savedStatus[surahNum] || "not-read";

            const card = document.createElement("div");
            card.id = `surah-${surahNum}`;
            card.className = `surah-card ${status}`;
            card.setAttribute("data-name", normalizeArabic(name));
            card.setAttribute("data-display-name", name);

            card.innerHTML = `
                <div class="surah-info">
                    <span class="surah-name">${surahNum}. سورة ${name}</span>
                </div>
                <select class="surah-status-select" onchange="changeSurahStatus(${surahNum}, this.value)">
                    <option value="not-read" ${status === 'not-read' ? 'selected' : ''}>🔴 لم تقرأ</option>
                    <option value="reading" ${status === 'reading' ? 'selected' : ''}>🟡 جاري قراءتها</option>
                    <option value="done" ${status === 'done' ? 'selected' : ''}>🟢 تم قراءتها</option>
                </select>
            `;
            grid.appendChild(card);
        });
    }

    function changeSurahStatus(num, newStatus) {
        const card = document.getElementById(`surah-${num}`);
        card.className = `surah-card ${newStatus}`;

        let savedStatus = JSON.parse(localStorage.getItem("quran_tracker_status")) || {};
        savedStatus[num] = newStatus;
        localStorage.setItem("quran_tracker_status", JSON.stringify(savedStatus));
    }

    function filterQuran() {
        const query = normalizeArabic(document.getElementById("quranSearchInput").value.trim());
        const cards = document.querySelectorAll(".surah-card");

        cards.forEach(card => {
            const name = card.getAttribute("data-name");
            if (name.includes(query) || query === "") {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    }

    function normalizeArabic(text) {
        return text
            .replace(/[ًٌٍَُِّْ]/g, "") 
            .replace(/[أإآإ]/g, "ا")  
            .replace(/ة/g, "ه")       
            .replace(/ى/g, "ي");      
    }

    window.onload = function() {
        let currentCategory = localStorage.getItem("current_azkar_cat") || 'morning';
        let currentIndex = parseInt(localStorage.getItem("current_azkar_idx")) || 0;
        switchAzkar(currentCategory);
        initQuran();
    };
    </script>
</body>
