<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشغل الأذان الكامل</title>
</head>
<body>

    <h2 id="msg">انتظار التفاعل لتفعيل الصوت...</h2>
    <button id="startBtn" style="padding: 20px; font-size: 20px;">تفعيل التشغيل</button>

    <script>
        const audio = new Audio("https://server11.mp3quran.net/thubti/001.mp3");
        
        // 1. خدعة تفعيل الصوت (تشغيل صمت وهمي)
        function unlockAudio() {
            let silence = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==");
            silence.play();
            document.getElementById("msg").innerText = "تم التفعيل! سيتم تشغيل الأذان الآن.";
            startBtn.style.display = "none";
        }

        document.getElementById("startBtn").addEventListener("click", () => {
            unlockAudio();
            // 2. تشغيل الأذان فوراً بعد التفعيل
            audio.play().catch(e => console.log("خطأ: " + e));
        });

        // 3. مثال للتشغيل عند وقت معين (استبدل القيم بـ وقت الصلاة القادم)
        function checkTime() {
            let now = new Date();
            if (now.getHours() === 12 && now.getMinutes() === 6) { // مثال: الساعة 12:06
                audio.play();
            }
        }
        setInterval(checkTime, 10000); // فحص كل 10 ثوانٍ
    </script>
</body>
</html>
