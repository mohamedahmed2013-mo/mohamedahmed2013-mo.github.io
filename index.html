<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }

        /* الأقسام الأساسية */
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.2rem; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .menu-box:hover { border-color: var(--primary-color); background: #222f54; }
        
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .box-title { color: var(--accent-color); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* الصحابة */
        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; transition: 0.2s; }
        .companion-card:hover { background: #131f42; border-right-color: var(--accent-color); }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 750px; width: 100%; border-radius: 20px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; left: 15px; cursor: pointer; background: none; border: none; color: white; font-size: 1.5rem; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="color: #94a3b8;">موسوعة السيرة النبوية وبستان الصحابة</p>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div id="azanStatus">اضغط في أي مكان لتنشيط الصوت 🔔</div>
        </div>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء (موسوعة شاملة)</div>
        </div>

        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 سير الصحابة <button onclick="showMenu()">رجوع</button></h2>
            <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي..." style="width:100%; padding:10px; border-radius:10px;">
            <div id="companionsGrid" class="companions-grid"></div>
        </div>
    </div>

    <div id="companionModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2 id="modalTitle" style="color: var(--accent-color);"></h2>
            <p id="modalSubtitle" style="color: var(--highlight); margin-bottom: 20px;"></p>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const companionsData = [
            { name: "أبو بكر الصديق", title: "رفيق الغار", story: "هو أول من أسلم من الرجال، وصدق النبي في الإسراء والمعراج." },
            { name: "عمر بن الخطاب", title: "الفاروق", story: "لقبه النبي بالفاروق، وكان إسلامه عزة للمسلمين." },
            { name: "الزبير بن العوام", title: "حواري رسول الله", story: "هو ابن عمة النبي، وأحد العشرة المبشرين بالجنة، وأول من سل سيفاً في سبيل الله." }
        ];

        function renderCompanions(filter = "") {
            const grid = document.getElementById("companionsGrid");
            grid.innerHTML = "";
            companionsData.filter(c => c.name.includes(filter)).forEach(c => {
                const div = document.createElement("div");
                div.className = "companion-card";
                div.innerHTML = `<h3>${c.name}</h3><h4>${c.title}</h4>`;
                div.onclick = () => openModal(c);
                grid.appendChild(div);
            });
        }

        function openModal(c) {
            document.getElementById("modalTitle").innerText = c.name;
            document.getElementById("modalSubtitle").innerText = c.title;
            document.getElementById("modalBody").innerHTML = c.story;
            document.getElementById("companionModal").style.display = "flex";
        }

        function closeModal() { document.getElementById("companionModal").style.display = "none"; }
        function showSection(id) { document.getElementById(id).style.display = "block"; document.getElementById("mainMenu").style.display = "none"; }
        function showMenu() { document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none'); document.getElementById("mainMenu").style.display = "flex"; }
        function filterCompanions() { renderCompanions(document.getElementById("companionInput").value); }
        
        function enableAudioContext() { /* منطق تفعيل الصوت */ }

        renderCompanions();
    </script>
</body>
</html>
