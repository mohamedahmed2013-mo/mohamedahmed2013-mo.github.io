<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حصن المسلم التفاعلي</title>
    <style>
        :root {
            --main-bg: #090d16;
            --box-bg: #111827;
            --text-color: #f3f4f6;
            --cyan-glow: #22d3ee;
            --amber-glow: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background-color: var(--main-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .wrapper {
            background: var(--box-bg);
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid #1f2937;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            background: #1f2937;
            color: #9ca3af;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--cyan-glow);
            color: #0f172a;
        }
        .display-box {
            background: rgba(255,255,255,0.02);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .text { font-size: 1.35rem; line-height: 1.8; margin-bottom: 15px; }
        .reward { color: var(--amber-glow); font-size: 0.95rem; line-height: 1.4; }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .btn-nav {
            background: #1f2937;
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-counter {
            flex: 1;
            background: var(--cyan-glow);
            color: #0f172a;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-counter.done {
            background: #10b981;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="tabs">
            <button id="t-m" class="tab active" onclick="changeCat('morning')">🌅 الصباح</button>
            <button id="t-e" class="tab" onclick="changeCat('evening')">🌆 المساء</button>
            <button id="t-s" class="tab" onclick="changeCat('sleep')">🛏️ النوم</button>
        </div>

        <div class="display-box">
            <p id="zkrTxt" class="text">أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...}</p>
            <p id="zkrRew" class="reward">فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.</p>
        </div>

        <div class="controls">
            <button class="btn-nav" onclick="prev()">السابق</button>
            <button id="countBtn" class="btn-counter" onclick="hit()">0 / 1</button>
            <button class="btn-nav" onclick="next()">التالي</button>
        </div>
    </div>

    <script>
    const data = {
        morning: [
            {t: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...}", r: "فضلها: لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تمسي.", c: 1},
            {t: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...}", r: "تكفيك من كل شيء عند قراءتها ثلاث مرات.", c: 3},
            {t: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ.", r: "تجعل يومك مباركاً وتدفع أقدار السوء والكسل.", c: 1},
            {t: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أنتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ...", r: "سيد الاستغفار: من قالها موقناً بها ومات من يومه دخل الجنة.", c: 1}
        ],
        evening: [
            {t: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لاَ إِلَهَ إِلاَّ اللَّهُ...", r: "تمنح النفس الهدوء والسكينة عند غياب الشمس.", c: 1},
            {t: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ...", r: "لم يضره أي شيء أو فجأة بلاء حتى يصبح.", c: 3}
        ],
        sleep: [
            {t: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ...", r: "تسليم روحي وجسدي كامل للخالق لحفظ النفس أثناء النوم.", c: 1},
            {t: "اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ.", r: "تقال 3 مرات للوقاية من العقاب والأمان القلبي.", c: 3}
        ]
    };

    let cat = 'morning', idx = 0, currentCount = 0;

    function update() {
        const item = data[cat][idx];
        document.getElementById("zkrTxt").innerText = item.t;
        document.getElementById("zkrRew").innerText = item.r;
        
        const btn = document.getElementById("countBtn");
        if (currentCount >= item.c) {
            btn.innerText = `✓ تم (${item.c})`;
            btn.classList.add("done");
        } else {
            btn.innerText = `${currentCount} / ${item.c}`;
            btn.classList.remove("done");
        }
    }

    function hit() {
        const max = data[cat][idx].c;
        if (currentCount < max) {
            currentCount++;
            update();
        } else {
            next();
        }
    }

    function next() {
        if (idx < data[cat].length - 1) { idx++; currentCount = 0; update(); }
    }

    function prev() {
        if (idx > 0) { idx--; currentCount = 0; update(); }
    }

    function changeCat(newCat) {
        cat = newCat; idx = 0; currentCount = 0;
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        if(newCat==='morning') document.getElementById("t-m").classList.add("active");
        if(newCat==='evening') document.getElementById("t-e").classList.add("active");
        if(newCat==='sleep') document.getElementById("t-s").classList.add("active");
        update();
    }
    </script>
</body>
</html>
