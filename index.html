<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك - النسخة الكاملة</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --primary-color: #00b4d8; --accent-color: #00f5d4; }
        body { background-color: var(--bg-color); color: #fff; padding: 20px; font-family: sans-serif; }
        .content-section { display: none; }
        .companion-card { background: #131f42; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #1c2541; padding: 30px; border-radius: 20px; max-width: 600px; position: relative; }
    </style>
</head>
<body>

    <div id="mainMenu">
        <button onclick="showSection('companionsSection')">سير الصحابة</button>
        <button onclick="showSection('feelingsSection')">محرك المشاعر</button>
    </div>

    <div id="companionsSection" class="content-section">
        <button onclick="document.location.reload()">العودة للرئيسية</button>
        <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="بحث...">
        <div id="companionsGrid"></div>
    </div>

    <div id="feelingsSection" class="content-section">
        <button onclick="document.location.reload()">العودة للرئيسية</button>
        <div id="searchResult"></div>
    </div>

    <div id="companionModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // 1. قاعدة بيانات الصحابة الكاملة
        const companionsData = [
            { name: "أبو بكر الصديق", title: "الصديق", story: "هو عبد الله بن أبي قحافة، أول من أسلم من الرجال..." },
            { name: "عمر بن الخطاب", title: "الفاروق", story: "عمر بن الخطاب، الذي أعز الله به الإسلام..." },
            { name: "عثمان بن عفان", title: "ذو النورين", story: "عثمان بن عفان، ثالث الخلفاء الراشدين..." },
            { name: "علي بن أبي طالب", title: "أبو الحسن", story: "علي بن أبي طالب، رابع الخلفاء الراشدين..." }
        ];

        // 2. دالة تشغيل الأقسام
        function showSection(id) {
            document.getElementById("mainMenu").style.display = "none";
            document.getElementById(id).style.display = "block";
            if(id === 'companionsSection') renderCompanions();
        }

        // 3. دالة بناء كروت الصحابة (المحرك الأساسي)
        function renderCompanions() {
            const grid = document.getElementById("companionsGrid");
            grid.innerHTML = "";
            companionsData.forEach((comp, idx) => {
                const card = document.createElement("div");
                card.className = "companion-card";
                card.onclick = () => openModal(idx);
                card.innerHTML = `<h3>${comp.name}</h3><h4>${comp.title}</h4>`;
                grid.appendChild(card);
            });
        }

        // 4. دالة البحث
        function filterCompanions() {
            const query = document.getElementById("companionInput").value.toLowerCase();
            document.querySelectorAll(".companion-card").forEach((card, idx) => {
                const match = companionsData[idx].name.includes(query) || companionsData[idx].title.includes(query);
                card.style.display = match ? "block" : "none";
            });
        }

        // 5. النوافذ المنبثقة
        function openModal(idx) {
            document.getElementById("modalTitle").innerText = companionsData[idx].name;
            document.getElementById("modalBody").innerHTML = companionsData[idx].story;
            document.getElementById("companionModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("companionModal").style.display = "none";
        }
    </script>
</body>
</html>
