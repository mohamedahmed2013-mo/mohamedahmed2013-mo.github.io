<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - الموسوعة الشاملة</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; --highlight: #ffd166; --success-color: #2a9d8f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0; }
        h1 { color: var(--primary-color); }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px; }
        .menu-box { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .menu-box:hover { border-color: var(--primary-color); background: #222f54; }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .box-title { color: var(--accent-color); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); }
        .azkar-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; }
        .counter-btn { width: 150px; padding: 10px; border-radius: 10px; border: none; background: var(--accent-color); cursor: pointer; font-weight: bold; }
        .counter-btn.done { background: var(--success-color); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 700px; width: 100%; padding: 30px; border-radius: 20px; border: 2px solid var(--primary-color); overflow-y: auto; max-height: 90vh; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: none; }
        .companion-card { background: #0a1128; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-right: 4px solid var(--primary-color); cursor: pointer; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header><h1>طمئن قلبك 🤍</h1></header>

    <div class="main-container">
        <div class="azan-bar">
            <div id="azanStatus">اضغط في أي مكان لتفعيل الأذان التلقائي 🔔</div>
        </div>
        <audio id="azanAudio" src="https://assets.mixkit.co/active_storage/sfx/1993/1993-84.wav"></audio>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة</div>
        </div>

        <div id="azkarSection" class="content-section">
            <h2 class="box-title">الأذكار <button onclick="showMenu()">رجوع</button></h2>
            <div id="tabContainer" class="search-box">
                <button class="tab-btn active" id="btn-morning" onclick="switchAzkar('morning')">الصباح</button>
                <button class="tab-btn" id="btn-evening" onclick="switchAzkar('evening')">المساء</button>
            </div>
            <div class="azkar-box"><div id="zkrText">...</div><div id="zkrReward"></div></div>
            <button id="counterBtn" class="counter-btn" onclick="countZkr()">0 / 0</button>
        </div>

        <div id="feelingsSection" class="content-section">
            <h2 class="box-title">محرك المشاعر <button onclick="showMenu()">رجوع</button></h2>
            <div class="search-box"><input type="text" id="searchInput" placeholder="اكتب شعورك (حزين، خايف...)"> <button onclick="searchFeeling()">بحث</button></div>
            <div id="searchResult"></div>
        </div>

        <div id="companionsSection" class="content-section">
            <h2 class="box-title">سير الصحابة <button onclick="showMenu()">رجوع</button></h2>
            <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي...">
            <div id="companionsGrid" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="companionModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const azanAudio = document.getElementById("azanAudio");
        let isAudioAllowed = false;
        
        function enableAudioContext() { if (!isAudioAllowed) { azanAudio.play().then(() => { azanAudio.pause(); isAudioAllowed = true; }).catch(()=>{}); } }

        const azkarData = {
            morning: [{text: "آية الكرسي", reward: "حفظ", count: 1}, {text: "أصبحنا وأصبح الملك لله", reward: "بركة", count: 3}],
            evening: [{text: "أعوذ بكلمات الله التامات", reward: "حماية", count: 3}]
        };

        const database = {
            "حزين": { title: "الحزن", ayah: "لا تحزن إن الله معنا", comfort: "سيفرجها الله." },
            "خايف": { title: "الخوف", ayah: "قل لن يصيبنا إلا ما كتب الله لنا", comfort: "اطمئن، المستقبل بيد الله." }
        };

        const companionsData = [
            { name: "أبو بكر الصديق", title: "الرفيق الأول", story: "هو أول من أسلم من الرجال..." },
            { name: "عمر بن الخطاب", title: "الفاروق", story: "أعز الله به الإسلام..." }
        ];

        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            if(id === 'companionsSection') renderCompanions();
            if(id === 'azkarSection') switchAzkar('morning');
        }

        function showMenu() {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('mainMenu').style.display = 'flex';
        }

        let currentCategory = 'morning', currentZkrIndex = 0, currentCount = 0;

        function switchAzkar(cat) {
            currentCategory = cat; currentZkrIndex = 0; currentCount = 0;
            const zkr = azkarData[cat][0];
            document.getElementById('zkrText').innerText = zkr.text;
            document.getElementById('zkrReward').innerText = zkr.reward;
            updateCounterBtn(zkr.count);
        }

        function updateCounterBtn(total) {
            const btn = document.getElementById('counterBtn');
            btn.innerText = `${currentCount} / ${total}`;
            btn.className = 'counter-btn' + (currentCount >= total ? ' done' : '');
        }

        function countZkr() {
            const total = azkarData[currentCategory][currentZkrIndex].count;
            if(currentCount < total) { currentCount++; updateCounterBtn(total); }
        }

        function searchFeeling() {
            const val = document.getElementById('searchInput').value;
            const match = database[val];
            document.getElementById('searchResult').innerHTML = match ? `<div><h3>${match.title}</h3><p>${match.ayah}</p><p>${match.comfort}</p></div>` : "لم يتم العثور على نتيجة.";
        }

        function renderCompanions(filter = "") {
            const grid = document.getElementById('companionsGrid');
            grid.innerHTML = "";
            companionsData.filter(c => c.name.includes(filter)).forEach(c => {
                const card = document.createElement('div');
                card.className = 'companion-card';
                card.innerHTML = `<h3>${c.name}</h3>`;
                card.onclick = () => {
                    document.getElementById('modalTitle').innerText = c.name;
                    document.getElementById('modalBody').innerHTML = c.story;
                    document.getElementById('companionModal').style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function filterCompanions() { renderCompanions(document.getElementById('companionInput').value); }
        function closeModal() { document.getElementById('companionModal').style.display = 'none'; }
    </script>
</body>
</html>
